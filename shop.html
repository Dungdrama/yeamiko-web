<div id="link-section">
    <input type="text" id="mc-name" placeholder="Tên nhân vật In-game">
    <input type="text" id="link-code" placeholder="Mã /link">
    <button onclick="linkGame()">XÁC NHẬN LIÊN KẾT</button>
</div>

<div class="shop">
    <button onclick="exchange(20, 'moc1', 'SMP')">Đổi 50K vào SMP</button>
    <button onclick="exchange(20, 'moc1', 'CHILL')">Đổi 50K vào CHILL</button>
</div>

<script>
async function linkGame() {
    const webUserId = firebase.auth().currentUser.uid;
    const mcName = document.getElementById('mc-name').value;
    const code = document.getElementById('link-code').value;

    // Kiểm tra mã /link từ Firebase (do Skript gửi lên)
    const snap = await database.ref('linking/' + mcName).once('value');
    if (snap.exists() && snap.val().code == code) {
        // Lưu liên kết vào tài khoản web
        await database.ref('web_users/' + webUserId).update({ linked_mc: mcName });
        alert("Đã liên kết với nhân vật: " + mcName);
    } else {
        alert("Sai mã hoặc tên nhân vật!");
    }
}

async function exchange(cost, moc, server) {
    const webUserId = firebase.auth().currentUser.uid;
    const userSnap = await database.ref('web_users/' + webUserId).once('value');
    const userData = userSnap.val();

    if (!userData.linked_mc) return alert("Bạn phải liên kết tài khoản game trước!");
    if (userData.points < cost) return alert("Không đủ điểm!");

    // 1. Trừ điểm tài khoản Web
    await database.ref('web_users/' + webUserId).update({ points: userData.points - cost });

    // 2. Đẩy quà vào nhánh của Server đó cho Skript đọc
    let giftPath = 'users_data/' + userData.linked_mc;
    let giftData = {};
    giftData[`pending_${server}`] = moc;
    giftData[`claimed_${server}`] = false;
    
    await database.ref(giftPath).update(giftData);
    alert(`Đã gửi quà vào cụm ${server}. Hãy vào game gõ /nhanqua`);
}
</script>
