<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko Premium Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; 
            display: flex; 
            min-height: 100vh; 
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 260px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); 
            height: 100vh; position: fixed; padding: 30px 20px; 
            border-right: 1px solid rgba(255,255,255,0.1); 
        }
        .sidebar .logo { font-size: 28px; font-weight: 900; color: var(--main); margin-bottom: 50px; text-shadow: 0 0 20px rgba(0,212,255,0.5); text-align: center; }
        .sidebar a { display: flex; align-items: center; color: #94a3b8; padding: 14px 18px; text-decoration: none; border-radius: 12px; margin-bottom: 10px; transition: 0.3s; }
        .sidebar a.active, .sidebar a:hover { background: var(--main); color: #000; font-weight: bold; }

        /* --- CONTENT --- */
        .main-content { flex: 1; margin-left: 260px; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        
        .shop-header { 
            width: 100%; max-width: 900px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 25px; display: flex; align-items: center; gap: 20px; margin-bottom: 40px; 
        }
        .mc-head { width: 64px; height: 64px; border-radius: 12px; box-shadow: 0 0 20px var(--main); border: 2px solid var(--main); }
        .points-display { margin-left: auto; text-align: right; }
        .points-display span { font-size: 32px; font-weight: 900; color: #fbbf24; }

        .link-box { 
            background: rgba(30, 41, 59, 0.8); padding: 30px; border-radius: 24px; 
            width: 100%; max-width: 450px; text-align: center; 
            border: 2px solid var(--main); margin-bottom: 30px; 
        }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid #475569; color: white; outline: none; }

        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 900px; }
        .item-card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; text-align: center; transition: 0.4s; }
        .item-card:hover { transform: translateY(-10px); border-color: var(--main); }
        .item-icon { font-size: 40px; margin-bottom: 15px; color: var(--main); display: block; }
        .item-cost { color: #fbbf24; font-weight: 800; font-size: 20px; margin-bottom: 20px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-link { background: var(--main); color: #000; width: 100%; margin-top: 10px; }
        .btn-chill { background: #0ea5e9; color: white; }
        .btn-smp { background: #10b981; color: white; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="forum.html"><i class="fas fa-comments"></i> Diễn đàn</a>
        <a href="checkin.html"><i class="fas fa-calendar-check"></i> Điểm danh</a>
        <a href="shop.html" class="active"><i class="fas fa-shopping-cart"></i> Cửa hàng</a>
        <a href="profile.html"><i class="fas fa-user"></i> Hồ sơ</a>
    </div>

    <div class="main-content">
        <div class="shop-header">
            <img id="player-head" src="https://mc-heads.net/avatar/steve" class="mc-head">
            <div class="user-meta">
                <h2 id="display-mc">Chưa liên kết Game</h2>
                <p id="display-email" style="color: #94a3b8; font-size: 14px;"></p>
            </div>
            <div class="points-display">
                <p style="font-size: 12px; color: #94a3b8;">SỐ DƯ XU</p>
                <span id="display-pts">0</span>
            </div>
        </div>

        <div id="link-section" class="link-box" style="display: none;">
            <h3 style="color: var(--main);"><i class="fas fa-link"></i> LIÊN KẾT TÀI KHOẢT</h3>
            <p style="font-size: 12px; color: #94a3b8; margin: 10px 0;">Vào Game gõ <b>/link</b> để lấy mã</p>
            <input type="text" id="mc-name" placeholder="Tên nhân vật In-game">
            <input type="text" id="link-code" placeholder="Mã xác thực (6 số)">
            <button onclick="linkGame()" class="btn btn-link">XÁC NHẬN LIÊN KẾT</button>
        </div>

        <div class="shop-grid">
            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight: bold; margin-bottom: 5px;">50,000 Money</div>
                <div class="item-cost">20 Xu</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(20, 'moc1', 'CHILL')">Mua CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(20, 'moc1', 'SMP')">Mua SMP</button>
                </div>
            </div>

            <div class="item-card">
                <i class="fas fa-gem item-icon"></i>
                <div style="font-weight: bold; margin-bottom: 5px;">150,000 Money</div>
                <div class="item-cost">50 Xu</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(50, 'moc2', 'CHILL')">Mua CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(50, 'moc2', 'SMP')">Mua SMP</button>
                </div>
            </div>

            <div class="item-card">
                <i class="fas fa-pickaxe item-icon" style="color: #a855f7;"></i>
                <div style="font-weight: bold; margin-bottom: 5px; color: #a855f7;">Cúp Amethyst</div>
                <div class="item-cost">100 Xu</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(100, 'vip_cup', 'CHILL')">Mua CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(100, 'vip_cup', 'SMP')">Mua SMP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentMC = null, currentPoints = 0;

        firebase.auth().onAuthStateChanged(u => { 
            if(u) {
                document.getElementById('display-email').innerText = u.email;
                loadData(u.uid); 
            } else {
                window.location.href='login.html'; 
            }
        });

        async function loadData(uid) {
            const s = await db.ref('web_users/' + uid).once('value');
            const d = s.val() || {points: 0};
            currentPoints = d.points; 
            currentMC = d.linked_mc;
            
            document.getElementById('display-pts').innerText = currentPoints;
            
            if(currentMC) {
                document.getElementById('display-mc').innerText = currentMC.toUpperCase();
                document.getElementById('player-head').src = `https://mc-heads.net/avatar/${currentMC}`;
                document.getElementById('link-section').style.display = 'none';
            } else {
                document.getElementById('display-mc').innerText = "Chưa liên kết Game";
                document.getElementById('link-section').style.display = 'block';
            }
        }

        async function linkGame() {
            const name = document.getElementById('mc-name').value.trim();
            const code = document.getElementById('link-code').value.trim();
            const user = firebase.auth().currentUser;

            if(!name || !code) return alert("Vui lòng nhập đủ tên và mã!");

            try {
                // SỬA LỖI: Tìm mã trong node 'web_users' theo tên Minecraft
                const s = await db.ref('web_users/' + name).once('value');
                
                if(s.exists()) {
                    const data = s.val();
                    // Kiểm tra mã link_code (hoặc nếu bạn lưu trực tiếp mã vào node name)
                    if(String(data.link_code || data) === String(code)) {
                        await db.ref('web_users/' + user.uid).update({ linked_mc: name });
                        alert("🎉 Liên kết thành công!");
                        location.reload();
                    } else {
                        alert("❌ Mã xác thực không chính xác!");
                    }
                } else {
                    alert("❌ Không tìm thấy mã cho nhân vật này!");
                }
            } catch (e) {
                alert("Lỗi kết nối Firebase!");
            }
        }

        async function buyItem(cost, moc, sv) {
            if(!currentMC) return alert("Bạn cần liên kết Game trước!");
            if(currentPoints < cost) return alert("Bạn không đủ Xu!");
            
            if(confirm(`Xác nhận mua gói này cho cụm ${sv}?`)) {
                try {
                    const uid = firebase.auth().currentUser.uid;
                    // Trừ xu
                    await db.ref('web_users/' + uid).update({ points: currentPoints - cost });
                    
                    // Ghi dữ liệu nhận quà vào users_data để Server Minecraft đọc
                    let update = {};
                    update[`pending_${sv}`] = moc;
                    update[`claimed_${sv}`] = false;
                    await db.ref('users_data/' + currentMC).update(update);
                    
                    alert("Mua thành công! Vào Game gõ /nhanqua");
                    loadData(uid);
                } catch (e) {
                    alert("Giao dịch thất bại!");
                }
            }
        }
    </script>
</body>
</html>
