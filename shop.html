<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko Premium Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); color: white; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); height: 100vh; position: fixed; padding: 30px 20px; border-right: 1px solid rgba(255,255,255,0.1); }
        .sidebar .logo { font-size: 28px; font-weight: 900; color: var(--main); margin-bottom: 50px; text-shadow: 0 0 20px rgba(0,212,255,0.5); text-align: center; }
        .sidebar a { display: flex; align-items: center; color: #94a3b8; padding: 14px 18px; text-decoration: none; border-radius: 12px; margin-bottom: 10px; transition: 0.3s; }
        .sidebar a.active, .sidebar a:hover { background: var(--main); color: #000; font-weight: bold; }
        .sidebar a i { margin-right: 12px; width: 20px; text-align: center; }
        .main-content { flex: 1; margin-left: 260px; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .shop-header { width: 100%; max-width: 900px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 25px; display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .mc-head { width: 64px; height: 64px; border-radius: 12px; box-shadow: 0 0 20px var(--main); }
        .points-display { margin-left: auto; text-align: right; }
        .points-display span { font-size: 32px; font-weight: 900; color: #fbbf24; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 900px; }
        .item-card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; text-align: center; transition: 0.4s; }
        .item-card:hover { transform: translateY(-10px); border-color: var(--main); }
        .item-icon { font-size: 40px; margin-bottom: 15px; color: var(--main); display: block; }
        .item-cost { color: #fbbf24; font-weight: 800; font-size: 20px; margin-bottom: 20px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-chill { background: #0ea5e9; color: white; }
        .btn-smp { background: #10b981; color: white; }
        .link-box { background: #1e293b; padding: 30px; border-radius: 24px; width: 100%; max-width: 450px; text-align: center; border: 2px solid var(--main); margin-bottom: 30px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid #475569; color: white; outline: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="forum.html"><i class="fas fa-comments"></i> Diễn đàn</a>
        <a href="checkin.html"><i class="fas fa-calendar-check"></i> Điểm danh</a>
        <a href="shop.html" class="active"><i class="fas fa-shopping-cart"></i> Cửa hàng</a>
        <a href="profile.html"><i class="fas fa-user"></i> Hồ sơ</a>
    </div>

    <div class="main-content">
        <div class="shop-header">
            <img id="player-head" src="https://mc-heads.net/avatar/steve" class="mc-head">
            <div class="user-meta">
                <h2 id="display-mc">Chưa liên kết Game</h2>
                <p style="color: #94a3b8;">Hệ thống Yeamiko Network</p>
            </div>
            <div class="points-display">
                <p style="font-size: 12px; color: #94a3b8;">ĐIỂM HIỆN CÓ</p>
                <span id="display-pts">0</span>
            </div>
        </div>

        <div id="link-section" class="link-box" style="display: none;">
            <h3>🔗 LIÊN KẾT GAME</h3>
            <input type="text" id="mc-name" placeholder="Tên nhân vật In-game">
            <input type="text" id="link-code" placeholder="Mã xác thực từ /link">
            <button onclick="linkGame()" class="btn btn-smp" style="width: 100%;">XÁC NHẬN</button>
        </div>

        <div class="shop-grid">
            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight: bold; margin-bottom: 5px;">50,000 Money</div>
                <div class="item-cost">20 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(20, 'moc1', 'CHILL')">Cụm CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(20, 'moc1', 'SMP')">Cụm SMP</button>
                </div>
            </div>
            <div class="item-card">
                <i class="fas fa-gem item-icon"></i>
                <div style="font-weight: bold; margin-bottom: 5px;">150,000 Money</div>
                <div class="item-cost">50 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(50, 'moc2', 'CHILL')">Cụm CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(50, 'moc2', 'SMP')">Cụm SMP</button>
                </div>
            </div>
            <div class="item-card">
                <i class="fas fa-crown item-icon"></i>
                <div style="font-weight: bold; margin-bottom: 5px;">500,000 Money</div>
                <div class="item-cost">150 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(150, 'moc3', 'CHILL')">Cụm CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(150, 'moc3', 'SMP')">Cụm SMP</button>
                </div>
            </div>

            <div class="item-card">
                <i class="fas fa-axe item-icon" style="color: #fbbf24;"></i>
                <div style="font-weight: bold; margin-bottom: 5px; color: #a855f7;">Rìu ametyst</div>
                <div class="item-cost">100 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(100, 'vip_riu', 'CHILL')">Cụm CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(100, 'vip_riu', 'SMP')">Cụm SMP</button>
                </div>
            </div>
            <div class="item-card">
                <i class="fas fa-shovel item-icon" style="color: #0ea5e9;"></i>
                <div style="font-weight: bold; margin-bottom: 5px; color: #a855f7;">Xẻng ametyst</div>
                <div class="item-cost">100 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(100, 'vip_xeng', 'CHILL')">Cụm CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(100, 'vip_xeng', 'SMP')">Cụm SMP</button>
                </div>
            </div>
            <div class="item-card">
                <i class="fas fa-pickaxe item-icon" style="color: #10b981;"></i>
                <div style="font-weight: bold; margin-bottom: 5px; color: #a855f7;">Cúp ametyst</div>
                <div class="item-cost">100 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(100, 'vip_cup', 'CHILL')">Cụm CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(100, 'vip_cup', 'SMP')">Cụm SMP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentMC = null, currentPoints = 0;

        firebase.auth().onAuthStateChanged(u => { if(u) loadData(u.uid); else window.location.href='login.html'; });

        async function loadData(uid) {
            const s = await db.ref('web_users/'+uid).once('value');
            const d = s.val() || {points:0};
            currentPoints = d.points; currentMC = d.linked_mc;
            document.getElementById('display-pts').innerText = currentPoints;
            if(currentMC) {
                document.getElementById('display-mc').innerText = currentMC;
                document.getElementById('player-head').src = `https://mc-heads.net/avatar/${currentMC}`;
                document.getElementById('link-section').style.display = 'none';
            } else { document.getElementById('link-section').style.display = 'block'; }
        }

        async function linkGame() {
            const name = document.getElementById('mc-name').value;
            const code = document.getElementById('link-code').value;
            const s = await db.ref('linking/'+name).once('value');
            if(s.exists() && s.val().code == code) {
                await db.ref('web_users/'+firebase.auth().currentUser.uid).update({linked_mc: name});
                location.reload();
            } else alert("Sai mã hoặc tên!");
        }

        async function buyItem(cost, moc, sv) {
            if(!currentMC) return alert("Chưa liên kết game!");
            if(currentPoints < cost) return alert("Không đủ điểm!");
            if(confirm(`Mua gói này cho cụm ${sv}?`)) {
                await db.ref('web_users/'+firebase.auth().currentUser.uid).update({points: currentPoints - cost});
                let update = {}; update[`pending_${sv}`] = moc; update[`claimed_${sv}`] = false;
                await db.ref('users_data/'+currentMC).update(update);
                alert("Thành công! Vào game gõ /nhanqua"); loadData(firebase.auth().currentUser.uid);
            }
        }
    </script>
</body>
</html>
