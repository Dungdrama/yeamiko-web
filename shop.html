<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko Premium Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- MENU 3 GẠCH --- */
        .menu-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 1500;
            background: var(--main); color: #000; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; cursor: pointer; font-size: 20px;
        }

        .sidebar { 
            width: 260px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); 
            height: 100vh; position: fixed; padding: 30px 20px; z-index: 2000;
            left: -260px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar.open { left: 0; }
        .sidebar .logo { font-size: 24px; font-weight: 900; color: var(--main); margin-bottom: 40px; text-align: center; }
        .sidebar a { 
            display: flex; align-items: center; color: #94a3b8; padding: 14px 18px; 
            text-decoration: none; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; 
        }
        .sidebar a i { margin-right: 12px; width: 20px; text-align: center; }
        .sidebar a:hover, .sidebar a.active { background: var(--main); color: #000; font-weight: bold; }

        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1800; display: none;
        }
        .sidebar-overlay.show { display: block; }

        /* --- NỘI DUNG --- */
        .main-content { 
            width: 100%; max-width: 1200px; margin: 0 auto; 
            padding: 80px 20px 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .shop-header { 
            width: 100%; max-width: 900px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 25px; display: flex; align-items: center; gap: 20px; margin-bottom: 40px; 
        }
        .mc-head { width: 64px; height: 64px; border-radius: 12px; border: 2px solid var(--main); }
        .points-display { margin-left: auto; text-align: right; }
        .points-display span { font-size: 32px; font-weight: 900; color: #fbbf24; }

        /* FIX HIỂN THỊ ĐIỆN THOẠI */
        .shop-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; width: 100%; max-width: 900px;
        }

        .item-card { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 30px; text-align: center; transition: 0.4s; 
        }
        .item-card:hover { transform: translateY(-10px); border-color: var(--main); }
        .item-icon { font-size: 40px; margin-bottom: 15px; color: var(--main); display: block; }
        .item-cost { color: #fbbf24; font-weight: 800; font-size: 20px; margin-bottom: 20px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; font-size: 13px; }
        .btn-chill { background: #0ea5e9; }
        .btn-smp { background: #10b981; }

        @media (max-width: 768px) {
            .shop-header { flex-direction: column; text-align: center; }
            .points-display { margin: 15px auto 0 auto; text-align: center; }
            .shop-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="forum.html"><i class="fas fa-comments"></i><span>Diễn đàn</span></a>
        <a href="checkin.html"><i class="fas fa-calendar-check"></i><span>Điểm danh</span></a>
        <a href="shop.html" class="active"><i class="fas fa-shopping-cart"></i><span>Cửa hàng</span></a>
        <a href="profile.html"><i class="fas fa-user"></i><span>Hồ sơ</span></a>
    </div>

    <div class="main-content">
        <div class="shop-header">
            <img id="player-head" src="https://mc-heads.net/avatar/steve" class="mc-head">
            <div class="user-meta">
                <h2 id="display-mc">Đang tải...</h2>
                <p id="display-email" style="color: #94a3b8; font-size: 12px;"></p>
            </div>
            <div class="points-display">
                <p style="font-size: 12px; color: #94a3b8;">ĐIỂM HIỆN CÓ</p>
                <span id="display-pts">0</span>
            </div>
        </div>

        <div class="shop-grid">
            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight:bold; margin-bottom:5px">50,000 Xu</div>
                <div class="item-cost">20 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(20, 'moc1', 'CHILL')">CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(20, 'moc1', 'SMP')">SMP</button>
                </div>
            </div>

            <div class="item-card">
                <i class="fas fa-money-bill-wave item-icon" style="color:#2ecc71"></i>
                <div style="font-weight:bold; margin-bottom:5px">150,000 Xu</div>
                <div class="item-cost">50 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(50, 'moc2', 'CHILL')">CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(50, 'moc2', 'SMP')">SMP</button>
                </div>
            </div>

            <div class="item-card">
                <i class="fas fa-vault item-icon" style="color:#f1c40f"></i>
                <div style="font-weight:bold; margin-bottom:5px">500,000 Xu</div>
                <div class="item-cost">150 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(150, 'moc3', 'CHILL')">CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(150, 'moc3', 'SMP')">SMP</button>
                </div>
            </div>

            <div class="item-card">
                <i class="fas fa-pickaxe item-icon" style="color: #a855f7;"></i>
                <div style="font-weight:bold; margin-bottom:5px">Cúp Ametyst</div>
                <div class="item-cost">100 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(100, 'vip_cup_ametyst', 'CHILL')">CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(100, 'vip_cup_ametyst', 'SMP')">SMP</button>
                </div>
            </div>

            <div class="item-card">
                <i class="fas fa-axe item-icon" style="color: #a855f7;"></i>
                <div style="font-weight:bold; margin-bottom:5px">Rìu Ametyst</div>
                <div class="item-cost">100 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(100, 'vip_riu_ametyst', 'CHILL')">CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(100, 'vip_riu_ametyst', 'SMP')">SMP</button>
                </div>
            </div>

            <div class="item-card">
                <i class="fas fa-shovels item-icon" style="color: #a855f7;"></i>
                <div style="font-weight:bold; margin-bottom:5px">Xẻng Ametyst</div>
                <div class="item-cost">100 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(100, 'vip_xeng_ametyst', 'CHILL')">CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(100, 'vip_xeng_ametyst', 'SMP')">SMP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentMC = null, currentPoints = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }

        firebase.auth().onAuthStateChanged(u => { 
            if(u) {
                document.getElementById('display-email').innerText = u.email;
                loadData(u.uid); 
            } else { window.location.href='login.html'; }
        });

        async function loadData(uid) {
            const s = await db.ref('web_users/'+uid).once('value');
            const d = s.val() || {points:0};
            currentPoints = d.points; currentMC = d.linked_mc;
            document.getElementById('display-pts').innerText = currentPoints;
            if(currentMC) {
                document.getElementById('display-mc').innerText = currentMC;
                document.getElementById('player-head').src = `https://mc-heads.net/avatar/${currentMC}`;
            }
        }

        async function buyItem(cost, moc, sv) {
            if(!currentMC) return alert("Bạn chưa liên kết Game!");
            if(currentPoints < cost) return alert("Không đủ điểm!");
            if(confirm(`Mua gói này cho cụm ${sv}?`)) {
                await db.ref('web_users/'+firebase.auth().currentUser.uid).update({points: currentPoints - cost});
                let update = {}; update[`pending_${sv}`] = moc; update[`claimed_${sv}`] = false;
                await db.ref('users_data/'+currentMC).update(update);
                alert("Thành công! Vào game gõ /nhanqua");
                loadData(firebase.auth().currentUser.uid);
            }
        }
    </script>
</body>
</html>
