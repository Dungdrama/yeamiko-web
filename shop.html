<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng | Yeamiko Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --main: #00d4ff; 
            --bg: #0f172a; 
            --card: rgba(255, 255, 255, 0.05); 
            --sidebar-bg: rgba(0, 0, 0, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: row; /* Mặc định ngang cho PC */
        }

        /* --- SIDEBAR ĐỒNG BỘ --- */
        .sidebar { 
            width: 260px; 
            background: var(--sidebar-bg); 
            backdrop-filter: blur(15px); 
            height: 100vh; 
            position: fixed; 
            padding: 30px 20px; 
            border-right: 1px solid rgba(255,255,255,0.1);
            z-index: 2000;
            transition: 0.3s;
        }
        .sidebar .logo { font-size: 28px; font-weight: 900; color: var(--main); margin-bottom: 50px; text-align: center; }
        .sidebar a { 
            display: flex; align-items: center; color: #94a3b8; 
            padding: 14px 18px; text-decoration: none; border-radius: 12px; 
            margin-bottom: 8px; transition: 0.3s; 
        }
        .sidebar a.active, .sidebar a:hover { background: var(--main); color: #000; font-weight: bold; }
        .sidebar a i { margin-right: 12px; width: 20px; text-align: center; }

        /* --- NÚT MENU CHO ĐIỆN THOẠI --- */
        .mobile-toggle {
            display: none; /* Ẩn trên PC */
            position: fixed; top: 15px; left: 15px; 
            z-index: 2100; background: var(--main); color: #000;
            width: 45px; height: 45px; border-radius: 10px;
            align-items: center; justify-content: center; cursor: pointer;
        }

        /* --- MAIN CONTENT --- */
        .main-content { 
            flex: 1; 
            margin-left: 260px; /* Chừa chỗ cho sidebar trên PC */
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            transition: 0.3s;
        }

        /* --- HEADER & POINTS --- */
        .shop-header { 
            width: 100%; max-width: 900px; 
            background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 25px; 
            display: flex; align-items: center; gap: 20px; margin-bottom: 40px; 
        }
        .mc-head { width: 64px; height: 64px; border-radius: 12px; box-shadow: 0 0 20px var(--main); }
        .points-display { margin-left: auto; text-align: right; }
        .points-display span { font-size: 32px; font-weight: 900; color: #fbbf24; }

        /* --- GRID VẬT PHẨM --- */
        .shop-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; width: 100%; max-width: 900px; 
        }
        .item-card { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 30px; text-align: center; transition: 0.4s; 
        }
        .item-card:hover { transform: translateY(-10px); border-color: var(--main); }
        .item-icon { font-size: 40px; margin-bottom: 15px; color: var(--main); display: block; }
        .item-cost { color: #fbbf24; font-weight: 800; font-size: 20px; margin-bottom: 20px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-chill { background: #0ea5e9; color: white; }
        .btn-smp { background: #10b981; color: white; }

        /* --- RESPONSIVE (DÀNH CHO ĐIỆN THOẠI) --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            
            .mobile-toggle { display: flex; } /* Hiện nút menu */

            .sidebar { 
                left: -260px; /* Ẩn sidebar sang trái */
            }
            .sidebar.open { left: 0; } /* Trượt ra khi bấm nút */

            .main-content { 
                margin-left: 0; /* Xóa khoảng trống sidebar */
                padding: 20px;
                padding-top: 80px; 
            }

            .shop-header { 
                flex-direction: column; text-align: center; 
                padding: 20px;
            }
            .points-display { margin: 0 auto; text-align: center; margin-top: 15px; }
            
            .shop-grid { grid-template-columns: 1fr; } /* Mỗi hàng 1 item */
        }
    </style>
</head>
<body>

    <div class="mobile-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="forum.html"><i class="fas fa-comments"></i> Diễn đàn</a>
        <a href="checkin.html"><i class="fas fa-calendar-check"></i> Điểm danh</a>
        <a href="shop.html" class="active"><i class="fas fa-shopping-cart"></i> Cửa hàng</a>
        <a href="profile.html"><i class="fas fa-user"></i> Hồ sơ</a>
    </div>

    <div class="main-content">
        <div class="shop-header">
            <img id="player-head" src="https://mc-heads.net/avatar/steve" class="mc-head">
            <div class="user-meta">
                <h2 id="display-mc">Chưa liên kết</h2>
                <p id="display-email" style="color: #94a3b8; font-size: 12px;"></p>
            </div>
            <div class="points-display">
                <p style="font-size: 12px; color: #94a3b8;">ĐIỂM HIỆN CÓ</p>
                <span id="display-pts">0</span>
            </div>
        </div>

        <div class="shop-grid">
            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight: bold; margin-bottom: 5px;">50,000 Money</div>
                <div class="item-cost">20 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(20, 'moc1', 'CHILL')">CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(20, 'moc1', 'SMP')">SMP</button>
                </div>
            </div>

            <div class="item-card">
                <i class="fas fa-pickaxe item-icon" style="color: #a855f7;"></i>
                <div style="font-weight: bold; margin-bottom: 5px; color: #a855f7;">Cúp Ametyst</div>
                <div class="item-cost">100 Điểm</div>
                <div class="btn-group">
                    <button class="btn btn-chill" onclick="buyItem(100, 'vip_cup_ametyst', 'CHILL')">CHILL</button>
                    <button class="btn btn-smp" onclick="buyItem(100, 'vip_cup_ametyst', 'SMP')">SMP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentMC = null, currentPoints = 0;

        // Hàm đóng mở sidebar trên điện thoại
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        firebase.auth().onAuthStateChanged(u => { 
            if(u) {
                document.getElementById('display-email').innerText = u.email;
                loadData(u.uid); 
            } else { window.location.href='login.html'; }
        });

        async function loadData(uid) {
            const s = await db.ref('web_users/'+uid).once('value');
            const d = s.val() || {points:0};
            currentPoints = d.points; currentMC = d.linked_mc;
            document.getElementById('display-pts').innerText = currentPoints;
            if(currentMC) {
                document.getElementById('display-mc').innerText = currentMC;
                document.getElementById('player-head').src = `https://mc-heads.net/avatar/${currentMC}`;
            }
        }

        async function buyItem(cost, moc, sv) {
            if(!currentMC) return alert("Bạn cần liên kết game trước!");
            if(currentPoints < cost) return alert("Bạn không đủ điểm!");
            if(confirm(`Xác nhận mua cho cụm ${sv}?`)) {
                await db.ref('web_users/'+firebase.auth().currentUser.uid).update({points: currentPoints - cost});
                let update = {}; update[`pending_${sv}`] = moc; update[`claimed_${sv}`] = false;
                await db.ref('users_data/'+currentMC).update(update);
                alert("Mua thành công! Hãy vào game gõ /nhanqua");
                location.reload();
            }
        }
    </script>
</body>
</html>
