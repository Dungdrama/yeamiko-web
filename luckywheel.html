<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko | Vòng Quay May Mắn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --main: #ff4757; --bg: #0b0f19; --gold: #ffd700; --blue: #00d4ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; text-align: center; min-height: 100vh; padding-bottom: 50px; }

        /* Navbar */
        .navbar { 
            background: rgba(15, 23, 42, 0.95); height: 80px; display: flex; 
            align-items: center; justify-content: space-between; padding: 0 20px; 
            border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000;
        }
        .wallet { display: flex; gap: 10px; }
        .badge { padding: 8px 12px; border-radius: 12px; font-weight: bold; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); }
        .badge-xu { background: rgba(0, 212, 255, 0.1); color: var(--blue); }
        .badge-diem { background: rgba(255, 215, 0, 0.1); color: var(--gold); }

        .exchange-box {
            background: rgba(255,255,255,0.03); margin: 20px auto; padding: 15px;
            border-radius: 15px; max-width: 420px; border: 1px solid var(--blue);
            display: flex; align-items: center; justify-content: space-around;
        }
        .btn-exchange { background: var(--blue); color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: 800; cursor: pointer; }

        /* Vòng quay */
        .wheel-container { position: relative; width: 320px; height: 320px; margin: 30px auto; }
        .wheel-canvas {
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid #fff;
            position: relative; overflow: hidden; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            background: #fff; box-shadow: 0 0 30px rgba(255, 71, 87, 0.3);
            transform: rotate(0deg);
        }
        
        /* Chia 5 ô: mỗi ô 72 độ */
        .segment {
            position: absolute; width: 50%; height: 50%; transform-origin: bottom right;
            transform: rotate(calc(72deg * var(--i))) skewY(-18deg); background: var(--clr);
            display: flex; justify-content: center; align-items: center;
        }
        .segment span {
            position: absolute; margin: 45px 0 0 45px; transform: rotate(45deg) skewY(18deg);
            font-weight: 900; color: white; font-size: 14px; text-shadow: 1px 1px 2px #000;
        }

        /* Kim chỉ: Cố định ở đỉnh */
        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            z-index: 100; font-size: 40px; color: #fff; filter: drop-shadow(0 0 5px #000);
        }

        .btn-spin {
            background: var(--main); color: white; border: none; padding: 18px 70px;
            font-size: 20px; font-weight: 900; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4);
        }
        .btn-spin:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-weight:900" onclick="location.href='minigame-hub.html'">YEAMIKO <span style="color:var(--main)">LUCKY</span></div>
        <div class="wallet">
            <div class="badge badge-xu"><i class="fas fa-coins"></i> <span id="xu-val">0</span> Xu</div>
            <div class="badge badge-diem"><i class="fas fa-ticket-alt"></i> <span id="diem-val">0</span> Điểm</div>
        </div>
    </nav>

    <div class="exchange-box">
        <div style="text-align: left;">
            <div style="font-weight: bold; color: var(--blue);">Đổi Điểm Quay</div>
            <div style="font-size: 12px; color: #94a3b8;">10 Xu = 5 Điểm (Vé quay)</div>
        </div>
        <button class="btn-exchange" onclick="exchange()">ĐỔI NGAY</button>
    </div>

    <div class="wheel-container">
        <div class="pointer"><i class="fas fa-caret-down"></i></div>
        <div id="wheel" class="wheel-canvas">
            <div class="segment" style="--i:0; --clr:#ff4757;"><span>+4 Xu</span></div>
            <div class="segment" style="--i:1; --clr:#2ed573;"><span>+5 Xu</span></div>
            <div class="segment" style="--i:2; --clr:#1e90ff;"><span>+10 Xu</span></div>
            <div class="segment" style="--i:3; --clr:#ffa502;"><span>+20 Xu</span></div>
            <div class="segment" style="--i:4; --clr:#3742fa;"><span>+50 Xu</span></div>
        </div>
    </div>

    <button class="btn-spin" id="spin-btn" onclick="startSpin()">QUAY (Tốn 5 Điểm)</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let xuHienTai = 0;   
    let diemHienTai = 0; 
    let userUID = null;
    let isSpinning = false;
    let rotation = 0;

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            userUID = user.uid;
            db.ref('web_users/' + userUID).on('value', s => {
                const d = s.val() || {};
                xuHienTai = d.points || 0;
                diemHienTai = d.spin_points || 0;
                document.getElementById('xu-val').innerText = xuHienTai;
                document.getElementById('diem-val').innerText = diemHienTai;
            });
        } else { window.location.href = 'login.html'; }
    });

    async function exchange() {
        if (xuHienTai < 10) return alert("Bạn không đủ Xu để đổi!");
        if (confirm("Đổi 10 Xu lấy 5 Điểm Quay?")) {
            await db.ref('web_users/' + userUID).update({
                points: xuHienTai - 10,
                spin_points: diemHienTai + 5
            });
        }
    }

    // Danh sách phần thưởng tương ứng với các ô (mỗi ô 72 độ)
    const rewards = [
        { val: 4,  deg: 0 },   // Ô 0: 0 - 72 độ
        { val: 5,  deg: 72 },  // Ô 1: 72 - 144 độ
        { val: 10, deg: 144 }, // Ô 2: 144 - 216 độ
        { val: 20, deg: 216 }, // Ô 3: 216 - 288 độ
        { val: 50, deg: 288 }  // Ô 4: 288 - 360 độ
    ];

    async function startSpin() {
        if (isSpinning) return;
        if (diemHienTai < 5) return alert("Bạn không đủ Điểm quay!");

        isSpinning = true;
        document.getElementById('spin-btn').disabled = true;

        await db.ref('web_users/' + userUID + '/spin_points').set(diemHienTai - 5);

        // --- LOGIC TỈ LỆ ---
        const rand = Math.random() * 100;
        let result;
        if (rand < 70) result = rewards[0];      // 70% ra 4 Xu
        else if (rand < 85) result = rewards[1]; // 15% ra 5 Xu
        else if (rand < 94) result = rewards[2]; // 9% ra 10 Xu
        else if (rand < 99) result = rewards[3]; // 5% ra 20 Xu
        else result = rewards[4];                // 1% ra 50 Xu

        // --- CÔNG THỨC XOAY CHUẨN ---
        // 1. rotation += 3600: Quay ít nhất 10 vòng
        // 2. (360 - result.deg): Xoay ngược lại đúng vị trí ô trúng
        // 3. - 36: Dịch thêm nửa ô (72/2) để kim chỉ vào CHÍNH GIỮA ô
        rotation += 3600 + (360 - result.deg) - 36;
        
        document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;

        setTimeout(async () => {
            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;
            
            if(result.val >= 20) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            alert(`🎉 Chúc mừng! Bạn nhận được ${result.val} Xu`);

            await db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + result.val);
        }, 5000);
    }
</script>
</body>
</html>
