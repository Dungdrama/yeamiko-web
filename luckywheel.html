<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko | Siêu Vòng Quay May Mắn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --main: #ff4757; --bg: #0b1121; --card: #161f32;
            --gold: #ffd700; --blue: #00d4ff; --text: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; text-align: center; min-height: 100vh; padding-bottom: 50px; overflow-x: hidden; }

        /* Navbar */
        .navbar { 
            background: rgba(22, 31, 50, 0.95); height: 80px; display: flex; 
            align-items: center; justify-content: space-between; padding: 0 25px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .nav-brand { font-weight: 900; font-size: 20px; cursor: pointer; letter-spacing: 1px; }
        .wallet { display: flex; gap: 10px; }
        .badge { padding: 9px 16px; border-radius: 12px; font-weight: bold; font-size: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }

        /* Box đổi điểm */
        .exchange-box {
            background: var(--card); margin: 30px auto; padding: 20px;
            border-radius: 20px; max-width: 450px; border: 1px solid rgba(0, 212, 255, 0.2);
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .exchange-title { font-weight: 800; color: #fff; font-size: 18px; text-align: left; }
        .btn-exchange {
            background: var(--blue); color: #000; border: none; padding: 12px 24px;
            border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-exchange:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3); }

        /* --- VÒNG QUAY SVG MỚI --- */
        .wheel-stage { position: relative; width: 360px; height: 360px; margin: 40px auto; }
        
        /* Kim chỉ: Thiết kế hiện đại */
        .pointer { 
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%); 
            z-index: 100; width: 45px; height: 55px;
            background: #fff;
            clip-path: polygon(50% 100%, 0 0, 100% 0); /* Hình tam giác nhọn */
            border-radius: 5px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .wheel-outer {
            width: 100%; height: 100%; border-radius: 50%;
            background: #fff; padding: 12px; /* Viền trắng dày */
            box-shadow: 0 15px 50px rgba(0,0,0,0.5), 0 0 20px rgba(255, 71, 87, 0.2);
        }

        .wheel-canvas {
            width: 100%; height: 100%; border-radius: 50%;
            position: relative; overflow: hidden;
            transition: transform 6s cubic-bezier(0.2, 0.8, 0.3, 1.05); /* Hiệu ứng elastic */
            transform: rotate(0deg);
        }

        /* SVG Sectors */
        .wheel-svg { width: 100%; height: 100%; transform: rotate(-90deg); /* Bắt đầu từ đỉnh */ }
        .sector { stroke: rgba(255,255,255,0.1); stroke-width: 0.5; }

        /* Text trên vòng quay */
        .wheel-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .text-item {
            position: absolute; width: 100px; height: 40px;
            top: 50%; left: 50%;
            transform-origin: 0% 50%;
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 25px;
            font-weight: 900; color: white; font-size: 18px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        /* Căn góc cho 5 ô */
        .text-item:nth-child(1) { transform: translate(0, -50%) rotate(36deg); }
        .text-item:nth-child(2) { transform: translate(0, -50%) rotate(108deg); }
        .text-item:nth-child(3) { transform: translate(0, -50%) rotate(180deg); }
        .text-item:nth-child(4) { transform: translate(0, -50%) rotate(252deg); }
        .text-item:nth-child(5) { transform: translate(0, -50%) rotate(324deg); }

        /* Nút quay */
        .btn-spin {
            background: var(--main); color: white; border: none; padding: 20px 80px;
            font-size: 22px; font-weight: 900; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.5); transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-spin:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.1); }
        .btn-spin:disabled { background: #475569; cursor: not-allowed; box-shadow: none; opacity: 0.5; }

        .info-text { margin-top: 30px; color: var(--text); font-size: 14px; line-height: 1.6; max-width: 500px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand" onclick="location.href='minigame-hub.html'">YEAMIKO <span style="color:var(--main)">LUCKY</span></div>
        <div class="wallet">
            <div class="badge" style="color: var(--blue);"><i class="fas fa-coins"></i> <span id="xu-val">0</span> Xu</div>
            <div class="badge" style="color: var(--gold);"><i class="fas fa-ticket-alt"></i> <span id="diem-val">0</span> Điểm</div>
        </div>
    </nav>

    <div class="exchange-box">
        <div class="exchange-title">
            Đổi Điểm Quay
            <div style="font-size: 13px; color: var(--text); font-weight: normal; margin-top: 3px;">10 Xu = 5 Điểm (Vé quay)</div>
        </div>
        <button class="btn-exchange" onclick="exchange()">ĐỔI NGAY</button>
    </div>

    <div class="wheel-stage">
        <div class="pointer"></div>
        <div class="wheel-outer">
            <div id="wheel" class="wheel-canvas">
                <svg class="wheel-svg" viewBox="0 0 32 32">
                    <circle class="sector" r="16" cx="16" cy="16" fill="#ff4757" stroke-dasharray="20.1 100" />
                    <circle class="sector" r="16" cx="16" cy="16" fill="#2ed573" stroke-dasharray="20.1 100" stroke-dashoffset="-20.1" />
                    <circle class="sector" r="16" cx="16" cy="16" fill="#1e90ff" stroke-dasharray="20.1 100" stroke-dashoffset="-40.2" />
                    <circle class="sector" r="16" cx="16" cy="16" fill="#ffa502" stroke-dasharray="20.1 100" stroke-dashoffset="-60.3" />
                    <circle class="sector" r="16" cx="16" cy="16" fill="#5352ed" stroke-dasharray="20.1 100" stroke-dashoffset="-80.4" />
                    
                    <circle r="3" cx="16" cy="16" fill="white" />
                </svg>

                <div class="wheel-text">
                    <div class="text-item"><span>4 Xu</span></div>
                    <div class="text-item"><span>5 Xu</span></div>
                    <div class="text-item"><span>10 Xu</span></div>
                    <div class="text-item"><span>20 Xu</span></div>
                    <div class="text-item"><span>50 Xu</span></div>
                </div>
            </div>
        </div>
    </div>

    <button class="btn-spin" id="spin-btn" onclick="startSpin()">QUAY (Tốn 5 Điểm)</button>

    <div class="info-text">
        Dùng Điểm quay để nhận lại Xu!<br>
        Tỉ lệ: 4x(70%) | 5x(15%) | 10x(9%) | 20x(5%) | 50x(1%)
    </div>

<script>
    // CẤU HÌNH FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let xuHienTai = 0;   // Biến 'points'
    let diemHienTai = 0; // Biến 'spin_points'
    let userUID = null;
    let isSpinning = false;
    let totalRotation = 0;

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            userUID = user.uid;
            db.ref('web_users/' + userUID).on('value', s => {
                const data = s.val() || {};
                xuHienTai = data.points || 0;
                diemHienTai = data.spin_points || 0;
                document.getElementById('xu-val').innerText = xuHienTai.toLocaleString();
                document.getElementById('diem-val').innerText = diemHienTai.toLocaleString();
            });
        } else { window.location.href = 'login.html'; }
    });

    // Hàm đổi 10 Xu lấy 5 Điểm
    async function exchange() {
        if (xuHienTai < 10) return alert("Bạn không đủ Xu để đổi!");
        if (confirm("Xác nhận đổi 10 Xu lấy 5 Điểm Quay (Vé quay)?")) {
            await db.ref('web_users/' + userUID).update({
                points: xuHienTai - 10,
                spin_points: diemHienTai + 5
            });
        }
    }

    // CẤU HÌNH GÓC XOAY MỚI (Khớp chính xác với SVG)
    // Mỗi ô 72 độ. Góc deg là góc tâm của ô.
    const rewards = [
        { name: "4 Xu", val: 4,  deg: 36 },   // Ô 0: Tâm ở 36 độ
        { name: "5 Xu", val: 5,  deg: 108 },  // Ô 1: Tâm ở 108 độ
        { name: "10 Xu", val: 10, deg: 180 }, // Ô 2: Tâm ở 180 độ
        { name: "20 Xu", val: 20, deg: 252 }, // Ô 3: Tâm ở 252 độ
        { name: "50 Xu", val: 50, deg: 324 }  // Ô 4: Tâm ở 324 độ
    ];

    async function startSpin() {
        if (isSpinning) return;
        if (diemHienTai < 5) return alert("Bạn không đủ Điểm quay!");

        isSpinning = true;
        document.getElementById('spin-btn').disabled = true;

        // Trừ 5 điểm ngay
        await db.ref('web_users/' + userUID + '/spin_points').set(diemHienTai - 5);

        // Logic tỉ lệ
        const rand = Math.random() * 100;
        let result;
        if (rand < 70) result = rewards[0];      // 70% ra 4 Xu
        else if (rand < 85) result = rewards[1]; // 15% ra 5 Xu
        else if (rand < 94) result = rewards[2]; // 9% ra 10 Xu
        else if (rand < 99) result = rewards[3]; // 5% ra 20 Xu
        else result = rewards[4];                // 1% ra 50 Xu

        // --- CÔNG THỨC XOAY CHUẨN MỚI ---
        // totalRotation += 3600: Quay 10 vòng
        // (360 - result.deg): Xoay ngược lại đúng tâm ô thưởng
        totalRotation += 3600 + (360 - result.deg);
        
        document.getElementById('wheel').style.transform = `rotate(${totalRotation}deg)`;

        setTimeout(async () => {
            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;
            
            if(result.val >= 20) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            
            alert(`🎉 Chúc mừng! Bạn quay trúng ${result.name}`);

            // Cộng lại vào Xu (biến points)
            await db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + result.val);
        }, 6500); // Tăng thời gian đợi để khớp hiệu ứng elastic
    }
</script>
</body>
</html>
