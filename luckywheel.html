<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko | Casino Vòng Quay May Mắn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --main: #ff4757; --bg: #0a0e17; --blue: #00d4ff; --gold: #ffd700; --green: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; text-align: center; min-height: 100vh; overflow-x: hidden; }

        .navbar { 
            background: #161b28; height: 70px; display: flex; 
            align-items: center; justify-content: space-between; 
            padding: 0 20px; border-bottom: 2px solid var(--main);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .btn-back {
            background: rgba(255, 255, 255, 0.1); color: #fff; border: none;
            padding: 8px 15px; border-radius: 8px; cursor: pointer;
            font-size: 14px; transition: 0.3s; text-decoration: none;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-back:hover { background: var(--main); }

        .wallet { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
        .badge { padding: 8px 12px; border-radius: 20px; font-weight: bold; background: rgba(255,255,255,0.05); font-size: 12px; border: 1px solid rgba(255,255,255,0.1); }

        .exchange-box { 
            background: #1c2331; margin: 20px auto; padding: 20px; 
            border-radius: 15px; max-width: 450px; display: flex; 
            align-items: center; justify-content: space-between; border: 1px solid var(--green);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn-exchange { background: var(--green); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-exchange:hover { opacity: 0.8; transform: scale(1.05); }

        .wheel-container { position: relative; width: 360px; height: 360px; margin: 40px auto; }
        #wheelCanvas { 
            width: 100%; height: 100%; border-radius: 50%; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5), 0 0 20px rgba(255, 71, 87, 0.2); 
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        
        .pointer { 
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%); z-index: 10;
            width: 40px; height: 50px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }

        .btn-spin {
            background: var(--main); color: white; border: none; padding: 18px 80px;
            font-size: 22px; font-weight: 900; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.4); transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-spin:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="minigame-hub.html" class="btn-back">
                <i class="fas fa-chevron-left"></i> Quay lại
            </a>
        </div>
        <div class="wallet">
            <div class="badge" style="color:var(--green)"><i class="fas fa-wallet"></i> <span id="vnd-val">0</span> VNĐ</div>
            <div class="badge" style="color:var(--blue)"><i class="fas fa-coins"></i> <span id="xu-val">0</span> Xu</div>
            <div class="badge" style="color:var(--gold)"><i class="fas fa-ticket-alt"></i> <span id="diem-val">0</span> Vé</div>
        </div>
    </nav>

    <div class="exchange-box">
        <div style="text-align:left">
            <b style="color:var(--green)">Mua Vé Quay</b><br>
            <small style="color:#aaa">10.000 VNĐ = 1 Vé Quay</small>
        </div>
        <button class="btn-exchange" onclick="exchange()">MUA NGAY</button>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <button class="btn-spin" id="spin-btn" onclick="startSpin()">QUAY (1 vé)</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const rewards = [
        { label: "2 XU",  val: 2,  color: "#ff4757", chance: 70 },
        { label: "5 XU",  val: 5,  color: "#2ed573", chance: 15 },
        { label: "10 XU", val: 10, color: "#1e90ff", chance: 9 },
        { label: "20 XU", val: 20, color: "#ffa502", chance: 5 },
        { label: "50 XU", val: 50, color: "#3742fa", chance: 1 }
    ];

    let vndHienTai = 0;
    let xuHienTai = 0;
    let diemHienTai = 0;
    let userUID = null;
    let isSpinning = false;
    let currentRotation = 0;

    function drawWheel() {
        const numSegments = rewards.length;
        const anglePerSegment = (Math.PI * 2) / numSegments;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        rewards.forEach((reward, i) => {
            const angle = i * anglePerSegment;
            ctx.beginPath();
            ctx.fillStyle = reward.color;
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 240, angle, angle + anglePerSegment);
            ctx.fill();
            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(angle + anglePerSegment / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 28px Arial";
            ctx.fillText(reward.label, 210, 10);
            ctx.restore();
        });
        ctx.beginPath();
        ctx.arc(250, 250, 240, 0, Math.PI * 2);
        ctx.lineWidth = 10; ctx.strokeStyle = "#fff"; ctx.stroke();
        ctx.beginPath();
        ctx.arc(250, 250, 30, 0, Math.PI * 2);
        ctx.fillStyle = "#fff"; ctx.fill();
    }
    drawWheel();

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            userUID = user.uid;
            db.ref('web_users/' + userUID).on('value', s => {
                const d = s.val() || {};
                vndHienTai = d.balance || 0;     // Đơn vị VNĐ nạp vào
                xuHienTai = d.points || 0;       // Đơn vị Xu thưởng trong game
                diemHienTai = d.spin_points || 0; // Số lượt quay
                
                document.getElementById('vnd-val').innerText = vndHienTai.toLocaleString('vi-VN');
                document.getElementById('xu-val').innerText = xuHienTai.toLocaleString('vi-VN');
                document.getElementById('diem-val').innerText = diemHienTai;
            });
        } else { window.location.href = 'login.html'; }
    });

    async function exchange() {
        const giaVe = 10000; // 10.000 VNĐ một vé
        if (vndHienTai < giaVe) return alert("Số dư VNĐ không đủ! Vui lòng nạp thêm.");
        
        if (confirm(`Bạn muốn đổi ${giaVe.toLocaleString('vi-VN')} VNĐ để lấy 1 Vé quay?`)) {
            await db.ref('web_users/' + userUID).update({
                balance: vndHienTai - giaVe,
                spin_points: diemHienTai + 1
            });
            alert("Đổi vé thành công!");
        }
    }

    async function startSpin() {
        if (isSpinning || diemHienTai < 1) return alert("Bạn không có vé quay!");
        isSpinning = true;
        document.getElementById('spin-btn').disabled = true;
        
        // Trừ 1 vé quay trước khi quay
        await db.ref('web_users/' + userUID + '/spin_points').set(diemHienTai - 1);

        const rand = Math.random() * 100;
        let acc = 0, resultIdx = 0;
        for (let i = 0; i < rewards.length; i++) {
            acc += rewards[i].chance;
            if (rand <= acc) { resultIdx = i; break; }
        }

        const segmentAngle = 360 / rewards.length;
        const targetRotation = (360 - (resultIdx * segmentAngle)) - (segmentAngle / 2) - 90;
        const extraSpins = 360 * 10; 
        currentRotation += extraSpins + (targetRotation - (currentRotation % 360) + 360) % 360;
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(async () => {
            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;
            const res = rewards[resultIdx];
            
            if(res.val >= 20) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            alert(`🎉 Chúc mừng! Bạn quay trúng ${res.label}`);
            
            // CỘNG THƯỞNG VÀO XU (biến points)
            await db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + res.val);
        }, 5100);
    }
</script>
</body>
</html>
