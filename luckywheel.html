<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko | Casino Vòng Quay May Mắn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --main: #ff4757; --bg: #050810; --card: #0c1222;
            --gold: #ffd700; --blue: #00d4ff; --text: #8b9bb4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; text-align: center; min-height: 100vh; padding-bottom: 50px; overflow-x: hidden; }

        /* Navbar */
        .navbar { 
            background: rgba(12, 18, 34, 0.95); height: 80px; display: flex; 
            align-items: center; justify-content: space-between; padding: 0 25px; 
            border-bottom: 1px solid rgba(255,255,255,0.03); position: sticky; top: 0; z-index: 1000;
        }
        .nav-brand { font-weight: 900; font-size: 22px; cursor: pointer; letter-spacing: 1px; color: #fff; }
        .wallet { display: flex; gap: 10px; }
        .badge { padding: 10px 18px; border-radius: 12px; font-weight: bold; font-size: 14px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); }

        /* Khu vực đổi điểm */
        .exchange-box {
            background: var(--card); margin: 30px auto; padding: 25px;
            border-radius: 20px; max-width: 480px; border: 1px solid rgba(0, 212, 255, 0.15);
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .exchange-title { font-weight: 800; color: #fff; font-size: 19px; text-align: left; }
        .btn-exchange {
            background: var(--blue); color: #000; border: none; padding: 12px 26px;
            border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-exchange:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3); }

        /* --- VÒNG QUAY DÙNG HÌNH ẢNH MỚI --- */
        .wheel-stage { 
            position: relative; width: 380px; height: 380px; margin: 50px auto; 
            /* Thêm viền trang trí bên ngoài */
            background: radial-gradient(circle, #fff 60%, var(--gold) 100%);
            border-radius: 50%; padding: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 15px rgba(255, 71, 87, 0.3);
        }
        
        /* Kim chỉ: Dùng ảnh hoặc CSS tam giác */
        .pointer { 
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%); 
            z-index: 100; width: 50px; height: 60px;
            /* Nếu bạn có ảnh pointer, hãy bỏ comment dòng dưới và sửa link */
            /* background-image: url('https://i.imgur.com/pointer.png'); background-size: contain; background-repeat: no-repeat; */
            /* Nếu không có ảnh, dùng CSS tam giác dưới đây: */
            background: #fff;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* Vòng quay ảnh */
        .wheel-canvas {
            width: 100%; height: 100%; border-radius: 50%;
            /* === ĐÂY LÀ ĐƯỜNG LINK ẢNH VÒNG QUAY CỰC ĐẸP === */
            background-image: url('https://i.imgur.com/v8tT9oV.png'); 
            background-size: cover; background-position: center;
            /* Hiệu ứng xoay nảy nhẹ thực tế */
            transition: transform 6s cubic-bezier(0.1, 0.7, 0.2, 1.02);
            transform: rotate(0deg);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5); /* Đổ bóng bên trong tạo độ khối */
        }

        /* Tâm vòng quay trang trí */
        .wheel-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: #fff; border-radius: 50%;
            border: 5px solid var(--main); z-index: 10;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: var(--main); font-size: 20px;
        }

        /* Nút quay */
        .btn-spin {
            background: var(--main); color: white; border: none; padding: 20px 80px;
            font-size: 22px; font-weight: 900; border-radius: 50px; cursor: pointer;
            box-shadow: 0 12px 30px rgba(255, 71, 87, 0.5); transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1.5px;
        }
        .btn-spin:hover:not(:disabled) { transform: translateY(-3px) scale(1.03); filter: brightness(1.1); }
        .btn-spin:disabled { background: #334155; cursor: not-allowed; box-shadow: none; opacity: 0.4; }

        .info-text { margin-top: 35px; color: var(--text); font-size: 14px; line-height: 1.7; max-width: 520px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand" onclick="location.href='minigame-hub.html'">YEAMIKO <span style="color:var(--main)">CASINO</span></div>
        <div class="wallet">
            <div class="badge" style="color: var(--blue);"><i class="fas fa-coins"></i> <span id="xu-val">0</span> Xu</div>
            <div class="badge" style="color: var(--gold);"><i class="fas fa-ticket-alt"></i> <span id="diem-val">0</span> Điểm</div>
        </div>
    </nav>

    <div class="exchange-box">
        <div class="exchange-title">
            Đổi Vé Quay
            <div style="font-size: 13px; color: var(--text); font-weight: normal; margin-top: 4px;">10 Xu = 5 Điểm (Vé quay)</div>
        </div>
        <button class="btn-exchange" onclick="exchange()">ĐỔI NGAY</button>
    </div>

    <div class="wheel-stage">
        <div class="pointer"></div>
        <div class="wheel-center">YMK</div>
        <div id="wheel" class="wheel-canvas"></div>
    </div>

    <button class="btn-spin" id="spin-btn" onclick="startSpin()">QUAY (Tốn 5 Điểm)</button>

    <div class="info-text">
        Dùng Điểm (Vé quay) để nhận lại Xu!<br>
        Tỉ lệ: 4x(70%) | 5x(15%) | 10x(9%) | 20x(5%) | 50x(1%)<br>
        Lưu ý: Kim chỉ vào ô nào, bạn nhận chính xác Xu của ô đó.
    </div>

<script>
    // CẤU HÌNH FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let xuHienTai = 0;   // Biến 'points'
    let diemHienTai = 0; // Biến 'spin_points'
    let userUID = null;
    let isSpinning = false;
    let totalRotation = 0;

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            userUID = user.uid;
            db.ref('web_users/' + userUID).on('value', s => {
                const data = s.val() || {};
                xuHienTai = data.points || 0;
                diemHienTai = data.spin_points || 0;
                document.getElementById('xu-val').innerText = xuHienTai.toLocaleString();
                document.getElementById('diem-val').innerText = diemHienTai.toLocaleString();
            });
        } else { window.location.href = 'login.html'; }
    });

    // Hàm đổi 10 Xu lấy 5 Điểm
    async function exchange() {
        if (xuHienTai < 10) return alert("Bạn không đủ Xu để đổi!");
        if (confirm("Xác nhận đổi 10 Xu lấy 5 Điểm Quay (Vé quay)?")) {
            await db.ref('web_users/' + userUID).update({
                points: xuHienTai - 10,
                spin_points: diemHienTai + 5
            });
        }
    }

    // CẤU HÌNH GÓC XOAY MỚI (Khớp chính xác với link ảnh mẫu)
    // Mỗi ô 72 độ. Góc deg là góc tâm của ô.
    const rewards = [
        { name: "4 Xu", val: 4,  deg: 36 },   // Ô 0: Tâm ở 36 độ
        { name: "5 Xu", val: 5,  deg: 108 },  // Ô 1: Tâm ở 108 độ
        { name: "10 Xu", val: 10, deg: 180 }, // Ô 2: Tâm ở 180 độ
        { name: "20 Xu", val: 20, deg: 252 }, // Ô 3: Tâm ở 252 độ
        { name: "50 Xu", val: 50, deg: 324 }  // Ô 4: Tâm ở 324 độ
    ];

    async function startSpin() {
        if (isSpinning) return;
        if (diemHienTai < 5) return alert("Bạn không đủ Điểm quay!");

        isSpinning = true;
        document.getElementById('spin-btn').disabled = true;

        // Trừ 5 điểm ngay
        await db.ref('web_users/' + userUID + '/spin_points').set(diemHienTai - 5);

        // Logic tỉ lệ
        const rand = Math.random() * 100;
        let result;
        if (rand < 70) result = rewards[0];      // 70% ra 4 Xu
        else if (rand < 85) result = rewards[1]; // 15% ra 5 Xu
        else if (rand < 94) result = rewards[2]; // 9% ra 10 Xu
        else if (rand < 99) result = rewards[3]; // 5% ra 20 Xu
        else result = rewards[4];                // 1% ra 50 Xu

        // --- CÔNG THỨC XOAY CHUẨN MỚI ---
        // 1. totalRotation += 3600: Quay ít nhất 10 vòng
        // 2. (360 - result.deg): Xoay ngược lại đúng tâm ô thưởng
        // 3. - 36: Không cần -36 nữa vì deg ở trên đã là góc TÂM của ô.
        totalRotation += 3600 + (360 - result.deg);
        
        document.getElementById('wheel').style.transform = `rotate(${totalRotation}deg)`;

        // Thêm tiếng kêu click click khi quay
        const clickSound = new Audio('https://www.soundjay.com/buttons/button-16.mp3');
        const clickInterval = setInterval(() => {
            if(isSpinning) clickSound.play();
            else clearInterval(clickInterval);
        }, 150); // Tiếng click nhanh dần

        setTimeout(async () => {
            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;
            
            if(result.val >= 20) confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            
            alert(`🎉 Chúc mừng! Bạn quay trúng ${result.name}`);

            // Cộng lại vào Xu (biến points)
            await db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + result.val);
        }, 6500); // Tăng thời gian đợi để khớp hiệu ứng elastic
    }
</script>
</body>
</html>
