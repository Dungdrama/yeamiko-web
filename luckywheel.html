<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Yeamiko | Lucky Wheel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff4757; --bg: #0b0f19; }
        body { background: var(--bg); color: white; text-align: center; font-family: sans-serif; }
        
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 50px auto; }
        
        /* Hình ảnh vòng quay */
        #wheel { 
            width: 100%; height: 100%; 
            border-radius: 50%; 
            border: 5px solid white;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); 
        }

        /* Kim chỉ */
        .pointer { 
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 30px; z-index: 10; color: white; font-size: 30px;
        }

        .btn-spin {
            margin-top: 30px; padding: 15px 40px; 
            background: var(--main); border: none; color: white;
            font-weight: bold; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>VÒNG QUAY MAY MẮN</h1>
    <div class="wheel-container">
        <div class="pointer"><i class="fas fa-caret-down"></i></div>
        <img id="wheel" src="https://i.imgur.com/8f5X6H5.png" alt="Wheel"> </div>
    <button class="btn-spin" onclick="spinWheel()">QUAY THƯỞNG</button>

    <script>
        let isSpinning = false;

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;

            const wheel = document.getElementById('wheel');
            const randomDeg = Math.floor(Math.random() * 360) + 3600; // Quay ít nhất 10 vòng
            
            wheel.style.transform = `rotate(${randomDeg}deg)`;

            setTimeout(() => {
                isSpinning = false;
                alert("Chúc mừng! Bạn đã nhận được quà (Logic cộng Xu sẽ đặt ở đây)");
                // Tại đây bạn dùng Firebase transaction để cộng điểm cho user
            }, 4000);
        }
    </script>
</body>
</html>
