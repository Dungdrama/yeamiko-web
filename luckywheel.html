<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko | Vòng Quay Điểm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --main: #ff4757; --bg: #0b0f19; --gold: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; text-align: center; min-height: 100vh; }

        /* Navbar */
        .navbar { background: rgba(15, 23, 42, 0.95); height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 2px solid var(--main); }
        #user-status { color: var(--gold); font-weight: bold; background: rgba(255,215,0,0.1); padding: 5px 15px; border-radius: 20px; }

        /* Vòng quay CSS */
        .wheel-container { position: relative; width: 340px; height: 340px; margin: 50px auto; }
        
        .wheel-canvas {
            width: 100%; height: 100%; border-radius: 50%;
            border: 10px solid #fff; position: relative; overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            background: #fff; box-shadow: 0 0 30px rgba(255, 71, 87, 0.3);
        }

        .segment {
            position: absolute; width: 50%; height: 50%;
            transform-origin: bottom right;
            transform: rotate(calc(72deg * var(--i))) skewY(-18deg);
            background: var(--clr);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; justify-content: center; align-items: center;
        }

        .segment span {
            position: absolute; margin: 40px 0 0 40px;
            transform: rotate(45deg) skewY(18deg);
            font-weight: 900; color: white; font-size: 15px;
            text-shadow: 1px 1px 2px #000;
        }

        .pointer {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            z-index: 100; font-size: 40px; color: #fff; filter: drop-shadow(0 0 5px #000);
        }

        .btn-spin {
            background: var(--main); color: white; border: none; padding: 15px 60px;
            font-size: 20px; font-weight: 900; border-radius: 50px; cursor: pointer;
            margin-top: 30px; box-shadow: 0 10px 20px rgba(255, 71, 87, 0.4);
        }
        .btn-spin:disabled { background: #475569; cursor: not-allowed; transform: none; }
        
        .info { margin-top: 20px; color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-weight:900" onclick="location.href='minigame-hub.html'">YEAMIKO <span style="color:var(--main)">WHEEL</span></div>
        <div id="user-status"><i class="fas fa-star"></i> <span id="points-val">0</span> Điểm</div>
    </nav>

    <div class="wheel-container">
        <div class="pointer"><i class="fas fa-caret-down"></i></div>
        <div id="wheel" class="wheel-canvas">
            <div class="segment" style="--i:0; --clr:#ff4757;"><span>4đ</span></div>
            <div class="segment" style="--i:1; --clr:#2ed573;"><span>5đ</span></div>
            <div class="segment" style="--i:2; --clr:#1e90ff;"><span>10đ</span></div>
            <div class="segment" style="--i:3; --clr:#ffa502;"><span>20đ</span></div>
            <div class="segment" style="--i:4; --clr:#3742fa;"><span>50đ</span></div>
        </div>
    </div>

    <button class="btn-spin" id="spin-btn" onclick="startSpin()">QUAY (5đ)</button>
    
    <div class="info">
        Hệ thống sẽ trừ 5 điểm mỗi lượt quay.<br>
        Tỉ lệ: 4đ(70%) | 5đ(15%) | 10đ(9%) | 20đ(5%) | 50đ(1%)
    </div>

<script>
    // CẤU HÌNH FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentPoints = 0;
    let isSpinning = false;
    let userUID = null;
    let rotation = 0;

    // Lấy dữ liệu điểm từ Firebase
    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            userUID = user.uid;
            db.ref('web_users/' + userUID + '/points').on('value', s => {
                currentPoints = s.val() || 0;
                document.getElementById('points-val').innerText = currentPoints;
            });
        } else { window.location.href = 'login.html'; }
    });

    const rewards = [
        { name: "4 Điểm",  value: 4,  chance: 70, deg: 0 },
        { name: "5 Điểm",  value: 5,  chance: 15, deg: 72 },
        { name: "10 Điểm", value: 10, chance: 9,  deg: 144 },
        { name: "20 Điểm", value: 20, chance: 5,  deg: 216 },
        { name: "50 Điểm", value: 50, chance: 1,  deg: 288 }
    ];

    function getReward() {
        const r = Math.random() * 100;
        let acc = 0;
        for (let res of rewards) {
            acc += res.chance;
            if (r <= acc) return res;
        }
        return rewards[0];
    }

    async function startSpin() {
        if (isSpinning) return;
        if (currentPoints < 5) return alert("Bạn không đủ điểm!");

        isSpinning = true;
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;

        // Trừ phí 5 điểm
        await db.ref('web_users/' + userUID + '/points').set(currentPoints - 5);

        const result = getReward();
        
        // Tính góc xoay (Quay 10 vòng + góc tới ô thưởng)
        // Căn giữa ô bằng cách trừ đi 36 độ (72/2)
        const targetDeg = result.deg;
        rotation += 3600 + (360 - targetDeg) - 36; 
        
        document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;

        setTimeout(async () => {
            isSpinning = false;
            btn.disabled = false;

            if(result.value >= 20) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            alert(`🎉 Bạn nhận được: ${result.name}`);

            // Cộng điểm thưởng
            await db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + result.value);
        }, 5000);
    }
</script>
</body>
</html>
