<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Yeamiko Network | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <i class="fas fa-bars"></i>
        <div id="user-display">Đang tải...</div>
    </div>

    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="/" class="active"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="/luat-choi.html"><i class="fas fa-gavel"></i> Luật chơi</a>
        <a href="/profile.html"><i class="fas fa-user"></i> Profile của tôi</a>
        <hr style="border:0.1px solid #333; margin:10px;">
        <div id="auth-section" style="padding:0 10px;"></div>
    </div>

    <div class="main-content">
        <h1>Chào mừng tới Yeamiko.fun</h1>
        <div class="card" style="margin-top:20px;">
            <p>Server Minecraft đa nền tảng cực vui.</p>
            <p style="color:var(--primary); font-weight:bold; font-size:20px; margin-top:10px;">IP: YEAMIKO.FUN</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        // DÁN MÃ TỪ ẢNH FIREBASE CỦA BẠN VÀO ĐÂY
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQLbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            projectId: "yeamiko-web",
            storageBucket: "yeamiko-web.firebasestorage.app",
            messagingSenderId: "380442978172",
            appId: "1:380442978172:web:d28cf59982da86278266f9",
            measurementId: "G-QD3CV8DFGE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();

        onAuthStateChanged(auth, (user) => {
            const display = document.getElementById('user-display');
            const authSection = document.getElementById('auth-section');
            if (user) {
                display.innerText = "Chào, " + user.email.split('@')[0];
                authSection.innerHTML = `<button onclick="window.logout()" class="btn-auth" style="background:#e74c3c; color:white;">Đăng xuất</button>`;
            } else {
                display.innerText = "Khách";
                authSection.innerHTML = `<button onclick="window.location.href='/login.html'" class="btn-auth">Đăng nhập</button>`;
            }
        });

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
