<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko Network | Minecraft Community</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #00d4ff; --bg: #0a0a0a; --sidebar: #111; --discord-color: #5865F2; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; display: flex; }

        /* --- SIDEBAR ĐEN ĐỒNG BỘ --- */
        .sidebar { 
            width: 250px; background: var(--sidebar); height: 100vh; 
            position: fixed; padding: 25px; color: white; z-index: 1000;
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar .logo { font-size: 26px; font-weight: 900; color: var(--main); margin-bottom: 40px; text-align: center; letter-spacing: 2px; }
        .sidebar a { display: flex; align-items: center; color: #bbb; padding: 15px; text-decoration: none; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar a i { margin-right: 12px; width: 20px; text-align: center; }
        .sidebar a.active { background: rgba(0, 212, 255, 0.1); color: var(--main); font-weight: bold; }
        
        .btn-discord { margin-top: auto; background: var(--discord-color) !important; color: white !important; justify-content: center; }
        .btn-discord img { width: 20px; margin-right: 10px; filter: brightness(0) invert(1); }

        .main-content { margin-left: 250px; flex: 1; }
        .hero { height: 75vh; background: linear-gradient(to bottom, rgba(0,0,0,0.4), var(--bg)), url('https://iili.io/qmYvvC7.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .hero h1 { font-size: clamp(40px, 8vw, 80px); text-transform: uppercase; letter-spacing: 8px; }
        .ip-box { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); padding: 12px 30px; border-radius: 50px; border: 2px solid var(--main); display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; }
        .ip-box:hover { transform: scale(1.05); }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 0 5px; border-top: 1px solid #222; border-right: none; }
            .sidebar .logo { display: none; }
            .sidebar a { flex-direction: column; font-size: 10px; flex: 1; padding: 10px 0; margin-bottom: 0; }
            .sidebar a i { margin-right: 0; font-size: 18px; margin-bottom: 4px; }
            .btn-discord { margin-top: 0; background: transparent !important; }
            .btn-discord img { margin-right: 0; filter: none; }
            .main-content { margin-left: 0; padding-bottom: 80px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html" class="active"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="forum.html"><i class="fas fa-comments"></i><span>Diễn đàn</span></a>
        <a href="profile.html"><i class="fas fa-user"></i><span>Hồ sơ</span></a>
        <a href="https://discord.gg/TCyKP7m9Bs" target="_blank" class="btn-discord">
            <img src="https://iili.io/qm4f0PI.png" alt="Discord"><span>Discord</span>
        </a>
    </div>
    <div class="main-content">
        <section class="hero">
            <h1>YEAMIKO</h1>
            <div class="ip-box" onclick="copyIP()">
                <span>IP SERVER</span> <b id="server-ip">Yeamiko.fun</b> <i class="fas fa-copy"></i>
            </div>
        </section>
    </div>
    <script>
        function copyIP() {
            const ip = document.getElementById('server-ip').innerText;
            navigator.clipboard.writeText(ip);
            alert("Đã sao chép IP: " + ip);
        }
    </script>
</body>
</html>
