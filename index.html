<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko Network | Minecraft Community</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --main: #00d4ff; 
            --bg: #0a0a0a; 
            --sidebar: #111; 
            --card: rgba(255, 255, 255, 0.05); 
            --discord-color: #5865F2; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; display: flex; }

        /* --- MENU TOGGLE --- */
        .menu-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 1500;
            background: var(--main); color: #000; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer; font-size: 24px;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4); transition: 0.3s;
        }
        .menu-toggle:hover { transform: scale(1.1); }

        /* --- SIDEBAR (MENU TRƯỢT) --- */
        .sidebar { 
            width: 280px; background: var(--sidebar); height: 100vh; position: fixed; 
            padding: 30px 20px; color: white; z-index: 2000;
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.1);
            left: -280px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.open { left: 0; }
        .sidebar .logo { 
            font-size: 28px; font-weight: 900; color: var(--main); margin-bottom: 50px; 
            text-align: center; letter-spacing: 3px; text-transform: uppercase; 
        }
        .sidebar a { 
            display: flex; align-items: center; color: #bbb; padding: 16px; 
            text-decoration: none; border-radius: 12px; margin-bottom: 10px; transition: 0.3s; font-size: 16px;
        }
        .sidebar a i { margin-right: 15px; width: 20px; text-align: center; font-size: 1.2rem; }
        .sidebar a:hover, .sidebar a.active { background: rgba(0, 212, 255, 0.1); color: var(--main); font-weight: bold; }

        .btn-discord { 
            margin-top: auto; background: var(--discord-color) !important; color: white !important; 
            justify-content: center; font-weight: bold; 
        }

        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1800; display: none; backdrop-filter: blur(5px);
        }
        .sidebar-overlay.show { display: block; }

        /* --- MAIN CONTENT & HERO SECTION --- */
        .main-content { flex: 1; position: relative; width: 100%; }
        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), var(--bg)), url('https://iili.io/qmYvvC7.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }

        .hero h1 { 
            font-size: clamp(60px, 15vw, 120px); 
            text-transform: uppercase; 
            letter-spacing: 15px; 
            margin-bottom: 10px; 
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        @keyframes titleGlow {
            from { text-shadow: 0 0 20px rgba(0, 212, 255, 0.6); }
            to { text-shadow: 0 0 40px rgba(0, 212, 255, 0.9), 0 0 10px #fff; }
        }

        .mc-server-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 550px;
            display: flex; align-items: center;
            padding: 20px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 20px; position: relative; overflow: hidden;
            margin-top: 30px;
        }
        .mc-server-box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--main);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .mc-server-icon {
            width: 70px; height: 70px; margin-right: 20px;
            border-radius: 15px; border: 2px solid rgba(255,255,255,0.1);
            background: #111; overflow: hidden;
        }

        .mc-server-info { flex: 1; text-align: left; }
        .mc-row-top { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 5px; }
        .mc-row-top b { font-size: 1.4rem; color: #fff; letter-spacing: 1px; }
        
        #player-count {
            color: #2ecc71; font-family: monospace; font-size: 1.1rem;
            background: rgba(46, 204, 113, 0.1); padding: 2px 8px; border-radius: 5px;
        }

        .mc-ip {
            display: inline-block; background: rgba(0, 212, 255, 0.1);
            color: var(--main); padding: 4px 12px; border-radius: 8px;
            font-size: 0.9rem; font-weight: bold; border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .copy-overlay {
            position: absolute; inset: 0; background: var(--main);
            display: flex; align-items: center; justify-content: center;
            color: #000; font-weight: 900; font-size: 1.2rem;
            opacity: 0; transform: translateY(100%); transition: 0.3s ease;
        }
        .mc-server-box:active .copy-overlay { transform: translateY(0); opacity: 1; }

        .section { padding: 100px 20px; max-width: 1200px; margin: 0 auto; }
        .section-title { font-size: 2.5rem; margin-bottom: 60px; text-align: center; }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .image-card { position: relative; border-radius: 24px; overflow: hidden; aspect-ratio: 16/9; cursor: pointer; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .image-card:hover img { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>

    <div class="sidebar-overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html" class="active"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="forum.html"><i class="fas fa-comments"></i><span>Diễn đàn</span></a>
        <a href="checkin.html"><i class="fas fa-calendar-check"></i><span>Điểm danh</span></a>
        <a href="shop.html"><i class="fas fa-shopping-cart"></i><span>Cửa hàng</span></a>
        
        <a href="minigame-hub.html"><i class="fas fa-gamepad"></i><span>Giải trí</span></a>

        <a href="profile.html"><i class="fas fa-user"></i><span>Hồ sơ</span></a>
        
        <a href="https://discord.gg/TCyKP7m9Bs" target="_blank" class="btn-discord">
            <i class="fab fa-discord" style="margin-right: 10px;"></i>
            <span>Discord</span>
        </a>
    </div>

    <div class="main-content">
        <section class="hero">
            <h1>YEAMIKO</h1>
            <p style="color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem;">Hành trình sinh tồn đỉnh cao</p>
            
            <div class="mc-server-box" onclick="copyIP()">
                <div class="mc-server-icon">
                    <img id="server-icon-img" src="" alt="Y" style="display: none; width: 100%; height: 100%; object-fit: cover;">
                    <div id="default-icon" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:1.8rem; color:var(--main);">Y</div>
                </div>
                
                <div class="mc-server-info">
                    <div class="mc-row-top">
                        <b>YEAMIKO NETWORK</b>
                        <span id="player-count">0/0</span>
                    </div>
                    <div class="mc-ip">Yeamiko.fun</div>
                </div>
                
                <div id="copy-overlay" class="copy-overlay">
                    <i class="fas fa-copy" style="margin-right: 10px;"></i> ĐÃ SAO CHÉP IP!
                </div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">HÀNH TRÌNH TẠI YEAMIKO</h2>
            <div class="image-grid">
                <div class="image-card"><img src="https://iili.io/qmg9Qb1.jpg"></div>
                <div class="image-card"><img src="https://iili.io/qmg9LOP.jpg"></div>
                <div class="image-card"><img src="https://iili.io/qmg9DWg.jpg"></div>
            </div>
        </section>

        <footer style="padding: 40px; text-align: center; opacity: 0.3;">
            <p>&copy; 2026 Yeamiko Network</p>
        </footer>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }

        const ipStr = "Yeamiko.fun";
        function copyIP() {
            navigator.clipboard.writeText(ipStr);
            const overlay = document.getElementById('copy-overlay');
            overlay.style.opacity = '1';
            setTimeout(() => { overlay.style.opacity = '0'; }, 1500);
        }

        async function fetchServerStatus() {
            try {
                const response = await fetch(`https://api.mcstatus.io/v2/status/java/${ipStr}`);
                const data = await response.json();
                if (data.online) {
                    document.getElementById('player-count').innerText = `${data.players.online}/${data.players.max}`;
                    if (data.icon) {
                        document.getElementById('server-icon-img').src = data.icon;
                        document.getElementById('server-icon-img').style.display = 'block';
                        document.getElementById('default-icon').style.display = 'none';
                    }
                } else {
                    document.getElementById('player-count').innerText = "OFFLINE";
                    document.getElementById('player-count').style.color = "#ff4d4d";
                }
            } catch (e) { console.error(e); }
        }
        fetchServerStatus();
        setInterval(fetchServerStatus, 60000);
    </script>
</body>
</html>
