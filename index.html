<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ - Yeamiko</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #00d4ff; --sidebar: rgba(17, 17, 17, 0.95); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            background-image: url('https://i.ibb.co/6R8mH6P/qm-Yvv-C7.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white;
            overflow-x: hidden;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: 0;
        }

        /* Sidebar mặc định cho máy tính */
        .sidebar { 
            width: 250px; 
            background: var(--sidebar); 
            height: 100vh; 
            position: fixed; 
            padding: 25px; 
            z-index: 10;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }
        .sidebar .logo { font-size: 26px; font-weight: bold; color: var(--main); margin-bottom: 40px; text-align: center; }
        .sidebar a { 
            display: flex; align-items: center; color: #ddd; padding: 15px; 
            text-decoration: none; border-radius: 12px; margin-bottom: 10px; transition: 0.3s; 
        }
        .sidebar a i { margin-right: 12px; width: 20px; text-align: center; }
        .sidebar a.active { background: rgba(0, 212, 255, 0.2); color: var(--main); font-weight: bold; }
        .logout-item { color: #ff4d4d !important; border: 1px solid rgba(255, 77, 77, 0.3); }

        /* Nội dung chính */
        .main-content { 
            margin-left: 250px; 
            flex: 1; 
            z-index: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: clamp(28px, 8vw, 60px); text-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        p { font-size: clamp(14px, 4vw, 20px); opacity: 0.8; margin-top: 10px; }

        /* --- SỬA LỖI MOBILE Ở ĐÂY --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            
            /* Biến sidebar thành thanh ngang ở trên */
            .sidebar { 
                width: 100%; 
                height: auto; 
                position: fixed; /* Cố định trên đầu */
                top: 0;
                padding: 10px; 
                flex-direction: row; 
                justify-content: space-around; 
                align-items: center;
                backdrop-filter: blur(10px);
            }
            
            .sidebar .logo { display: none; } /* Ẩn logo trên mobile để đỡ chật */
            
            .sidebar a { 
                margin-bottom: 0; 
                padding: 10px; 
                font-size: 13px; 
                flex-direction: column; /* Icon trên chữ dưới cho gọn */
                gap: 5px;
            }
            .sidebar a i { margin-right: 0; font-size: 18px; }
            .logout-item { border: none; color: #ff4d4d !important; }

            /* Đẩy nội dung xuống để không bị menu che */
            .main-content { 
                margin-left: 0; 
                margin-top: 80px; 
                height: calc(100vh - 80px); 
            }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html" class="active"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="forum.html"><i class="fas fa-comments"></i><span>Diễn đàn</span></a>
        <a href="profile.html"><i class="fas fa-user"></i><span>Hồ sơ</span></a>
        <a href="#" id="btn-logout" class="logout-item"><i class="fas fa-sign-out-alt"></i><span>Thoát</span></a>
    </div>

    <div class="main-content">
        <h1>Chào mừng tới Yeamiko</h1>
        <p>Hệ thống quản lý máy chủ Minecraft chuyên nghiệp</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if (!user) { window.location.href = 'login.html'; }
        });

        document.getElementById('btn-logout').onclick = (e) => {
            e.preventDefault();
            if(confirm("Dũng muốn đăng xuất?")) {
                signOut(auth).then(() => { window.location.href = 'login.html'; });
            }
        };
    </script>
</body>
</html>
