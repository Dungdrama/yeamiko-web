<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Yeamiko Network | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="navbar"><div id="user-display">Đang kết nối...</div></div>
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="/" class="active"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="/profile.html"><i class="fas fa-user"></i> Profile của tôi</a>
        <div id="auth-section" style="padding:10px;"></div>
    </div>
    <div class="main-content">
        <h1>CHÀO MỪNG ĐẾN VỚI <span style="color:#00d4ff">YEAMIKO.FUN</span></h1>
        <div class="card" style="margin-top:20px;">
            <p>Server Minecraft Java & Bedrock cực vui!</p>
            <p style="color:#00d4ff; font-weight:bold; font-size:1.5em; margin-top:10px;">IP: YEAMIKO.FUN</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            projectId: "yeamiko-web",
            storageBucket: "yeamiko-web.firebasestorage.app",
            messagingSenderId: "380442978172",
            appId: "1:380442978172:web:52eeb187628ed3518266f9",
            measurementId: "G-TQEK8VF978"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            const display = document.getElementById('user-display');
            const authSection = document.getElementById('auth-section');
            if (user) {
                display.innerText = "Chào, " + user.email.split('@')[0];
                authSection.innerHTML = `<button id="logout-btn" class="btn-auth" style="background:#e74c3c; color:white;">Đăng xuất</button>`;
                document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
            } else {
                display.innerText = "Khách";
                authSection.innerHTML = `<button onclick="window.location.href='/login.html'" class="btn-auth">Đăng nhập</button>`;
            }
        });
    </script>
</body>
</html>
