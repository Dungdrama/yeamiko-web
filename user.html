<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ người dùng | Yeamiko</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #00d4ff; --bg: #f4f7f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .user-card { background: white; width: 90%; max-width: 400px; padding: 40px 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .u-avt { width: 130px; height: 130px; border-radius: 50%; border: 5px solid var(--main); object-fit: cover; margin-bottom: 20px; }
        h2 { color: #333; margin-bottom: 5px; }
        .uid-tag { display: inline-block; background: #eee; padding: 4px 12px; border-radius: 15px; font-size: 12px; color: #777; margin-bottom: 20px; }
        .back-btn { display: block; text-decoration: none; color: var(--main); font-weight: bold; margin-top: 20px; }
        #loader { position: absolute; top:0; left:0; width:100%; height:100%; background:white; display:flex; justify-content:center; align-items:center; border-radius:25px; z-index:10; }
    </style>
</head>
<body>

    <div class="user-card">
        <div id="loader"><b>Đang kết nối Yeamiko...</b></div>
        <img id="u-avatar" class="u-avt" src="https://ui-avatars.com/api/?name=User">
        <h2 id="u-name">Đang tải...</h2>
        <div class="uid-tag" id="u-id">@loading</div>
        <p style="color: #666; font-size: 14px;">Thành viên chính thức của hệ thống Yeamiko Network.</p>
        <a href="forum.html" class="back-btn"><i class="fas fa-arrow-left"></i> Quay lại diễn đàn</a>
    </div>

    <script>
        // Cấu hình Firebase của Dũng
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };

        // Khởi tạo Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // Lấy ID từ URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        if (userId) {
            db.ref('users/' + userId).once('value')
                .then((snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        document.getElementById('u-name').innerText = data.name || "Thành viên";
                        document.getElementById('u-avatar').src = data.avatar || `https://ui-avatars.com/api/?name=${data.name}`;
                    } else {
                        document.getElementById('u-name').innerText = "Người dùng mới";
                    }
                    document.getElementById('u-id').innerText = "@" + userId.substring(0, 8);
                })
                .catch((error) => {
                    console.error(error);
                    document.getElementById('u-name').innerText = "Lỗi kết nối Database";
                })
                .finally(() => {
                    document.getElementById('loader').style.display = 'none';
                });
        } else {
            window.location.href = 'forum.html';
        }
    </script>
</body>
</html>
