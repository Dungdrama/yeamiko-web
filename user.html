<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ người dùng | Yeamiko</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 400px; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .u-avt { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #00d4ff; object-fit: cover; margin-bottom: 15px; }
        h2 { margin: 10px 0; color: #333; }
        .tag { color: #888; font-size: 14px; margin-bottom: 20px; background: #eee; display: inline-block; padding: 4px 10px; border-radius: 10px; }
        .back { display: block; margin-top: 25px; color: #00d4ff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <img id="u-avatar" class="u-avt" src="https://ui-avatars.com/api/?name=User">
        <h2 id="u-name">Đang tải...</h2>
        <div class="tag" id="u-id">@yeamiko_user</div>
        <p style="color:#666; font-size: 14px;">Thành viên chính thức của Yeamiko Network</p>
        <a href="forum.html" class="back">← Quay lại diễn đàn</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');

        async function loadProfile() {
            if (!userId) {
                window.location.href = 'forum.html';
                return;
            }

            try {
                const snapshot = await get(ref(db, `users/${userId}`));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('u-name').innerText = data.name || "Thành viên";
                    document.getElementById('u-avatar').src = data.avatar || `https://ui-avatars.com/api/?name=${data.name || 'U'}`;
                    document.getElementById('u-id').innerText = "@" + userId.substring(0, 8);
                } else {
                    document.getElementById('u-name').innerText = "Chưa cập nhật hồ sơ";
                    document.getElementById('u-id').innerText = "@" + userId.substring(0, 8);
                }
            } catch (err) {
                document.getElementById('u-name').innerText = "Lỗi kết nối database";
            }
        }

        loadProfile();
    </script>
</body>
</html>
