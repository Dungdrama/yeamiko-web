<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ người dùng | Yeamiko</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 50px 20px; }
        .user-card { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .u-avt { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #00d4ff; object-fit: cover; }
        h2 { margin: 15px 0 5px; color: #333; }
        p { color: #777; font-size: 14px; }
        .back-link { display: inline-block; margin-top: 25px; color: #00d4ff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="user-card">
        <img id="u-avatar" class="u-avt" src="https://ui-avatars.com/api/?name=Loading">
        <h2 id="u-name">Đang tải...</h2>
        <p id="u-id">@uid</p>
        <a href="forum.html" class="back-link">← Quay lại Diễn đàn</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const uid = new URLSearchParams(window.location.search).get('id');
        if (uid) {
            get(ref(db, `users/${uid}`)).then(s => {
                if (s.exists()) {
                    const d = s.val();
                    document.getElementById('u-name').innerText = d.name || "Thành viên Yeamiko";
                    document.getElementById('u-avatar').src = d.avatar || `https://ui-avatars.com/api/?name=${d.name}`;
                    document.getElementById('u-id').innerText = "@" + uid.substring(0,8);
                } else {
                    document.getElementById('u-name').innerText = "Không tìm thấy người dùng";
                }
            });
        }
    </script>
</body>
</html>
