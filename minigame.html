<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Mini Game | Yeamiko Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; 
            min-height: 100vh; 
            padding-bottom: 50px;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; text-align: center; }

        .header { margin-bottom: 40px; margin-top: 20px; }
        .header h1 { color: var(--main); font-size: 32px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        .user-info { background: var(--card); display: inline-block; padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(0, 212, 255, 0.3); }

        /* Chọn Game */
        .game-selector { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .game-btn { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 12px 25px; cursor: pointer; border-radius: 12px; 
            transition: 0.3s; font-weight: bold;
        }
        .game-btn:hover { border-color: var(--main); background: rgba(0, 212, 255, 0.1); }
        .game-btn.active { background: var(--main); color: #000; box-shadow: 0 0 15px var(--main); }

        /* Board chơi game */
        .game-board { 
            background: var(--card); padding: 30px; border-radius: 24px; 
            min-height: 450px; display: none; border: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px);
        }
        .game-board.show { display: block; animation: fadeIn 0.5s ease; }

        /* Đố Vui UI */
        #question { font-size: 20px; margin-bottom: 25px; line-height: 1.5; color: #e2e8f0; }
        .answer-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .ans-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 15px; border-radius: 12px; cursor: pointer; 
            text-align: left; transition: 0.2s; font-size: 16px;
        }
        .ans-btn:hover { background: var(--main); color: black; transform: translateX(5px); }
        .status-bar { margin-top: 25px; font-size: 14px; color: var(--main); font-weight: bold; }

        /* Lật Hình UI */
        .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 450px; margin: 20px auto; }
        .memory-card { 
            height: 90px; background: #1e293b; border-radius: 12px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-size: 32px; 
            transition: 0.4s; border: 2px solid rgba(255,255,255,0.05);
        }
        .memory-card.flipped { transform: rotateY(180deg); background: var(--main); border-color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .memory-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-gamepad"></i> MINI GAMES</h1>
        <div class="user-info">
            <i class="fas fa-wallet" style="color: var(--main);"></i> 
            <span id="display-points">Đang tải...</span>
        </div>
    </div>

    <div class="game-selector">
        <button id="btn-quiz" class="game-btn" onclick="switchGame('quiz')">ĐỐ VUI MINECRAFT</button>
        <button id="btn-memory" class="game-btn" onclick="switchGame('memory')">LẬT HÌNH TRÍ NHỚ</button>
    </div>

    <div id="board-quiz" class="game-board">
        <h2 style="margin-bottom: 20px; font-size: 16px; color: #94a3b8;">TRẢ LỜI ĐÚNG 5 CÂU LIÊN TIẾP ĐỂ NHẬN 2 XU</h2>
        <div id="quiz-box">
            <p id="question">Câu hỏi đang tải...</p>
            <div class="answer-grid" id="answer-options"></div>
            <p id="quiz-status" class="status-bar">CHUỖI THẮNG: 0/5</p>
        </div>
    </div>

    <div id="board-memory" class="game-board">
        <h2 style="margin-bottom: 10px; font-size: 16px; color: #94a3b8;">TÌM CẶP GIỐNG NHAU NHẬN 1 XU</h2>
        <div class="memory-grid" id="memory-grid"></div>
        <button class="game-btn" style="margin-top: 20px; font-size: 13px;" onclick="initMemory()">LÀM MỚI BÀN CHƠI</button>
    </div>
</div>

<script>
    // --- CẤU HÌNH FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userUID = null;
    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            userUID = user.uid;
            db.ref('web_users/' + userUID + '/points').on('value', snap => {
                document.getElementById('display-points').innerText = (snap.val() || 0) + " Xu";
            });
        } else { window.location.href = 'login.html'; }
    });

    function switchGame(type) {
        document.querySelectorAll('.game-board').forEach(b => b.classList.remove('show'));
        document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('board-' + type).classList.add('show');
        document.getElementById('btn-' + type).classList.add('active');
        if(type === 'quiz') initQuiz();
        if(type === 'memory') initMemory();
    }

    // --- LOGIC TRÒ ĐỐ VUI (30 CÂU + SHUFFLE) ---
    const quizBank = [
        { q: "Lệnh để dịch chuyển về nhà là gì?", a: ["/home", "/spawn", "/warp", "/tp"], c: "/home" },
        { q: "Block nào cứng nhất không thể phá trong Survival?", a: ["Sắt", "Bedrock", "Obsidian", "Kim cương"], c: "Bedrock" },
        { q: "Cần bao nhiêu kim cương để làm 1 cái Cúp?", a: ["2", "3", "4", "5"], c: "3" },
        { q: "Mob nào sợ mèo và sẽ bỏ chạy?", a: ["Zombie", "Creeper", "Skeleton", "Spider"], c: "Creeper" },
        { q: "Nguyên liệu chính để chế tạo Cổng Địa Ngục?", a: ["Đá", "Hắc diện thạch", "Gạch", "Cát"], c: "Hắc diện thạch" },
        { q: "Lệnh để xem số Xu hiện có là gì?", a: ["/money", "/points", "/balance", "/xu"], c: "/points" },
        { q: "Mob nào bị sát thương khi chạm vào nước?", a: ["Zombie", "Enderman", "Creeper", "Pig"], c: "Enderman" },
        { q: "Để chế tạo Bàn Chế Tạo cần bao nhiêu gỗ?", a: ["2", "4", "6", "8"], c: "4" },
        { q: "Lệnh để nhắn tin riêng cho người khác?", a: ["/tell", "/msg", "/w", "Cả 3 đều đúng"], c: "Cả 3 đều đúng" },
        { q: "Tên chính xác của Server Yeamiko?", a: ["Yeamiko", "Yumiko", "Yamiko", "Yemiko"], c: "Yeamiko" },
        { q: "Vật phẩm giúp bạn bay lượn trên trời?", a: ["Áo giáp", "Elytra", "Thảm bay", "Cánh chim"], c: "Elytra" },
        { q: "Nơi cư ngụ của Rồng End?", a: ["Nether", "The End", "Overworld", "Cave"], c: "The End" },
        { q: "Mob ném quả cầu lửa ở Nether?", a: ["Blaze", "Ghast", "Piglin", "Wither"], c: "Ghast" },
        { q: "Thức ăn yêu thích của Gấu Trúc?", a: ["Táo", "Trúc", "Cà rốt", "Cá"], c: "Trúc" },
        { q: "Lệnh nhận quà miễn phí hàng ngày?", a: ["/kit", "/gift", "/daily", "/free"], c: "/kit" },
        { q: "Dụng cụ dùng để xén lông cừu?", a: ["Kiếm", "Kéo (Shears)", "Rìu", "Xẻng"], c: "Kéo (Shears)" },
        { q: "Mob được tạo ra khi sét đánh trúng Heo?", a: ["Zombie Pigman", "Wither", "Hoglin", "Giant"], c: "Zombie Pigman" },
        { q: "Lệnh khóa rương bảo vệ tài sản?", a: ["/lock", "/cprivate", "/protect", "/set"], c: "/cprivate" },
        { q: "Kim cương thường ở tọa độ Y bao nhiêu?", a: ["-58", "11", "64", "0"], c: "-58" },
        { q: "Vật phẩm giúp hồi sinh khi chết?", a: ["Totem", "Táo vàng", "Giường", "Lệnh /back"], c: "Totem" },
        { q: "Con vật nào có thể cưỡi nhưng cần yên?", a: ["Heo", "Gà", "Bò", "Cừu"], c: "Heo" },
        { q: "Enchant nào giúp câu cá nhanh hơn?", a: ["Lure", "Power", "Luck", "Sharpness"], c: "Lure" },
        { q: "Lệnh để xem danh sách người chơi online?", a: ["/list", "/online", "/who", "Cả 3 đều đúng"], c: "Cả 3 đều đúng" },
        { q: "Block rơi ra đá cuội khi đào?", a: ["Đất", "Đá (Stone)", "Cát", "Gỗ"], c: "Đá (Stone)" },
        { q: "Táo vàng phù phép cần nguyên liệu gì?", a: ["Block Vàng", "Thỏi Vàng", "Hạt Vàng", "Kim cương"], c: "Block Vàng" },
        { q: "Mob nào nổ tung khi đứng gần?", a: ["Zombie", "Creeper", "Skeleton", "Enderman"], c: "Creeper" },
        { q: "Lệnh quay về điểm hồi sinh của Server?", a: ["/spawn", "/hub", "/lobby", "Cả 3 đúng"], c: "/spawn" },
        { q: "Nguyên liệu chế tạo mắt nhện lên men?", a: ["Đường + Nấm", "Mắt nhện + Đường + Nấm", "Thuốc", "Cát"], c: "Mắt nhện + Đường + Nấm" },
        { q: "Cái gì dùng để thuần hóa Sói?", a: ["Thịt", "Xương", "Cá", "Táo"], c: "Xương" },
        { q: "Vật phẩm nào rơi ra từ bộ xương?", a: ["Thịt", "Cung & Xương", "Sắt", "Vàng"], c: "Cung & Xương" }
    ];

    let currentSet = [];
    let step = 0;

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function initQuiz() {
        step = 0;
        currentSet = shuffle([...quizBank]).slice(0, 5); // Lấy 5 câu ngẫu nhiên
        renderQuestion();
    }

    function renderQuestion() {
        const data = currentSet[step];
        document.getElementById('question').innerText = `Câu ${step + 1}: ${data.q}`;
        const container = document.getElementById('answer-options');
        container.innerHTML = "";
        
        shuffle([...data.a]).forEach(ans => {
            const b = document.createElement('button');
            b.className = "ans-btn";
            b.innerText = ans;
            b.onclick = () => {
                if(ans === data.c) {
                    step++;
                    if(step === 5) {
                        alert("🎉 QUÁ GIỎI! Bạn nhận được 2 Xu.");
                        db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + 2);
                        initQuiz();
                    } else renderQuestion();
                } else {
                    alert("❌ Sai rồi! Đáp án đúng là: " + data.c);
                    initQuiz();
                }
                document.getElementById('quiz-status').innerText = `CHUỖI THẮNG: ${step}/5`;
            };
            container.appendChild(b);
        });
    }

    // --- LOGIC TRÒ LẬT HÌNH ---
    const icons = ['💎', '🍎', '⚔️', '🛡️', '🌋', '🌲', '🦴', '🌟'];
    let flipped = [];
    let matched = 0;

    function initMemory() {
        matched = 0; flipped = [];
        const grid = document.getElementById('memory-grid');
        grid.innerHTML = "";
        const cards = shuffle([...icons, ...icons]);
        cards.forEach((icon, i) => {
            const div = document.createElement('div');
            div.className = "memory-card";
            div.dataset.icon = icon;
            div.onclick = () => {
                if(flipped.length < 2 && !div.classList.contains('flipped')) {
                    div.classList.add('flipped');
                    div.innerText = icon;
                    flipped.push(div);
                    if(flipped.length === 2) {
                        if(flipped[0].dataset.icon === flipped[1].dataset.icon) {
                            matched += 2; flipped = [];
                            if(matched === 16) {
                                alert("🎁 Chúc mừng! Bạn nhận được 1 Xu.");
                                db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + 1);
                                setTimeout(initMemory, 2000);
                            }
                        } else {
                            setTimeout(() => {
                                flipped.forEach(c => { c.classList.remove('flipped'); c.innerText = ""; });
                                flipped = [];
                            }, 800);
                        }
                    }
                }
            };
            grid.appendChild(div);
        });
    }

    // Khởi động mặc định
    switchGame('quiz');
</script>

</body>
</html>
