<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko MiniGames | Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); --red: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background: #0b0f19; color: white; min-height: 100vh; overflow-x: hidden; }

        /* THANH MENU NẰM TRÊN */
        .navbar { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; 
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-links { display: flex; gap: 20px; }
        .nav-item { 
            color: #94a3b8; text-decoration: none; font-weight: 600; font-size: 14px; 
            cursor: pointer; transition: 0.3s; padding: 5px 10px; border-radius: 5px;
        }
        .nav-item:hover, .nav-item.active { color: var(--main); background: rgba(0, 212, 255, 0.1); }

        .container { max-width: 900px; margin: 30px auto; padding: 0 15px; }

        /* THÔNG TIN NGƯỜI DÙNG */
        .status-header { 
            display: flex; justify-content: space-between; background: var(--card); 
            padding: 15px 25px; border-radius: 15px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05);
        }

        /* KHU VỰC GAME */
        .game-wrapper { 
            background: var(--card); border-radius: 25px; padding: 40px; 
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            min-height: 400px; position: relative;
        }
        
        /* THANH THỜI GIAN */
        .timer-box { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        #timer-progress { width: 100%; height: 100%; background: var(--main); transition: width 1s linear; }

        /* CÂU HỎI & ĐÁP ÁN */
        #question-text { font-size: 22px; font-weight: 600; margin-bottom: 30px; min-height: 80px; }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .ans-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 18px; border-radius: 12px; cursor: pointer; 
            text-align: center; transition: 0.3s; font-size: 16px;
        }
        .ans-btn:hover { background: var(--main); color: black; transform: translateY(-3px); font-weight: bold; }

        .game-over-screen { display: none; text-align: center; padding: 50px 0; }
        .btn-retry { background: var(--main); color: black; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        @media (max-width: 600px) { .ans-grid { grid-template-columns: 1fr; } .navbar { font-size: 12px; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-weight: 800; color: var(--main); font-size: 18px;">YEAMIKO GAME</div>
        <div class="nav-links">
            <div class="nav-item active" onclick="changeGame('quiz')">ĐỐ VUI NHẬN XU</div>
            <div class="nav-item" onclick="changeGame('memory')">LẬT HÌNH (SẮP CÓ)</div>
            <div class="nav-item" onclick="changeGame('rank')">BẢNG XẾP HẠNG</div>
        </div>
    </nav>

    <div class="container">
        <div class="status-header">
            <div><i class="fas fa-coins" style="color: #ffd700;"></i> <span id="points">0</span> Xu</div>
            <div id="limit-text" style="color: var(--main); font-weight: bold;">Lượt chơi: 0/5</div>
        </div>

        <div class="game-wrapper" id="game-container">
            <div id="quiz-section">
                <div class="timer-box"><div id="timer-progress"></div></div>
                <div id="question-text">Đang chuẩn bị câu hỏi...</div>
                <div class="ans-grid" id="ans-options"></div>
                <div style="margin-top: 30px; font-weight: bold; color: #94a3b8;">CHUỖI THẮNG: <span id="streak" style="color: var(--main);">0</span>/5</div>
            </div>

            <div id="over-section" class="game-over-screen">
                <h2 id="over-msg">BẠN ĐÃ HẾT LƯỢT HÔM NAY</h2>
                <p style="margin-top: 10px; color: #94a3b8;">Vui lòng quay lại sau 24h để tiếp tục kiếm Xu.</p>
                <button class="btn-retry" onclick="location.reload()">QUAY LẠI TRANG CHỦ</button>
            </div>
        </div>
    </div>

<script>
    // --- CẤU HÌNH FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- KHO 100 CÂU HỎI (MẪU 30 CÂU, BẠN CỨ THÊM VÀO DƯỚI DẠNG NÀY ĐẾN 100) ---
    const rawBank = [
        {q: "Lệnh để dịch chuyển về nhà là gì?", a: ["/home", "/spawn", "/warp", "/tp"], c: "/home"},
        {q: "Block nào không thể phá vỡ ở Survival?", a: ["Bedrock", "Obsidian", "Sắt", "Kim cương"], c: "Bedrock"},
        {q: "Cần bao nhiêu kim cương để làm 1 cái Cúp?", a: ["2", "3", "4", "5"], c: "3"},
        {q: "Tên server bạn đang chơi là gì?", a: ["Yeamiko", "Minevn", "Aiko", "Miko"], c: "Yeamiko"},
        {q: "Mob nào sợ mèo?", a: ["Creeper", "Zombie", "Spider", "Slime"], c: "Creeper"},
        {q: "Nether Portal làm từ gì?", a: ["Obsidian", "Gỗ", "Đá", "Sắt"], c: "Obsidian"},
        {q: "Lệnh xem xu là gì?", a: ["/points", "/money", "/xu", "/me"], c: "/points"},
        {q: "Con rồng End nằm ở đâu?", a: ["The End", "Nether", "Overworld", "Moon"], c: "The End"},
        {q: "Mob nào nổ khi lại gần?", a: ["Creeper", "Enderman", "Pig", "Cow"], c: "Creeper"},
        {q: "Vật phẩm để bay là gì?", a: ["Elytra", "Cánh", "Thảm", "Pháo"], c: "Elytra"},
        // Bạn hãy copy thêm các câu hỏi khác vào đây...
        {q: "Để có 100 câu, bạn chỉ cần copy dòng này và đổi nội dung...", a: ["Đúng", "Sai", "Mệt", "Nghỉ"], c: "Đúng"}
    ];

    let userUID = null;
    let playCount = 0;
    let streak = 0;
    let timeLeft = 15;
    let timer;
    let currentQuestions = [];

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            userUID = user.uid;
            checkDailyLimit();
            loadPoints();
        } else { window.location.href = 'login.html'; }
    });

    async function loadPoints() {
        db.ref('web_users/' + userUID + '/points').on('value', s => {
            document.getElementById('points').innerText = s.val() || 0;
        });
    }

    async function checkDailyLimit() {
        const today = new Date().toLocaleDateString('en-GB');
        const snap = await db.ref('web_users/' + userUID).get();
        const data = snap.val() || {};

        if(data.lastDate === today) {
            playCount = data.playCount || 0;
        } else {
            playCount = 0;
            await db.ref('web_users/' + userUID).update({ lastDate: today, playCount: 0 });
        }
        
        document.getElementById('limit-text').innerText = `Lượt chơi: ${playCount}/5`;
        if(playCount >= 5) showGameOver();
        else initQuiz();
    }

    function initQuiz() {
        streak = 0;
        // Xáo trộn 100 câu và lấy 5 câu ngẫu nhiên cho lượt này
        currentQuestions = rawBank.sort(() => Math.random() - 0.5).slice(0, 5);
        renderQuestion();
    }

    function renderQuestion() {
        if(streak === 5) return finishGame();
        
        resetTimer();
        const data = currentQuestions[streak];
        document.getElementById('question-text').innerText = `Câu ${streak + 1}: ${data.q}`;
        document.getElementById('streak').innerText = streak;
        
        const options = document.getElementById('ans-options');
        options.innerHTML = "";
        
        [...data.a].sort(() => Math.random() - 0.5).forEach(ans => {
            const btn = document.createElement('button');
            btn.className = "ans-btn";
            btn.innerText = ans;
            btn.onclick = () => checkAnswer(ans, data.c);
            options.appendChild(btn);
        });
    }

    function checkAnswer(ans, correct) {
        clearInterval(timer);
        if(ans === correct) {
            streak++;
            renderQuestion();
        } else {
            alert("Sai rồi! Bạn phải chơi lại từ đầu.");
            initQuiz();
        }
    }

    function resetTimer() {
        clearInterval(timer);
        timeLeft = 15;
        const bar = document.getElementById('timer-progress');
        bar.style.width = "100%";
        bar.style.background = "var(--main)";

        timer = setInterval(() => {
            timeLeft--;
            const percent = (timeLeft / 15) * 100;
            bar.style.width = percent + "%";
            if(timeLeft < 5) bar.style.background = "var(--red)";

            if(timeLeft <= 0) {
                clearInterval(timer);
                alert("Hết thời gian!");
                initQuiz();
            }
        }, 1000);
    }

    async function finishGame() {
        playCount++;
        await db.ref('web_users/' + userUID).update({ playCount: playCount });
        await db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + 2);
        alert("🎉 Chúc mừng! Bạn nhận được 2 Xu.");
        location.reload();
    }

    function showGameOver() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('over-section').style.display = 'block';
    }

    function changeGame(type) {
        if(type === 'quiz') location.reload();
        else alert("Tính năng này đang được phát triển!");
    }
</script>
</body>
</html>
