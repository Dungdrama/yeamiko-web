<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Mini Game | Yeamiko Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); --red: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); color: white; min-height: 100vh; padding-bottom: 50px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; text-align: center; }
        .header { margin-bottom: 30px; }
        .header h1 { color: var(--main); font-size: 28px; text-transform: uppercase; letter-spacing: 3px; }
        .user-info { background: var(--card); display: inline-block; padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(0, 212, 255, 0.3); margin-top: 10px; }
        
        .game-selector { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .game-btn { background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 25px; cursor: pointer; border-radius: 12px; transition: 0.3s; font-weight: bold; }
        .game-btn.active { background: var(--main); color: #000; box-shadow: 0 0 15px var(--main); }

        .game-board { background: var(--card); padding: 30px; border-radius: 24px; min-height: 450px; display: none; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); position: relative; }
        .game-board.show { display: block; }

        /* Timer UI */
        .timer-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: var(--main); transition: width 1s linear; }

        .answer-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .ans-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px; border-radius: 10px; cursor: pointer; text-align: left; transition: 0.2s; }
        .ans-btn:hover { background: var(--main); color: black; }

        .limit-msg { color: var(--red); font-weight: bold; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MINI GAMES YEAMIKO</h1>
        <div class="user-info">
            <span id="display-points">Đang tải...</span> | 
            <span id="display-limit">Lượt: 0/5</span>
        </div>
    </div>

    <div class="game-selector">
        <button id="btn-quiz" class="game-btn" onclick="switchGame('quiz')">ĐỐ VUI (2 XU)</button>
    </div>

    <div id="board-quiz" class="game-board">
        <div class="timer-container"><div id="timer-bar"></div></div>
        <p id="question" style="font-size: 18px; min-height: 60px;">Đang tải câu hỏi...</p>
        <div class="answer-grid" id="answer-options"></div>
        <p id="quiz-status" style="margin-top: 20px; color: var(--main); font-weight: bold;">CHUỖI THẮNG: 0/5</p>
        <p id="limit-error" class="limit-msg"></p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const quizBank = [
        { q: "Lệnh để dịch chuyển về nhà là gì?", a: ["/home", "/spawn", "/warp", "/tp"], c: "/home" },
        { q: "Block nào cứng nhất không thể phá trong Survival?", a: ["Sắt", "Bedrock", "Obsidian", "Kim cương"], c: "Bedrock" },
        { q: "Cần bao nhiêu kim cương để làm 1 cái Cúp?", a: ["2", "3", "4", "5"], c: "3" },
        { q: "Mob nào sợ mèo và sẽ bỏ chạy?", a: ["Zombie", "Creeper", "Skeleton", "Spider"], c: "Creeper" },
        { q: "Nguyên liệu chính để chế tạo Cổng Địa Ngục?", a: ["Đá", "Hắc diện thạch", "Gạch", "Cát"], c: "Hắc diện thạch" },
        { q: "Lệnh để xem số Xu hiện có là gì?", a: ["/money", "/points", "/balance", "/xu"], c: "/points" },
        { q: "Mob nào bị sát thương khi chạm vào nước?", a: ["Zombie", "Enderman", "Creeper", "Pig"], c: "Enderman" },
        { q: "Để chế tạo Bàn Chế Tạo cần bao nhiêu gỗ?", a: ["2", "4", "6", "8"], c: "4" },
        { q: "Lệnh để nhắn tin riêng cho người khác?", a: ["/tell", "/msg", "/w", "Cả 3 đều đúng"], c: "Cả 3 đều đúng" },
        { q: "Tên chính xác của Server Yeamiko?", a: ["Yeamiko", "Yumiko", "Yamiko", "Yemiko"], c: "Yeamiko" }
        // ... (Bạn có thể thêm tiếp 20 câu cũ vào đây để đầy đủ 30 câu)
    ];

    let userUID = null;
    let playCount = 0;
    let lastPlayDate = "";
    let timeLeft = 15;
    let timerInterval;
    let currentStep = 0;
    let currentQuestions = [];

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            userUID = user.uid;
            loadUserData();
        } else { window.location.href = 'login.html'; }
    });

    async function loadUserData() {
        const snapshot = await db.ref('web_users/' + userUID).get();
        const data = snapshot.val() || {};
        document.getElementById('display-points').innerText = (data.points || 0) + " Xu";
        
        const today = new Date().toLocaleDateString('en-GB'); // Định dạng DD/MM/YYYY
        if(data.lastPlayDate === today) {
            playCount = data.playCount || 0;
        } else {
            playCount = 0;
            await db.ref('web_users/' + userUID).update({ lastPlayDate: today, playCount: 0 });
        }
        document.getElementById('display-limit').innerText = `Lượt: ${playCount}/5`;
    }

    function switchGame(type) {
        if(playCount >= 5) {
            document.getElementById('limit-error').innerText = "Bạn đã hết 5 lượt chơi hôm nay! Quay lại sau 24h nhé.";
            return;
        }
        document.getElementById('board-quiz').classList.add('show');
        document.getElementById('btn-quiz').classList.add('active');
        initQuiz();
    }

    function initQuiz() {
        currentStep = 0;
        currentQuestions = quizBank.sort(() => Math.random() - 0.5).slice(0, 5);
        renderQuestion();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 15;
        updateTimerBar();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerBar();
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                handleTimeout();
            }
        }, 1000);
    }

    function updateTimerBar() {
        const percent = (timeLeft / 15) * 100;
        document.getElementById('timer-bar').style.width = percent + "%";
        document.getElementById('timer-bar').style.background = timeLeft < 5 ? "#ef4444" : "#00d4ff";
    }

    function handleTimeout() {
        alert("⏰ Hết thời gian! Bạn bị tính là sai.");
        currentStep = 0;
        initQuiz();
    }

    function renderQuestion() {
        startTimer();
        const data = currentQuestions[currentStep];
        document.getElementById('question').innerText = `Câu ${currentStep + 1}: ${data.q}`;
        const container = document.getElementById('answer-options');
        container.innerHTML = "";
        
        data.a.sort(() => Math.random() - 0.5).forEach(ans => {
            const b = document.createElement('button');
            b.className = "ans-btn";
            b.innerText = ans;
            b.onclick = () => checkAnswer(ans, data.c);
            container.appendChild(b);
        });
        document.getElementById('quiz-status').innerText = `CHUỖI THẮNG: ${currentStep}/5`;
    }

    async function checkAnswer(selected, correct) {
        clearInterval(timerInterval);
        if(selected === correct) {
            currentStep++;
            if(currentStep === 5) {
                alert("🎉 CHÚC MỪNG! Bạn nhận được 2 Xu.");
                await db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + 2);
                
                // Cập nhật giới hạn lượt chơi
                playCount++;
                await db.ref('web_users/' + userUID).update({ playCount: playCount });
                loadUserData();

                if(playCount >= 5) {
                    document.getElementById('board-quiz').classList.remove('show');
                    alert("Bạn đã hoàn thành 5 lượt chơi hôm nay!");
                } else {
                    initQuiz();
                }
            } else {
                renderQuestion();
            }
        } else {
            alert("❌ Sai rồi! Đáp án đúng là: " + correct);
            initQuiz();
        }
    }
</script>
</body>
</html>
