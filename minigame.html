<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko Ultra Quiz | Hardcore Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0b0f19; --card: rgba(255, 255, 255, 0.05); --gold: #ffd700; --red: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; }

        /* THANH MENU MỚI */
        .navbar { 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); 
            height: 70px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000;
        }
        .nav-brand { font-weight: 900; font-size: 22px; letter-spacing: 2px; cursor: pointer; }
        .nav-menu { display: flex; gap: 20px; }
        .nav-link { 
            color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 600; 
            cursor: pointer; transition: 0.3s; padding: 8px 12px; border-radius: 8px;
        }
        .nav-link:hover { color: var(--main); background: rgba(0, 212, 255, 0.1); }
        .nav-link i { margin-right: 5px; }

        .container { max-width: 850px; margin: 40px auto; padding: 0 20px; }

        /* GAME BOARD */
        .game-card { 
            background: var(--card); border-radius: 25px; padding: 45px; 
            border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* TIMER BAR */
        .timer-wrap { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 35px; }
        #timer-bar { width: 100%; height: 100%; background: var(--main); border-radius: 10px; transition: width 1s linear; }

        #question { font-size: 24px; font-weight: 700; margin-bottom: 35px; min-height: 70px; line-height: 1.4; }
        
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .ans-btn { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; font-size: 16px;
        }
        .ans-btn:hover { background: var(--main); color: #000; font-weight: bold; transform: translateY(-3px); }

        /* OVERLAY TIẾP TỤC */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.98); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        .btn-action { 
            width: 220px; padding: 16px; margin: 12px; border: none; border-radius: 12px; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-next { background: var(--main); color: #000; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
        .btn-next:hover { transform: scale(1.05); }

        .streak-tag { margin-top: 35px; font-weight: bold; color: #94a3b8; text-transform: uppercase; font-size: 13px; }
        #streak-val { color: var(--main); font-size: 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 650px) { .ans-grid { grid-template-columns: 1fr; } .navbar { padding: 0 10px; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand" onclick="location.reload()">YEAMIKO <span style="color:var(--main)">ULTRA</span></div>
        <div class="nav-menu">
            <div class="nav-link" onclick="alert('Hãy trả lời đúng 5 câu cực khó để nhận 2 Xu. Bạn có 15 giây mỗi câu!')"><i class="fas fa-info-circle"></i> HD</div>
            <div class="nav-link" onclick="alert('Sự kiện X2 Xu vào mỗi tối Thứ 7!')"><i class="fas fa-star"></i> Sự Kiện</div>
            <div class="nav-link" onclick="window.location.href='shop.html'"><i class="fas fa-exchange-alt"></i> Đổi Quà</div>
        </div>
        <div id="user-points" style="color: var(--gold); font-weight: bold; font-size: 14px;">0 Xu</div>
    </nav>

    <div class="container">
        <div class="game-card">
            <div id="correct-overlay" class="overlay">
                <i class="fas fa-check-circle" style="color: var(--main); font-size: 60px; margin-bottom: 20px;"></i>
                <h2 style="margin-bottom: 25px;">ĐÁP ÁN CHÍNH XÁC!</h2>
                <button class="btn-action btn-next" onclick="nextQuestion()">Câu tiếp theo</button>
                <p style="color: #94a3b8; font-size: 12px;">Hệ thống đang tạm dừng đếm ngược</p>
            </div>

            <div class="timer-wrap"><div id="timer-bar"></div></div>
            
            <div id="game-content">
                <p id="question">Đang tải câu hỏi...</p>
                <div class="ans-grid" id="ans-options"></div>
                <div class="streak-tag">Tiến trình lượt: <span id="streak-val">0</span>/5</div>
            </div>
        </div>
        <div id="limit-msg" style="text-align: center; margin-top: 25px; color: var(--red); font-weight: bold;"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- BỘ CÂU HỎI ULTRA HARD (70 CÂU) ---
    const ultraBank = [
        {q: "Tốc độ truyền tín hiệu của Redstone qua một khối đặc là bao nhiêu giây?", a: ["0.05s", "0.1s", "Tức thì", "0.2s"], c: "Tức thì"},
        {q: "Block nào sau đây có thể chặn hoàn toàn tia laser của Guardian?", a: ["Kính", "Lá cây", "Phễu (Hopper)", "Cột rào"], c: "Lá cây"},
        {q: "Để chế tạo một khối Netherite, bạn cần bao nhiêu thỏi Netherite?", a: ["4", "9", "8", "5"], c: "9"},
        {q: "Cá nóc (Pufferfish) khi ăn sẽ gây ra hiệu ứng nào sau đây?", a: ["Đói III", "Nhiễm độc IV", "Buồn nôn II", "Cả 3 hiệu ứng trên"], c: "Cả 3 hiệu ứng trên"},
        {q: "Trong Minecraft 1.20, vật phẩm nào dùng để rèn (trim) họa tiết lên giáp?", a: ["Upgrade Template", "Armor Trim Template", "Smithing Tool", "Pattern Stone"], c: "Armor Trim Template"},
        {q: "Độ bền (Durability) của một cái Cúp Kim Cương là bao nhiêu?", a: ["1321", "1561", "2031", "2501"], c: "1561"},
        {q: "Mob nào không bao giờ bị trúng tên từ cung tên?", a: ["Enderman", "Wither", "Ghast", "Blaze"], c: "Enderman"},
        {q: "Khi dùng kéo (Shears) lên một con Mooshroom, nó sẽ biến thành gì?", a: ["Bò thường", "Bò nấm nâu", "Thịt bò", "Mất máu"], c: "Bò thường"},
        {q: "Tầm xa tối đa của một cái Becon (Đèn hiệu) cấp 4 là bao nhiêu block?", a: ["30", "40", "50", "100"], c: "50"},
        {q: "Trong Redstone, 'T-Flip Flop' dùng để làm gì?", a: ["Tăng cường tín hiệu", "Chuyển nút bấm thành đòn bẩy", "Kéo dài thời gian", "Đảo ngược tín hiệu"], c: "Chuyển nút bấm thành đòn bẩy"},
        // Bạn có thể thêm các câu tương tự vào đây để đủ 200 câu...
        {q: "Vật phẩm nào có thể dùng làm nhiên liệu trong lò nung lâu nhất?", a: ["Khối than", "Xô dung nham", "Thanh lửa", "Khối gỗ"], c: "Xô dung nham"},
        {q: "Lượng máu của Warden là bao nhiêu?", a: ["300 (150 tim)", "500 (250 tim)", "200 (100 tim)", "100 (50 tim)"], c: "500 (250 tim)"},
        {q: "Con vật nào có thể phát hiện 'Ancient City' (Thành phố cổ)?", a: ["Mèo", "Chó", "Axolotl", "Không có con nào"], c: "Không có con nào"},
        {q: "Enchant 'Channeling' chỉ hoạt động khi nào?", a: ["Trời mưa", "Trời bão có sấm", "Dưới nước", "Ban đêm"], c: "Trời bão có sấm"},
        {q: "Một khối Sculk Sensor có bán kính cảm biến là bao nhiêu?", a: ["4 block", "8 block", "12 block", "16 block"], c: "8 block"}
        // --- DÁN TIẾP VÀO TRONG MẢNG ultraBank ---
        {q: "Trong Minecraft, 1 tick của game tương ứng với bao nhiêu giây thực tế?", a: ["0.01 giây", "0.05 giây", "0.1 giây", "0.5 giây"], c: "0.05 giây"},
        {q: "Cần bao nhiêu khối sắt để tạo ra 1 con Iron Golem?", a: ["3 khối", "4 khối", "5 khối", "6 khối"], c: "4 khối"},
        {q: "Vật phẩm nào có thể dùng để đi xuyên qua Bedrock ở trần Địa Ngục (Nether)?", a: ["Ngọc End", "Thuyền", "Xe mỏ", "Cả 3 đều đúng"], c: "Cả 3 đều đúng"},
        {q: "Tên của 'Seed' thế giới Minecraft đầu tiên được tìm thấy có hình ảnh nền của Menu chính là gì?", a: ["215190158", "809186798024", "289849025", "111111111"], c: "215190158"},
        {q: "Một khối 'Honey Block' có thể kéo tối đa bao nhiêu khối khác khi dùng Piston?", a: ["10 khối", "12 khối", "15 khối", "Không kéo được"], c: "12 khối"},
        {q: "Mob nào có tầm nhìn xa nhất trong Minecraft (trên 100 block)?", a: ["Enderman", "Warden", "Ghast", "Ender Dragon"], c: "Ghast"},
        {q: "Khi ném thuốc độc vào một con Zombie, điều gì sẽ xảy ra?", a: ["Nó bị mất máu", "Nó được hồi máu", "Nó bị chậm lại", "Không có tác dụng"], c: "Nó được hồi máu"},
        {q: "Trong Redstone, một 'Observer' sẽ phát ra tín hiệu có độ dài bao nhiêu tick?", a: ["1 tick", "2 ticks", "4 ticks", "tùy vào block"], c: "2 ticks"},
        {q: "Công thức để tạo ra 'Dragon's Breath' (Hơi thở của rồng) là gì?", a: ["Dùng chai rỗng thu thập khi rồng phun lửa", "Nấu trứng rồng", "Kết hợp nước mắt quỷ", "Rơi ra khi rồng chết"], c: "Dùng chai rỗng thu thập khi rồng phun lửa"},
        {q: "Một con dân làng (Villager) có bao nhiêu khe chứa đồ (inventory slots) ẩn?", a: ["4", "8", "12", "Không có"], c: "8"},
        {q: "Block nào sau đây Piston KHÔNG THỂ đẩy được?", a: ["Thùng đồ (Chest)", "Khối mật ong", "Lò nung (Furnace)", "Cả A và C đều đúng (tùy phiên bản)"], c: "Cả A và C đều đúng (tùy phiên bản)"},
        {q: "Để có được hiệu ứng 'Bad Omen', bạn phải giết mob nào?", a: ["Vindicator", "Pillager cầm cờ", "Ravager", "Evoker"], c: "Pillager cầm cờ"},
        {q: "Khi ở dưới nước, tầm nhìn của người chơi sẽ xa hơn nếu đội mũ có Enchant nào?", a: ["Aqua Affinity", "Respiration", "Depth Strider", "Không liên quan"], c: "Respiration"},
        {q: "Mob nào được gọi là 'Thực thể 303' trong các truyền thuyết Creepypasta?", a: ["Lỗi game", "Herobrine", "Một nhân viên bị đuổi việc", "Một con lợn bị sét đánh"], c: "Một nhân viên bị đuổi việc"},
        {q: "Trong chế độ Survival, cách duy nhất để lấy được 'Mob Head' (Đầu mob) là gì?", a: ["Dùng kiếm Looting III", "Creeper điện nổ chết mob đó", "Bắn cung tầm xa", "Rơi ngẫu nhiên"], c: "Creeper điện nổ chết mob đó"},
        {q: "Vật liệu nào dùng để sửa chữa giáp bằng Netherite trên bàn rèn?", a: ["Thỏi Netherite", "Mảnh Netherite", "Kim cương", "Không thể sửa"], c: "Thỏi Netherite"},
        {q: "Tên của nhân vật nữ mặc định được thêm vào sau Steve là gì?", a: ["Eve", "Alex", "Zelda", "Maria"], c: "Alex"},
        {q: "Một ngày trong Minecraft (bao gồm cả đêm) kéo dài bao nhiêu phút thực tế?", a: ["10 phút", "15 phút", "20 phút", "30 phút"], c: "20 phút"},
        {q: "Lệnh nào dùng để thay đổi độ khó của game sang Hardcore ngay lập tức?", a: ["/difficulty hardcore", "/hardcore on", "Không thể đổi bằng lệnh", "/gamemode hc"], c: "Không thể đổi bằng lệnh"},
        {q: "Block 'Lodestone' (Đá nam châm) được dùng kết hợp với vật phẩm nào để định vị?", a: ["Bản đồ", "La bàn", "Đồng hồ", "Mắt End"], c: "La bàn"},
        {q: "Để dân làng chuyển nghề thành 'Fletcher' (Thợ làm cung), cần đặt block nào?", a: ["Bàn rèn", "Bàn cung (Fletching Table)", "Bàn vẽ bản đồ", "Thùng gỗ"], c: "Bàn cung (Fletching Table)"},
        {q: "Mob nào có thể bơi trong dung nham (lava) mà không bị thương?", a: ["Strider", "Piglin Brute", "Hoglin", "Blaze"], c: "Strider"},
        {q: "Enchantment 'Mending' KHÔNG THỂ đi chung với Enchantment nào trên Cung?", a: ["Power", "Punch", "Infinity", "Flame"], c: "Infinity"},
        {q: "Tên của con rồng End chính thức do Notch đặt là gì?", a: ["Ender", "Jean", "Drake", "Miko"], c: "Jean"},
        {q: "Trong phiên bản Java, phím tắt để hiển thị tọa độ F3 + ? sẽ hiện Chunk Border?", a: ["F3 + B", "F3 + G", "F3 + H", "F3 + N"], c: "F3 + G"},
        {q: "Loại gỗ nào trong Minecraft không thể bị cháy?", a: ["Gỗ Sồi", "Gỗ Rừng", "Gỗ Crimson (Địa ngục)", "Gỗ Linh hồn"], c: "Gỗ Crimson (Địa ngục)"},
        {q: "Để triệu hồi 'Warden', bạn phải kích hoạt 'Sculk Shrieker' bao nhiêu lần?", a: ["2 lần", "3 lần", "4 lần", "5 lần"], c: "4 lần"},
        {q: "Con vật nào sau đây có thể đổi màu nếu được đặt tên là 'jeb_'?", a: ["Bò", "Cừu", "Heo", "Chó"], c: "Cừu"},
        {q: "Vật phẩm 'Totem of Undying' rơi ra từ con mob nào?", a: ["Vindicator", "Evoker", "Pillager", "Witch"], c: "Evoker"},
        {q: "Trong Minecraft 1.19, vật phẩm 'Echo Shard' được dùng để chế tạo cái gì?", a: ["La bàn hồi phục", "Đồng hồ cát", "Kính viễn vọng", "Cánh Elytra"], c: "La bàn hồi phục"}
     ];
    // Gợi ý: Hãy lặp lại cấu trúc trên để thêm đủ 70-200 câu hỏi.

    let userUID = null;
    let streak = 0;
    let timeLeft = 15;
    let timer;
    let playCount = 0;
    let sessionQuestions = [];

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            userUID = user.uid;
            checkStats();
        } else { window.location.href = 'login.html'; }
    });

    async function checkStats() {
        const today = new Date().toLocaleDateString('en-GB');
        const snap = await db.ref('web_users/' + userUID).get();
        const data = snap.val() || {};
        
        db.ref('web_users/' + userUID + '/points').on('value', s => {
            document.getElementById('user-points').innerText = (s.val() || 0) + " Xu";
        });

        if(data.lastDate === today) playCount = data.playCount || 0;
        else {
            playCount = 0;
            await db.ref('web_users/' + userUID).update({ lastDate: today, playCount: 0 });
        }

        if(playCount >= 5) {
            document.getElementById('game-content').style.display = "none";
            document.getElementById('limit-msg').innerText = "HẾT LƯỢT CHƠI HÔM NAY! QUAY LẠI SAU 24H.";
        } else {
            startRound();
        }
    }

    function startRound() {
        streak = 0;
        sessionQuestions = ultraBank.sort(() => Math.random() - 0.5).slice(0, 5);
        render();
    }

    function render() {
        document.getElementById('correct-overlay').classList.remove('active');
        const data = sessionQuestions[streak];
        document.getElementById('question').innerText = data.q;
        document.getElementById('streak-val').innerText = streak;
        
        const opt = document.getElementById('ans-options');
        opt.innerHTML = "";
        
        [...data.a].sort(() => Math.random() - 0.5).forEach(ans => {
            const b = document.createElement('button');
            b.className = "ans-btn";
            b.innerText = ans;
            b.onclick = () => {
                clearInterval(timer);
                if(ans === data.c) {
                    streak++;
                    if(streak === 5) win();
                    else document.getElementById('correct-overlay').classList.add('active');
                } else {
                    alert("Sai rồi! Đáp án là: " + data.c);
                    startRound();
                }
            };
            opt.appendChild(b);
        });
        
        runTimer();
    }

    function runTimer() {
        timeLeft = 15;
        document.getElementById('timer-bar').style.width = "100%";
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-bar').style.width = (timeLeft/15*100) + "%";
            if(timeLeft <= 0) {
                clearInterval(timer);
                alert("Hết thời gian!");
                startRound();
            }
        }, 1000);
    }

    function nextQuestion() { render(); }

    async function win() {
        playCount++;
        await db.ref('web_users/' + userUID).update({ playCount: playCount });
        await db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + 2);
        alert("CHÚC MỪNG! +2 XU VÀO TÀI KHOẢN.");
        location.reload();
    }
</script>
</body>
</html>
