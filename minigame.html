<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko Ultra Quiz | 24h Challenge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0b0f19; --card: rgba(255, 255, 255, 0.05); --gold: #ffd700; --red: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        .navbar { 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); 
            height: 70px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000;
        }
        .nav-brand { font-weight: 900; font-size: 22px; letter-spacing: 2px; cursor: pointer; }
        .nav-menu { display: flex; gap: 20px; align-items: center; }
        .nav-link { color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 600; cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: 0.3s; }
        .nav-link:hover { color: var(--main); background: rgba(0, 212, 255, 0.1); }

        .container { max-width: 850px; margin: 40px auto; padding: 0 20px; }
        .game-card { background: var(--card); border-radius: 25px; padding: 45px; border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        .timer-wrap { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 35px; }
        #timer-bar { width: 100%; height: 100%; background: var(--main); border-radius: 10px; transition: width 1s linear; }

        #question { font-size: 24px; font-weight: 700; margin-bottom: 35px; min-height: 70px; line-height: 1.4; }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .ans-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 20px; border-radius: 15px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .ans-btn:hover { background: var(--main); color: #000; font-weight: bold; transform: translateY(-3px); }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 15, 25, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .overlay.active { display: flex; }
        .btn-action { width: 220px; padding: 16px; margin: 12px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-next { background: var(--main); color: #000; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }

        .streak-tag { margin-top: 35px; font-weight: bold; color: #94a3b8; text-transform: uppercase; font-size: 13px; }
        #streak-val { color: var(--main); font-size: 20px; }
        #limit-msg { text-align: center; margin-top: 25px; color: var(--red); font-weight: bold; line-height: 1.6; }

        @media (max-width: 650px) { .ans-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand" onclick="location.reload()">YEAMIKO <span style="color:var(--main)">ULTRA</span></div>
        <div class="nav-menu">
            <div class="nav-link" onclick="alert('Đúng liên tiếp 5 câu để nhận 2 Xu! Mỗi 24h bạn có 5 lượt chơi.')">HƯỚNG DẪN</div>
            <div id="display-limit" style="color: #94a3b8; font-size: 14px; font-weight: bold;">Lượt: 0/5</div>
        </div>
        <div id="user-points" style="color: var(--gold); font-weight: bold;">0 Xu</div>
    </nav>

    <div class="container">
        <div class="game-card">
            <div id="correct-overlay" class="overlay">
                <i class="fas fa-check-circle" style="color: var(--main); font-size: 60px; margin-bottom: 20px;"></i>
                <h2 style="margin-bottom: 25px;">CHÍNH XÁC!</h2>
                <button class="btn-action btn-next" onclick="nextQuestion()">Tiếp tục</button>
            </div>

            <div class="timer-wrap"><div id="timer-bar"></div></div>
            
            <div id="game-content">
                <p id="question">Đang tải câu hỏi...</p>
                <div class="ans-grid" id="ans-options"></div>
                <div class="streak-tag">Tiến trình vòng: <span id="streak-val">0</span>/5</div>
            </div>
        </div>
        <div id="limit-msg"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ultraBank = [
        {q: "Redstone Repeater tối đa bao nhiêu tick delay?", a: ["1", "2", "3", "4"], c: "4"},
        {q: "Cần bao nhiêu thỏi Netherite để làm 1 khối Netherite?", a: ["4", "9", "8", "5"], c: "9"},
        {q: "Lượng máu của Warden là bao nhiêu?", a: ["300", "500", "200", "600"], c: "500"},
        {q: "Trong Minecraft, 1 tick tương ứng với bao nhiêu giây?", a: ["0.01s", "0.05s", "0.1s", "0.2s"], c: "0.05s"},
        {q: "Piston KHÔNG THỂ đẩy block nào?", a: ["Khối Sắt", "Lò nung", "Kính", "Khối Đá"], c: "Lò nung"},
        {q: "Tên con rồng End chính thức là gì?", a: ["Ender", "Jean", "Drake", "Miko"], c: "Jean"},
        {q: "Loại gỗ nào không thể bị cháy?", a: ["Sồi", "Rừng", "Crimson", "Tre"], c: "Crimson"},
        {q: "1 xô dung nham nung được bao nhiêu vật phẩm?", a: ["64", "80", "100", "128"], c: "100"},
        {q: "Y thấp nhất ở bản 1.19+ là?", a: ["0", "-64", "-16", "-32"], c: "-64"},
        {q: "Mob nào sợ Mèo nhất?", a: ["Creeper", "Zombie", "Skeleton", "Spider"], c: "Creeper"},
        {q: "Minecraft chính thức ra mắt năm nào?", a: ["2009", "2010", "2011", "2012"], c: "2011"},
        {q: "Để thuần hóa mèo rừng, cần dùng cá gì?", a: ["Cá hồi", "Cá sống", "Cá chín", "Cá nóc"], c: "Cá sống"}
        // ... (Có thể thêm các câu hỏi khác vào đây)
    ];

    let userUID = null, streak = 0, timeLeft = 15, timer, playCount = 0, sessionQuestions = [];
    const WAIT_TIME = 24 * 60 * 60 * 1000; // 24 tiếng (miligiây)

    firebase.auth().onAuthStateChanged(user => {
        if(user) { userUID = user.uid; checkStats(); } 
        else { window.location.href = 'login.html'; }
    });

    async function checkStats() {
        const snap = await db.ref('web_users/' + userUID).get();
        const data = snap.val() || {};
        const now = Date.now();

        let lastReset = data.lastResetTime || 0;
        playCount = data.playCount || 0;

        // Logic Reset 24h
        if (now - lastReset >= WAIT_TIME) {
            playCount = 0;
            lastReset = now;
            await db.ref('web_users/' + userUID).update({
                playCount: 0,
                lastResetTime: now
            });
        }

        document.getElementById('display-limit').innerText = `Lượt: ${playCount}/5`;
        
        db.ref('web_users/' + userUID + '/points').on('value', s => {
            document.getElementById('user-points').innerText = (s.val() || 0) + " Xu";
        });

        if (playCount >= 5) {
            document.getElementById('game-content').style.display = "none";
            
            // Tính toán thời gian đếm ngược
            const updateCountdown = () => {
                const currentTime = Date.now();
                const remaining = WAIT_TIME - (currentTime - lastReset);
                
                if (remaining <= 0) {
                    location.reload();
                    return;
                }

                const hours = Math.floor(remaining / (1000 * 60 * 60));
                const mins = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((remaining % (1000 * 60)) / 1000);
                
                document.getElementById('limit-msg').innerHTML = 
                    `HẾT LƯỢT CHƠI HÔM NAY!<br><span style="font-size:14px; color:#94a3b8">Lượt mới sau: ${hours}h ${mins}m ${secs}s</span>`;
            };

            updateCountdown();
            setInterval(updateCountdown, 1000);
        } else {
            startRound();
        }
    }

    function startRound() {
        streak = 0;
        // Lấy ngẫu nhiên 5 câu từ ngân hàng câu hỏi
        sessionQuestions = ultraBank.sort(() => Math.random() - 0.5).slice(0, 5);
        render();
    }

    function render() {
        document.getElementById('correct-overlay').classList.remove('active');
        const data = sessionQuestions[streak];
        if(!data) return;

        document.getElementById('question').innerText = data.q;
        document.getElementById('streak-val').innerText = streak;
        
        const opt = document.getElementById('ans-options');
        opt.innerHTML = "";
        
        // Trộn các phương án trả lời
        [...data.a].sort(() => Math.random() - 0.5).forEach(ans => {
            const b = document.createElement('button');
            b.className = "ans-btn";
            b.innerText = ans;
            b.onclick = () => {
                clearInterval(timer);
                if(ans === data.c) {
                    streak++;
                    if(streak === 5) win();
                    else document.getElementById('correct-overlay').classList.add('active');
                } else {
                    alert("Sai rồi! Đáp án là: " + data.c + "\nVòng chơi sẽ khởi động lại.");
                    startRound();
                }
            };
            opt.appendChild(b);
        });
        runTimer();
    }

    function runTimer() {
        clearInterval(timer);
        timeLeft = 15;
        document.getElementById('timer-bar').style.width = "100%";
        document.getElementById('timer-bar').style.background = "#00d4ff";

        timer = setInterval(() => {
            timeLeft--;
            const percent = (timeLeft/15*100);
            document.getElementById('timer-bar').style.width = percent + "%";
            if(timeLeft < 5) document.getElementById('timer-bar').style.background = "#ff4757"; 
            if(timeLeft <= 0) {
                clearInterval(timer);
                alert("⏰ Hết giờ! Bạn cần nhanh tay hơn.");
                startRound();
            }
        }, 1000);
    }

    function nextQuestion() { render(); }

    async function win() {
        playCount++;
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });

        // Cập nhật Database
        await db.ref('web_users/' + userUID).update({ playCount: playCount });
        await db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + 2);
        
        setTimeout(() => {
            alert("XUẤT SẮC! Bạn đã hoàn thành vòng chơi và nhận được 2 Xu.");
            location.reload();
        }, 1500);
    }
</script>
</body>
</html>
