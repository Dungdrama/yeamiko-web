<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Games | Yeamiko Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; text-align: center; }
        h1 { color: var(--main); text-transform: uppercase; letter-spacing: 2px; }
        
        /* Chọn Game */
        .game-selector { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .game-btn { background: var(--card); border: 1px solid var(--main); color: white; padding: 10px 20px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .game-btn.active { background: var(--main); color: black; font-weight: bold; }

        /* Board chơi game */
        .game-board { background: var(--card); padding: 30px; border-radius: 20px; min-height: 400px; display: none; border: 1px solid rgba(255,255,255,0.1); }
        .game-board.show { display: block; }

        /* CSS Trò Đố Vui */
        #quiz-container h3 { margin-bottom: 20px; }
        .answer-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; }
        .answer-btn:hover { background: rgba(0, 212, 255, 0.2); }

        /* CSS Trò Lật Hình */
        .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 400px; margin: 0 auto; }
        .card { height: 80px; background: #334155; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; transition: transform 0.3s; transform-style: preserve-3d; }
        .card.flipped { transform: rotateY(180deg); background: var(--main); color: black; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-gamepad"></i> Yeamiko MiniGames</h1>
    <p id="user-points">Đang tải số dư...</p>

    <div class="game-selector">
        <button class="game-btn" onclick="showGame('quiz')">Đố Vui Minecraft</button>
        <button class="game-btn" onclick="showGame('memory')">Lật Hình Trí Nhớ</button>
    </div>

    <div id="quiz-board" class="game-board">
        <div id="quiz-content">
            <h3 id="question">Câu hỏi sẽ hiện ở đây?</h3>
            <div id="answers"></div>
            <p id="quiz-status" style="margin-top:20px; color: var(--main);">Chuỗi thắng: 0/5</p>
        </div>
    </div>

    <div id="memory-board" class="game-board">
        <h3>Tìm các cặp hình giống nhau</h3>
        <p id="timer">Thời gian: 0s</p>
        <div class="memory-grid" id="memory-grid"></div>
        <button onclick="startMemoryGame()" style="margin-top:20px;" class="game-btn">Chơi lại</button>
    </div>
</div>

<script>
    // 1. CẤU HÌNH FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            currentUser = user;
            db.ref('web_users/' + user.uid + '/points').on('value', s => {
                document.getElementById('user-points').innerText = "Số dư: " + (s.val() || 0) + " Xu";
            });
        } else { window.location.href = 'login.html'; }
    });

    function showGame(game) {
        document.querySelectorAll('.game-board').forEach(b => b.classList.remove('show'));
        document.getElementById(game + '-board').classList.add('show');
        if(game === 'quiz') startQuiz();
        if(game === 'memory') startMemoryGame();
    }

    // --- LOGIC TRÒ ĐỐ VUI ---
    const quizData = [
        { q: "Lệnh để dịch chuyển về nhà là gì?", a: ["/home", "/spawn", "/warp"], correct: 0 },
        { q: "Block nào cứng nhất trong Survival?", a: ["Sắt", "Kim cương", "Obsidian"], correct: 2 },
        { q: "Cần bao nhiêu kim cương để làm cái Cúp?", a: ["2", "3", "4"], correct: 1 },
        { q: "Mob nào sợ mèo?", a: ["Zombie", "Creeper", "Skeleton"], correct: 1 },
        { q: "Muốn hồi máu nhanh cần ăn gì?", a: ["Táo vàng", "Thịt thối", "Đá"], correct: 0 }
    ];

    let quizStep = 0;
    function startQuiz() {
        quizStep = 0;
        showQuestion();
    }

    function showQuestion() {
        const data = quizData[quizStep];
        document.getElementById('question').innerText = data.q;
        const ansDiv = document.getElementById('answers');
        ansDiv.innerHTML = "";
        data.a.forEach((ans, i) => {
            const btn = document.createElement('button');
            btn.className = "answer-btn";
            btn.innerText = ans;
            btn.onclick = () => checkQuiz(i);
            ansDiv.appendChild(btn);
        });
        document.getElementById('quiz-status').innerText = `Chuỗi thắng: ${quizStep}/5`;
    }

    async function checkQuiz(idx) {
        if(idx === quizData[quizStep].correct) {
            quizStep++;
            if(quizStep === 5) {
                alert("🎉 Xuất sắc! Bạn đã thắng 5 câu và nhận được 2 Xu.");
                await db.ref('web_users/' + currentUser.uid + '/points').transaction(p => (p || 0) + 2);
                startQuiz();
            } else { showQuestion(); }
        } else {
            alert("❌ Sai rồi! Chuỗi thắng đã bị reset.");
            startQuiz();
        }
    }

    // --- LOGIC TRÒ LẬT HÌNH ---
    const icons = ['💎', '🔥', '🌲', '🦴', '🗡️', '🛡️', '🍎', '🌋'];
    let cards = [...icons, ...icons];
    let flippedCards = [];
    let matchedCount = 0;

    function startMemoryGame() {
        matchedCount = 0;
        flippedCards = [];
        cards.sort(() => Math.random() - 0.5);
        const grid = document.getElementById('memory-grid');
        grid.innerHTML = "";
        cards.forEach((icon, i) => {
            const card = document.createElement('div');
            card.className = "card";
            card.dataset.icon = icon;
            card.dataset.index = i;
            card.onclick = () => flipCard(card);
            grid.appendChild(card);
        });
    }

    async function flipCard(card) {
        if(flippedCards.length < 2 && !card.classList.contains('flipped')) {
            card.classList.add('flipped');
            card.innerText = card.dataset.icon;
            flippedCards.push(card);

            if(flippedCards.length === 2) {
                if(flippedCards[0].dataset.icon === flippedCards[1].dataset.icon) {
                    matchedCount += 2;
                    flippedCards = [];
                    if(matchedCount === cards.length) {
                        alert("🎉 Tuyệt vời! Bạn tìm được hết và nhận 1 Xu.");
                        await db.ref('web_users/' + currentUser.uid + '/points').transaction(p => (p || 0) + 1);
                    }
                } else {
                    setTimeout(() => {
                        flippedCards.forEach(c => { c.classList.remove('flipped'); c.innerText = ""; });
                        flippedCards = [];
                    }, 800);
                }
            }
        }
    }
</script>
</body>
</html>
