<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko Ultra Quiz | Hardcore Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0b0f19; --card: rgba(255, 255, 255, 0.05); --gold: #ffd700; --red: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        .navbar { 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); 
            height: 70px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000;
        }
        .nav-brand { font-weight: 900; font-size: 22px; letter-spacing: 2px; cursor: pointer; }
        .nav-menu { display: flex; gap: 20px; }
        .nav-link { color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 600; cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: 0.3s; }
        .nav-link:hover { color: var(--main); background: rgba(0, 212, 255, 0.1); }

        .container { max-width: 850px; margin: 40px auto; padding: 0 20px; }
        .game-card { background: var(--card); border-radius: 25px; padding: 45px; border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        .timer-wrap { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 35px; }
        #timer-bar { width: 100%; height: 100%; background: var(--main); border-radius: 10px; transition: width 1s linear; }

        #question { font-size: 24px; font-weight: 700; margin-bottom: 35px; min-height: 70px; line-height: 1.4; }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .ans-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 20px; border-radius: 15px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .ans-btn:hover { background: var(--main); color: #000; font-weight: bold; transform: translateY(-3px); }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 15, 25, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .overlay.active { display: flex; }
        .btn-action { width: 220px; padding: 16px; margin: 12px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-next { background: var(--main); color: #000; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }

        .streak-tag { margin-top: 35px; font-weight: bold; color: #94a3b8; text-transform: uppercase; font-size: 13px; }
        #streak-val { color: var(--main); font-size: 20px; }
        @media (max-width: 650px) { .ans-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand" onclick="location.reload()">YEAMIKO <span style="color:var(--main)">ULTRA</span></div>
        <div class="nav-menu">
            <div class="nav-link" onclick="alert('Trả lời đúng 5 câu cực khó để nhận 2 Xu. Bạn có 15s mỗi câu!')">HD</div>
            <div class="nav-link" onclick="alert('X2 Xu vào tối Thứ 7!')">SỰ KIỆN</div>
            <div class="nav-link" onclick="window.location.href='shop.html'">ĐỔI QUÀ</div>
        </div>
        <div id="user-points" style="color: var(--gold); font-weight: bold;">0 Xu</div>
    </nav>

    <div class="container">
        <div class="game-card">
            <div id="correct-overlay" class="overlay">
                <i class="fas fa-check-circle" style="color: var(--main); font-size: 60px; margin-bottom: 20px;"></i>
                <h2 style="margin-bottom: 25px;">CHÍNH XÁC!</h2>
                <button class="btn-action btn-next" onclick="nextQuestion()">Câu tiếp theo</button>
            </div>

            <div class="timer-wrap"><div id="timer-bar"></div></div>
            
            <div id="game-content">
                <p id="question">Đang tải...</p>
                <div class="ans-grid" id="ans-options"></div>
                <div class="streak-tag">Tiến trình lượt: <span id="streak-val">0</span>/5</div>
            </div>
        </div>
        <div id="limit-msg" style="text-align: center; margin-top: 25px; color: var(--red); font-weight: bold;"></div>
    </div>

<script>

        {q: "Để chế tạo một khối Netherite, bạn cần bao nhiêu thỏi?", a: ["4", "9", "8", "5"], c: "9"},
        {q: "Lượng máu của Warden là bao nhiêu?", a: ["300", "500", "200", "600"], c: "500"},
        {q: "Trong Minecraft, 1 tick tương ứng với bao nhiêu giây?", a: ["0.01s", "0.05s", "0.1s", "0.2s"], c: "0.05s"},
        {q: "Cá nóc (Pufferfish) khi ăn gây hiệu ứng gì?", a: ["Đ đói", "Nhiễm độc IV", "Buồn nôn", "Cả 3"], c: "Cả 3"},

        {q: "Dân làng Librarian làm việc tại block nào?", a: ["Bàn rèn", "Lò nung", "Bục sách", "Thùng gỗ"], c: "Bục sách"},
        {q: "Loại gỗ nào không thể bị cháy?", a: ["Sồi", "Rừng", "Crimson", "Tre"], c: "Crimson"},
        {q: "Tên con rồng End chính thức là gì?", a: ["Ender", "Jean", "Drake", "Miko"], c: "Jean"},
        {q: "Ếch (Frog) lớn lên từ đâu?", a: ["Trứng ếch", "Nòng nọc", "Ếch con", "Ếch lớn"], c: "Nòng nọc"},
        {q: "Far Lands xuất hiện từ phiên bản nào?", a: ["Beta 1.8", "Alpha", "Infdev", "Classic"], c: "Beta 1.8"},
        {q: "Kích thước thế giới tối đa là block?", a: ["30M x 30M", "1M x 1M", "10M x 10M", "100M x 100M"], c: "30M x 30M"},
        {q: "Lõi của đèn hiệu (Beacon) là vật phẩm gì?", a: ["Ngôi sao địa ngục", "Mắt End", "Khối kim cương", "Thủy tinh"], c: "Ngôi sao địa ngục"},
        {q: "Con vật nào đổi màu khi đặt tên jeb_?", a: ["Bò", "Cừu", "Chó", "Mèo"], c: "Cừu"},
        {q: "Minecraft Alpha được phát hành năm nào?", a: ["2009", "2010", "2011", "2012"], c: "2010"},
        {q: "Nơi cư ngụ của con Boss Wither là?", a: ["Địa ngục", "Ender", "Overworld", "Triệu hồi bất cứ đâu"], c: "Triệu hồi bất cứ đâu"},
        {q: "Để làm Golden Apple cần táo và thỏi gì?", a: ["Vàng", "Sắt", "Đồng", "Than"], c: "Vàng"},
        {q: "Khi lợn bị sét đánh, nó biến thành gì?", a: ["Zombie Pigman", "Wither", "Piglin", "Hoglin"], c: "Zombie Pigman"},
        {q: "Lệnh xem tọa độ ở bản Java là?", a: ["F1", "F2", "F3", "F5"], c: "F3"},
        {q: "Khối 'Sculk Sensor' cảm biến trong bán kính block?", a: ["4", "8", "12", "16"], c: "8"},
        {q: "Cát linh hồn dùng để triệu hồi Boss nào?", a: ["Ender Dragon", "Warden", "Wither", "Herobrine"], c: "Wither"},
        {q: "Tên cũ của Minecraft là?", a: ["Mine Game", "Block World", "Cave Game", "Build Craft"], c: "Cave Game"},
        {q: "Elytra dùng kết hợp với gì để bay?", a: ["Cung", "Pháo hoa", "Ngọc End", "Lá cây"], c: "Pháo hoa"},
        {q: "Mob nào nhặt block Enderman sợ nước?", a: ["Zombie", "Skeleton", "Enderman", "Creeper"], c: "Enderman"},
        {q: "Khi câu cá, Enchant 'Lure' giúp?", a: ["Câu cá hiếm", "Câu cá nhanh", "Bền cần câu", "Sửa cần câu"], c: "Câu cá nhanh"},
        {q: "C cổng Nether tối đa là block?", a: ["10x10", "23x23", "25x25", "50x50"], c: "23x23"},
        {q: "Mob 'Allay' thích vật phẩm nào?", a: ["Vàng", "Bánh quy", "Vật phẩm bạn đưa", "Kim cương"], c: "Vật phẩm bạn đưa"},
        {q: "Lệnh '/seed' để làm gì?", a: ["Trồng cây", "Xem mã thế giới", "Tạo thế giới mới", "Xóa thế giới"], c: "Xem mã thế giới"},
        {q: "Herobrine là mob xuất hiện ở bản nào?", a: ["Classic", "Alpha", "Beta", "Không bao giờ"], c: "Không bao giờ"},
        {q: "Một khối đặc Iron khối nặng block sắt?", a: ["3", "4", "9", "10"], c: "9"},
        {q: "Mob nào sợ tiếng nổ của chính mình?", a: ["Creeper", "Ghast", "Wither", "Không con nào"], c: "Không con nào"},
        {q: "Enchant 'Mending' hoạt động dựa trên?", a: ["Điểm kinh nghiệm", "Máu", "Thời gian", "Tọa độ"], c: "Điểm kinh nghiệm"},
        {q: "Thành phố cổ Ancient City ở độ cao?", a: ["Y -51", "Y -64", "Y 0", "Y 64"], c: "Y -51"},
        {q: "Block nào KHÔNG dẫn Redstone?", a: ["Sắt", "Đá", "Kính", "Vàng"], c: "Kính"},
        {q: "Redstone Repeater tối đa delay tick?", a: ["1", "2", "3", "4"], c: "4"},
        {q: "T-Flip Flop làm gì?", a: ["Nút bấm thành đòn bẩy", "Tăng tín hiệu", "Lặp", "Đảo"], c: "Nút bấm thành đòn bẩy"},
        {q: "Observer phát tín hiệu tick?", a: ["1", "2", "4", "8"], c: "2"},
        {q: "Tín hiệu Redstone đi block?", a: ["12", "15", "16", "20"], c: "15"},
        {q: "Cúp Kim Cương bền block?", a: ["1321", "1561", "2031", "2501"], c: "1561"},
        {q: "Netherite khối cần thỏi?", a: ["4", "9", "8", "5"], c: "9"},
        {q: "1 tick = s?", a: ["0.01", "0.05", "0.1", "0.2"], c: "0.05"},
        {q: "Nhiên liệu cháy lâu nhất?", a: ["Than khối", "Xô dung nham", "Thanh lửa", "Tảo"], c: "Xô dung nham"},
        {q: "1 xô dung nham nung block?", a: ["64", "80", "100", "128"], c: "100"},
        {q: "XP 0-30?", a: ["1000", "1395", "1500", "2000"], c: "1395"},
        {q: "Warden máu?", a: ["300", "500", "200", "600"], c: "500"},
        {q: "Mob nhìn xa nhất?", a: ["Enderman", "Warden", "Ghast", "Ender Dragon"], c: "Ghast"},
        {q: "Thuốc độc vào Zombie?", a: ["Mất máu", "Được hồi máu", "Chậm", "Không"], c: "Được hồi máu"},
        {q: "Cần Shrieker?", a: ["2", "3", "4", "5"], c: "4"},
        {q: "Totem rơi từ con?", a: ["Vindicator", "Evoker", "Pillager", " Ravager"], c: "Evoker"},
        {q: "Đổi màu jeb_?", a: ["Bò", "Cừu", "Chó", "Mèo"], c: "Cừu"},
        {q: "Rồng tên?", a: ["Ender", "Jean", "Drake", "Miko"], c: "Jean"},
        {q: "Mob không bị trúng tên?", a: ["Enderman", "Wither", "Ghast", "Blaze"], c: "Enderman"},
        {q: "Kéo lên Mooshroom?", a: ["Bò thường", "Bò nấm", "Thịt bò", "Mất"], c: "Bò thường"},
        {q: "Wither Bedrock máu?", a: ["300", "450", "600", "1000"], c: "600"},
        {q: "Gỗ không cháy?", a: ["Sồi", "Rừng", "Crimson", "Tre"], c: "Crimson"},
        {q: "Ngày Minecraft phút thực?", a: ["10", "15", "20", "24"], c: "20"},
        {q: "Y thấp nhất 1.19?", a: ["0", "-64", "-16", "-32"], c: "-64"},
        {q: "Cổng End khung cổng?", a: ["10", "12", "14", "16"], c: "12"},
        {q: "Piston đẩy được?", a: ["Khối Sắt", "Lò nung", "Rương", "Barrier"], c: "Khối Sắt"},
        {q: "Dịch chuyển về nhà là lệnh?", a: ["/home", "/spawn", "/warp", "/tp"], c: "/home"},
        {q: "Redstone Repeater delay tick?", a: ["1", "2", "3", "4"], c: "4"},
        {q: "Lạc đà?", a: ["Sa mạc", "Thảo nguyên", "Làng sa mạc", "Rừng"], c: "Làng sa mạc"}
    ];

    let userUID = null, streak = 0, timeLeft = 15, timer, playCount = 0, sessionQuestions = [];

    firebase.auth().onAuthStateChanged(user => {
        if(user) { userUID = user.uid; checkStats(); } 
        else { window.location.href = 'login.html'; }
    });

    async function checkStats() {
        const today = new Date().toLocaleDateString('en-GB');
        const snap = await db.ref('web_users/' + userUID).get();
        const data = snap.val() || {};
        
        db.ref('web_users/' + userUID + '/points').on('value', s => {
            document.getElementById('user-points').innerText = (s.val() || 0) + " Xu";
        });

        if(data.lastDate === today) playCount = data.playCount || 0;
        else {
            playCount = 0;
            await db.ref('web_users/' + userUID).update({ lastDate: today, playCount: 0 });
        }

        document.getElementById('display-limit').innerText = `Lượt: ${playCount}/5`;

        if(playCount >= 5) {
            document.getElementById('game-content').style.display = "none";
            document.getElementById('limit-msg').innerText = "HẾT LƯỢT CHƠI HÔM NAY!";
        } else { startRound(); }
    }

    function startRound() {
        streak = 0;
        // 3. XÁO TRỘN CÂU HỎI VÀ LẤY 5 CÂU BẤT KỲ
        sessionQuestions = ultraBank.sort(() => Math.random() - 0.5).slice(0, 5);
        render();
    }

    function render() {
        document.getElementById('correct-overlay').classList.remove('active');
        const data = sessionQuestions[streak];
        document.getElementById('question').innerText = data.q;
        document.getElementById('streak-val').innerText = streak;
        
        const opt = document.getElementById('ans-options');
        opt.innerHTML = "";
        
        // Xáo trộn vị trí đáp án
        [...data.a].sort(() => Math.random() - 0.5).forEach(ans => {
            const b = document.createElement('button');
            b.className = "ans-btn";
            b.innerText = ans;
            b.onclick = () => {
                clearInterval(timer);
                if(ans === data.c) {
                    streak++;
                    if(streak === 5) win(); // Thắng lượt chơi
                    else document.getElementById('correct-overlay').classList.add('active'); // Hiện nút tạm dừng
                } else {
                    alert("Sai rồi! Đáp án là: " + data.c);
                    startRound(); // Trả lời sai, chơi lại từ đầu
                }
            };
            opt.appendChild(b);
        });
        
        runTimer(); // Bắt đầu đếm ngược 15s
    }

    function runTimer() {
        timeLeft = 15;
        document.getElementById('timer-bar').style.width = "100%";
        document.getElementById('timer-bar').style.background = "#00d4ff"; // Xanh

        timer = setInterval(() => {
            timeLeft--;
            const percent = (timeLeft/15*100);
            document.getElementById('timer-bar').style.width = percent + "%";
            
            // Còn dưới 5 giây chuyển sang màu đỏ
            if(timeLeft < 5) document.getElementById('timer-bar').style.background = "#ff4757"; 

            if(timeLeft <= 0) {
                clearInterval(timer);
                alert("⏰ Hết thời gian! Bạn bị tính là sai.");
                startRound();
            }
        }, 1000);
    }

    function nextQuestion() { render(); }

    async function win() {
        playCount++;
        
        // 4. HIỆU ỨNG PHÁO HOA KHI THẮNG confettij
        confetti({
            particleCount: 150,
            spread: 80,
            origin: { y: 0.6 },
            colors: ['#00d4ff', '#ffffff', '#ffd700', '#ff4757'],
            zIndex: 1100
        });

        await db.ref('web_users/' + userUID).update({ playCount: playCount });
        await db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + 2);
        
        setTimeout(() => {
            alert("🎉 TUYỆT VỜI! Bạn đã vượt qua thử thách khó nhất và nhận được 2 Xu.");
            location.reload(); // Reload để cập nhật giới hạn lượt
        }, 2000);
    }
</script>
</body>
</html>
