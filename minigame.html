<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko High-Core Quiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0b0f19; --card: rgba(255, 255, 255, 0.05); --gold: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; }

        /* Navbar */
        .navbar { 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); 
            height: 60px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 100;
        }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

        /* Game Board */
        .game-card { 
            background: var(--card); border-radius: 20px; padding: 40px; 
            border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden;
        }

        /* Timer */
        .timer-wrap { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-bottom: 30px; }
        #timer-bar { width: 100%; height: 100%; background: var(--main); border-radius: 4px; transition: width 1s linear; }

        #question { font-size: 22px; line-height: 1.4; margin-bottom: 30px; font-weight: 700; min-height: 60px; }
        
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .ans-btn { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 18px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 15px;
        }
        .ans-btn:hover:not(:disabled) { background: var(--main); color: #000; font-weight: bold; transform: scale(1.02); }
        .ans-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Pause/Continue Overlay */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .overlay.active { display: flex; }
        .btn-action { 
            width: 200px; padding: 15px; margin: 10px; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .btn-next { background: var(--main); color: #000; }
        .btn-pause { background: #4b5563; color: white; }

        .streak-info { margin-top: 30px; font-size: 14px; color: #94a3b8; letter-spacing: 1px; }
        #streak-num { color: var(--gold); font-size: 18px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-weight: 900; letter-spacing: 1px;">YEAMIKO <span style="color:var(--main)">PRO QUIZ</span></div>
        <div id="user-points" style="color: var(--gold); font-weight: bold;">0 Xu</div>
    </nav>

    <div class="container">
        <div class="game-card">
            <div id="pause-overlay" class="overlay">
                <h2 style="margin-bottom: 20px; color: var(--main);">CÂU TRẢ LỜI CHÍNH XÁC!</h2>
                <button class="btn-action btn-next" onclick="nextQuestion()">Tiếp tục chơi</button>
                <button class="btn-action btn-pause" onclick="pauseGame()">Tạm dừng nghỉ</button>
            </div>

            <div class="timer-wrap"><div id="timer-bar"></div></div>
            
            <div id="quiz-ui">
                <p id="question">Đang tải bộ câu hỏi khó...</p>
                <div class="ans-grid" id="ans-options"></div>
                <div class="streak-info">TIẾN TRÌNH LƯỢT CHƠI: <span id="streak-num">0</span>/5</div>
            </div>
        </div>
        <p id="limit-msg" style="text-align: center; margin-top: 20px; color: #ef4444; font-weight: bold;"></p>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- BỘ CÂU HỎI KHÓ (MẪU 10 CÂU ĐỘ KHÓ CAO) ---
    const hardBank = [
        {q: "Trong Minecraft, Redstone Repeater có thể trì hoãn tín hiệu tối đa bao nhiêu tick?", a: ["2 ticks", "4 ticks", "8 ticks", "10 ticks"], c: "4 ticks"},
        {q: "Công thức để pha thuốc 'Potion of Weakness' (không cần thuốc nền) là gì?", a: ["Mắt nhện muối", "Mắt nhện lên men", "Lệ quỷ", "Bột lửa"], c: "Mắt nhện lên men"},
        {q: "Block nào sau đây có độ kháng nổ (Blast Resistance) cao nhất trừ Bedrock?", a: ["Khối Sắt", "Hắc diện thạch (Obsidian)", "Mỏ neo hồi sinh", "Khối Cổ vật"], c: "Hắc diện thạch (Obsidian)"},
        {q: "Tốc độ đào của cúp Vàng so với cúp Kim Cương như thế nào?", a: ["Chậm hơn", "Bằng nhau", "Nhanh hơn", "Tùy thuộc vào tọa độ"], c: "Nhanh hơn"},
        {q: "Để triệu hồi Wither, bạn cần bao nhiêu cát linh hồn và đầu lâu Wither?", a: ["4 cát, 3 đầu", "3 cát, 3 đầu", "4 cát, 2 đầu", "2 cát, 4 đầu"], c: "4 cát, 3 đầu"},
        {q: "Tên của thực thể bí ẩn được đồn đại là anh trai của Steve là gì?", a: ["Entity 303", "Null", "Herobrine", "Green Steve"], c: "Herobrine"},
        {q: "Enchantment nào giúp bạn đi trên nước đóng băng?", a: ["Depth Strider", "Frost Walker", "Aqua Affinity", "Riptide"], c: "Frost Walker"},
        {q: "Trong chế độ Hardcore, nếu bạn chết thì điều gì xảy ra?", a: ["Mất đồ", "Hồi sinh ở Spawn", "Thế giới bị xóa/chỉ xem", "Mất 10 cấp độ"], c: "Thế giới bị xóa/chỉ xem"},
        {q: "Mob nào có lượng máu (HP) cao nhất trong các Boss?", a: ["Ender Dragon", "Wither (Bedrock Edition)", "Warden", "Elder Guardian"], c: "Wither (Bedrock Edition)"},
        {q: "Dân làng nghề 'Librarian' (Thủ thư) làm việc tại block nào?", a: ["Bàn rèn", "Bàn phù phép", "Bục đọc sách (Lectern)", "Bàn vẽ bản đồ"], c: "Bục đọc sách (Lectern)"}
    ];

    let userUID = null;
    let streak = 0;
    let timeLeft = 15;
    let timer;
    let playCount = 0;
    let currentPool = [];

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            userUID = user.uid;
            setupGame();
        } else { window.location.href = 'login.html'; }
    });

    async function setupGame() {
        // Kiểm tra giới hạn 5 lượt/ngày
        const today = new Date().toLocaleDateString('en-GB');
        const snap = await db.ref('web_users/' + userUID).get();
        const data = snap.val() || {};
        
        db.ref('web_users/' + userUID + '/points').on('value', s => {
            document.getElementById('user-points').innerText = (s.val() || 0) + " Xu";
        });

        if(data.lastDate === today) playCount = data.playCount || 0;
        else {
            playCount = 0;
            await db.ref('web_users/' + userUID).update({ lastDate: today, playCount: 0 });
        }

        if(playCount >= 5) {
            document.getElementById('quiz-ui').style.opacity = "0.2";
            document.getElementById('limit-msg').innerText = "BẠN ĐÃ HẾT 5 LƯỢT CHƠI HÔM NAY!";
        } else {
            startNewRound();
        }
    }

    function startNewRound() {
        streak = 0;
        currentPool = hardBank.sort(() => Math.random() - 0.5).slice(0, 5);
        renderQuestion();
    }

    function renderQuestion() {
        document.getElementById('pause-overlay').classList.remove('active');
        const data = currentPool[streak];
        document.getElementById('question').innerText = data.q;
        document.getElementById('streak-num').innerText = streak;
        
        const options = document.getElementById('ans-options');
        options.innerHTML = "";
        
        [...data.a].sort(() => Math.random() - 0.5).forEach(ans => {
            const btn = document.createElement('button');
            btn.className = "ans-btn";
            btn.innerText = ans;
            btn.onclick = () => checkAnswer(ans, data.c);
            options.appendChild(btn);
        });
        
        startTimer();
    }

    function startTimer() {
        clearInterval(timer);
        timeLeft = 15;
        updateBar();
        timer = setInterval(() => {
            timeLeft--;
            updateBar();
            if(timeLeft <= 0) {
                clearInterval(timer);
                alert("HẾT GIỜ! Bạn đã thất bại.");
                startNewRound();
            }
        }, 1000);
    }

    function updateBar() {
        const bar = document.getElementById('timer-bar');
        bar.style.width = (timeLeft / 15 * 100) + "%";
        bar.style.background = timeLeft < 5 ? "#ef4444" : "#00d4ff";
    }

    function checkAnswer(ans, correct) {
        clearInterval(timer);
        if(ans === correct) {
            streak++;
            if(streak === 5) finishGame();
            else document.getElementById('pause-overlay').classList.add('active'); // Hiện nút Tạm dừng/Tiếp tục
        } else {
            alert("SAI RỒI! Đáp án đúng là: " + correct);
            startNewRound();
        }
    }

    function nextQuestion() {
        renderQuestion();
    }

    function pauseGame() {
        alert("Game đã tạm dừng. Khi nào sẵn sàng hãy nhấn F5 để tiếp tục lượt chơi này!");
    }

    async function finishGame() {
        playCount++;
        await db.ref('web_users/' + userUID).update({ playCount: playCount });
        await db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + 2);
        alert("CHÚC MỪNG! Bạn đã vượt qua thử thách khó và nhận 2 Xu.");
        location.reload();
    }
</script>
</body>
</html>
