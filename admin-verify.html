<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phê duyệt bài viết | Admin</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; margin-right: 10px; }
        .approve { background: #2ecc71; }
        .reject { background: #e74c3c; }
        img { max-width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Hàng đợi phê duyệt</h2>
    <div id="list">Đang tải...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = { /* Coppy từ file forum của bạn */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        const ADMIN_UID = "kRvctZ12xsfyugkQVCaInAVzt3d2"; // Thay UID thật của bạn vào đây

        onAuthStateChanged(auth, user => {
            if(!user || user.uid !== ADMIN_UID) {
                alert("Bạn không có quyền!");
                window.location.href = "forum.html";
            }
        });

        onValue(ref(db, 'pending_posts'), (snap) => {
            const data = snap.val();
            const listEl = document.getElementById('list');
            listEl.innerHTML = data ? "" : "Không có bài nào chờ duyệt.";
            if(data) Object.keys(data).forEach(id => {
                const p = data[id];
                listEl.insertAdjacentHTML('beforeend', `
                    <div class="card">
                        <p><b>Người đăng:</b> ${p.userName}</p>
                        <p>${p.text}</p>
                        ${p.img ? `<img src="${p.img}">` : ""}
                        <div style="margin-top:10px;">
                            <button class="btn approve" onclick="action('${id}', 'ok')">Duyệt</button>
                            <button class="btn reject" onclick="action('${id}', 'no')">Xóa</button>
                        </div>
                    </div>`);
            });
        });

        window.action = async (id, type) => {
            const snap = await get(ref(db, `pending_posts/${id}`));
            if(type === 'ok' && snap.exists()) {
                await set(ref(db, `posts/${id}`), snap.val());
            }
            await remove(ref(db, `pending_posts/${id}`));
            alert("Đã thực hiện!");
        };
    </script>
</body>
</html>
