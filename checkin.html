<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Điểm Danh - Yeamiko</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .test-box { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #00d4ff; text-align: center; width: 350px; }
        input { width: 100%; padding: 10px; margin: 15px 0; background: #222; border: 1px solid #333; color: white; border-radius: 5px; }
        button { background: #00d4ff; color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; }
        button:hover { background: #00b8e6; }
        #status { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="test-box">
    <h2>YEAMIKO TEST</h2>
    <p>Nhập tên Minecraft để nhận quà</p>
    <input type="text" id="mc-name" placeholder="Ví dụ: TuanDung">
    <button onclick="testCheckin()">ĐIỂM DANH TEST</button>
    <div id="status"></div>
</div>

<script>
    // Cấu hình Firebase từ key bạn đã gửi
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        storageBucket: "yeamiko-web.firebasestorage.app",
        messagingSenderId: "380442978172",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };

    // Khởi tạo Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function testCheckin() {
        const name = document.getElementById('mc-name').value.trim();
        const statusDiv = document.getElementById('status');

        if (!name) {
            statusDiv.innerHTML = "<span style='color:red;'>Vui lòng nhập tên!</span>";
            return;
        }

        statusDiv.innerText = "Đang gửi dữ liệu...";

        // Ghi dữ liệu lên nhánh /users/[Tên_Minecraft]
        // Cấu trúc này khớp với đoạn Skript đã viết cho bạn
        firebase.database().ref('users/' + name).set({
            claimed: false,
            last_checkin: new Date().toLocaleDateString(),
            test_mode: true
        }).then(() => {
            statusDiv.innerHTML = "<span style='color:#2ecc71;'>Thành công! Vào game gõ /nhanqua nhé.</span>";
        }).catch((error) => {
            statusDiv.innerHTML = "<span style='color:red;'>Lỗi: " + error.message + "</span>";
        });
    }
</script>

</body>
</html>
