<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko - Điểm Danh</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin: 20px 0; }
        .day { padding: 10px; background: #222; border-radius: 5px; font-size: 10px; border: 1px solid #444; }
        .day.active { background: #00d4ff; color: black; font-weight: bold; border-color: #fff; }
        button { width: 100%; padding: 15px; background: #00d4ff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:hover { background: #00b8e6; }
        .info { margin-bottom: 15px; font-size: 18px; color: #00d4ff; }
    </style>
</head>
<body>

<div class="container">
    <h2>ĐIỂM DANH YEAMIKO</h2>
    <div class="info">Điểm của bạn: <span id="user-pts">0</span></div>
    
    <div class="grid" id="grid30">
        </div>

    <button onclick="doCheckin()">ĐIỂM DANH (+2 ĐIỂM)</button>
</div>

<script>
    // 2. Cấu hình Firebase (Giữ nguyên của bạn)
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        storageBucket: "yeamiko-web.firebasestorage.app",
        messagingSenderId: "380442978172",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 3. Hàm hiển thị thông tin khi trang vừa load
    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            updateUI(user.uid);
        } else {
            alert("Vui lòng đăng nhập trước!");
            // Nếu có trang login, bạn có thể chuyển hướng: window.location.href = "/login";
        }
    });

    async function updateUI(uid) {
        const snap = await database.ref('web_users/' + uid).once('value');
        const data = snap.val() || { points: 0, count: 0 };
        
        document.getElementById('user-pts').innerText = data.points;
        
        const grid = document.getElementById('grid30');
        grid.innerHTML = "";
        for(let i = 1; i <= 30; i++) {
            const div = document.createElement('div');
            div.className = i <= (data.count || 0) ? 'day active' : 'day';
            div.innerText = i;
            grid.appendChild(div);
        }
    }

    async function doCheckin() {
        const user = firebase.auth().currentUser;
        if (!user) return alert("Bạn chưa đăng nhập!");

        const uid = user.uid;
        const ref = database.ref('web_users/' + uid);
        
        try {
            const snap = await ref.once('value');
            let d = snap.val() || { points: 0, count: 0, last: "" };

            const today = new Date().toISOString().split('T')[0];
            if (d.last === today) return alert("Hôm nay bạn đã điểm danh rồi!");

            let nextCount = (d.count >= 30) ? 1 : (d.count || 0) + 1;
            
            await ref.update({
                points: (d.points || 0) + 2,
                count: nextCount,
                last: today
            });

            alert("Điểm danh thành công! +2 điểm.");
            updateUI(uid); // Cập nhật lại giao diện ngay lập tức

        } catch (error) {
            alert("Lỗi: " + error.message);
        }
    }
</script>

</body>
</html>
