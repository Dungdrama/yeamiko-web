<div class="main-content">
    <div id="auth-section" class="section">
        <h2 class="section-title">XÁC THỰC TÀI KHOẢN</h2>
        <input type="text" id="mc-user" placeholder="Tên Minecraft">
        <input type="text" id="link-code" placeholder="Mã /link">
        <button onclick="linkAccount()" class="btn-main">LIÊN KẾT NGAY</button>
    </div>

    <div id="checkin-section" class="section" style="display:none;">
        <h2 class="section-title">ĐIỂM DANH TÍCH LŨY (30 NGÀY)</h2>
        <div id="points-display">Điểm của bạn: <span id="user-pts">0</span></div>
        <div class="checkin-grid" id="grid30"></div>
        <button onclick="doCheckin()" class="btn-main">ĐIỂM DANH (+2 ĐIỂM)</button>
    </div>
</div>

<script>
// --- Cấu hình Firebase giữ nguyên như bạn đã gửi ---
async function linkAccount() {
    const user = document.getElementById('mc-user').value;
    const code = document.getElementById('link-code').value;
    const snap = await database.ref('linking/' + user).once('value');
    if(snap.val() && snap.val().code == code) {
        localStorage.setItem('verifiedUser', user);
        alert('Liên kết thành công!');
        showCheckin();
    } else { alert('Sai mã xác thực!'); }
}

async function doCheckin() {
    const user = localStorage.getItem('verifiedUser');
    const ref = database.ref('users/' + user);
    const snap = await ref.once('value');
    let d = snap.val() || {points:0, count:0, last:""};
    
    if(d.last === new Date().toLocaleDateString()) return alert('Hôm nay rồi!');
    
    let nextCount = (d.count >= 30) ? 1 : d.count + 1;
    await ref.update({
        points: d.points + 2,
        count: nextCount,
        last: new Date().toLocaleDateString()
    });
    alert('Thành công!');
}
</script>
