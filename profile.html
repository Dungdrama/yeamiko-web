<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ của tôi | Yeamiko Network</title>
    <style>
        :root { --bg-color: #ffffff; --card-color: #f4f7f6; --text-color: #2c3e50; --main-color: #00d4ff; --border-color: #e1e8ed; --sidebar-color: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; min-height: 100vh; }
        
        /* Sidebar Màu Đen */
        .sidebar { width: 260px; background-color: var(--sidebar-color); padding: 30px; display: flex; flex-direction: column; color: white; position: fixed; height: 100vh; }
        .logo { font-size: 2em; font-weight: bold; color: var(--main-color); margin-bottom: 40px; text-align: center; }
        .sidebar a { text-decoration: none; color: #bbb; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background-color: rgba(255,255,255,0.1); color: var(--main-color); }
        .sidebar a.active { font-weight: bold; background-color: rgba(0,212,255,0.1); }
        
        /* Main Content Màu Trắng */
        .main-content { margin-left: 260px; flex: 1; padding: 50px; background: white; }
        .profile-container { max-width: 600px; margin: 0 auto; text-align: center; }
        .profile-card { background: var(--card-color); border: 1px solid var(--border-color); padding: 40px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); }
        
        /* Avatar & Upload */
        #user-avatar { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #file-input { display: none; }
        .upload-label { cursor: pointer; color: var(--main-color); font-weight: bold; display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: white; border-radius: 20px; border: 2px solid var(--main-color); transition: 0.3s; }
        .upload-label:hover { background: var(--main-color); color: white; }
        
        /* Button & Info */
        .user-info { margin: 25px 0; border-top: 1px solid var(--border-color); padding-top: 20px; text-align: left; }
        .info-item { margin-bottom: 15px; font-size: 1.1em; color: #555; }
        .info-label { font-weight: bold; color: var(--text-color); width: 100px; display: inline-block; }
        .btn-action { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 1em; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        #save-btn { background-color: var(--main-color); color: white; display: none; }
        #logout-btn { background-color: #f5f8fa; color: #e74c3c; border: 1px solid #ddd; }
        #status-msg { margin-top: 15px; font-size: 0.9em; font-weight: bold; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="/index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="/forum.html"><i class="fas fa-comments"></i> Diễn đàn</a>
        <a href="/profile.html" class="active"><i class="fas fa-user"></i> Hồ sơ</a>
    </div>

    <div class="main-content">
        <div class="profile-container">
            <h1 style="margin-bottom: 30px;">HỒ SƠ CỦA TÔI</h1>
            <div class="profile-card">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=eaeaea">
                <br>
                <label for="file-input" class="upload-label">
                    <i class="fas fa-camera"></i> Đổi ảnh đại diện
                </label>
                <input type="file" id="file-input" accept="image/*">
                <br>
                <button id="save-btn" class="btn-action">LƯU THAY ĐỔI</button>
                
                <p id="status-msg"></p>
                
                <div class="user-info">
                    <div class="info-item"><span class="info-label">Tên:</span> <span id="user-name">Đang tải...</span></div>
                    <div class="info-item"><span class="info-label">Email:</span> <span id="user-email">Đang tải...</span></div>
                </div>
                
                <button id="logout-btn" class="btn-action"><i class="fas fa-sign-out-alt"></i> ĐĂNG XUẤT</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        // Cấu hình Yeamiko
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const avatarImg = document.getElementById('user-avatar');
        const fileInput = document.getElementById('file-input');
        const saveBtn = document.getElementById('save-btn');
        const status = document.getElementById('status-msg');

        // Hiển thị thông tin người dùng
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-name').innerText = user.displayName || user.email.split('@')[0];
                document.getElementById('user-email').innerText = user.email;
                if (user.photoURL) avatarImg.src = user.photoURL;
            } else { location.href = '/login.html'; }
        });

        // Xử lý khi chọn file
        fileInput.onchange = (e) => {
            if (e.target.files[0]) {
                avatarImg.src = URL.createObjectURL(e.target.files[0]);
                saveBtn.style.display = 'block';
            }
        };

        // Hàm nén ảnh sang Base64
        const toBase64 = (file) => new Promise((res) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX = 300; // Avatar chỉ cần 300px là đủ
                    const scale = MAX / img.width; canvas.width = MAX; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    res(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]); // Nén jpeg 80%
                };
            };
        });

        // Lưu ảnh đại diện bằng FreeImage API
        saveBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;
            status.style.color = '#00d4ff'; status.innerText = "⏳ Đang tải ảnh lên...";
            try {
                const base64Data = await toBase64(file);
                const formData = new FormData();
                formData.append('key', '6d207e02198a847aa98d0a2a901485a5'); // API Key chuẩn của Dũng
                formData.append('action', 'upload');
                formData.append('source', base64Data); // Sử dụng tham số source theo chuẩn API
                formData.append('format', 'json');

                const res = await fetch('https://freeimage.host/api/1/upload', {
                    method: 'POST', body: formData
                });
                const resData = await res.json();
                if (resData.status_code === 200) {
                    await updateProfile(auth.currentUser, { photoURL: resData.image.url });
                    status.style.color = '#2ecc71'; status.innerText = "✅ Đổi avatar thành công!";
                    saveBtn.style.display = 'none';
                } else { throw new Error(resData.error.message); }
            } catch (err) { status.style.color = '#e74c3c'; status.innerText = "❌ Lỗi: " + err.message; console.error(err); }
        };

        // Đăng xuất
        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.href = '/login.html');
    </script>
</body>
</html>
