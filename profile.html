<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ Discord | Yeamiko</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --discord-blue: #5865f2; --bg-gray: #f2f3f5; --card-bg: #ffffff; --text-dark: #060607; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg-gray); color: var(--text-dark); }

        /* Banner & Avatar */
        .profile-container { width: 100%; max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; position: relative; }
        .banner { width: 100%; height: 120px; background: #a59d60; position: relative; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }
        
        .avatar-section { position: relative; padding: 0 16px; margin-top: -45px; display: flex; align-items: flex-end; justify-content: space-between; }
        .avatar-wrapper { position: relative; width: 90px; height: 90px; }
        
        /* Khung Hồ Ly Kitsune */
        .kitsune-frame {
            position: absolute; top: -15px; left: -15px; width: 120px; height: 120px;
            background: url('https://i.imgur.com/your-kitsune-frame-link.png'); /* Thay link ảnh khung của bạn vào đây */
            background-size: contain; background-repeat: no-repeat; z-index: 10; pointer-events: none;
        }
        
        .main-avatar { 
            width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; 
            background: #eee; position: relative; z-index: 5; object-fit: cover;
        }

        /* Thông tin User */
        .user-info { padding: 16px; }
        .display-name { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .username { color: #4e5058; font-size: 14px; margin-bottom: 15px; }
        .badges { display: flex; gap: 8px; align-items: center; }
        .badge-icon { background: #ebedef; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 4px; }

        /* Nút Sửa Hồ Sơ */
        .btn-edit-full { 
            background: var(--discord-blue); color: white; border: none; width: calc(100% - 32px); 
            margin: 0 16px; padding: 10px; border-radius: 20px; font-weight: bold; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* Tabs */
        .tabs { display: flex; border-bottom: 1px solid #e3e5e8; margin-top: 20px; }
        .tab-item { flex: 1; text-align: center; padding: 12px; color: #4e5058; font-weight: 600; cursor: pointer; }
        .tab-item.active { color: var(--discord-blue); border-bottom: 2px solid var(--discord-blue); }

        /* Card Tiểu sử */
        .info-card { background: #f8f9fa; border-radius: 12px; margin: 16px; padding: 16px; }
        .card-label { font-size: 12px; font-weight: 800; text-transform: uppercase; color: #4e5058; margin-bottom: 8px; }
        .bio-text { font-size: 14px; line-height: 1.6; color: #313338; }

        /* Modal Chỉnh sửa */
        .modal { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 90vh; 
            background: white; z-index: 1000; transition: 0.4s; 
            border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
            padding: 20px; overflow-y: auto;
        }
        .modal.open { bottom: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 8px; color: #4e5058; }
        .input-box input, .input-box textarea { 
            width: 100%; padding: 12px; border: none; background: #ebedef; 
            border-radius: 8px; outline: none; font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="banner">
            <img id="user-banner" src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=500">
        </div>

        <div class="avatar-section">
            <div class="avatar-wrapper">
                <div class="kitsune-frame"></div> <img id="user-avatar" class="main-avatar" src="https://ui-avatars.com/api/?name=Dung">
            </div>
            <div style="display:flex; gap:10px;">
                <i class="fas fa-cog" style="color:#4e5058; cursor:pointer;"></i>
            </div>
        </div>

        <div class="user-info">
            <div class="display-name">Dung 💐 <i class="fas fa-chevron-down" style="font-size:14px; color:#4e5058;"></i></div>
            <div class="username">dungdrama</div>
            
            <div class="badges">
                <div class="badge-icon"><i class="fas fa-gem" style="color:#5865f2;"></i> EMOD</div>
                <div class="badge-icon"><i class="fas fa-certificate" style="color:#a59d60;"></i></div>
            </div>
        </div>

        <button class="btn-edit-full" onclick="openEdit()"><i class="fas fa-pen"></i> Sửa Hồ Sơ</button>

        <div class="tabs">
            <div class="tab-item active">Chính</div>
            <div class="tab-item">Danh Sách Mong Muốn</div>
        </div>

        <div class="info-card">
            <div class="card-label">Tiểu sử</div>
            <div class="bio-text">
                ❤️❤️❤️<br>
                Profile me: https://profile.dungmc.xyz/<br>
                Server discord me: https://sd.dungmc.xyz/
            </div>
        </div>

        <div class="info-card">
            <div class="card-label">Gia Nhập Từ</div>
            <div class="bio-text"><i class="fab fa-discord"></i> 7 thg 4, 2023</div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-header">
            <i class="fas fa-arrow-left" onclick="closeEdit()" style="cursor:pointer;"></i>
            <h3 style="flex:1; text-align:center;">Hồ sơ</h3>
            <span style="color:var(--discord-blue); font-weight:bold; cursor:pointer;" id="btn-save">Lưu</span>
        </div>

        <div class="input-box">
            <label>Tên hiển thị</label>
            <input type="text" id="edit-name" value="Dung 💐">
        </div>

        <div class="input-box">
            <label>Mật khẩu mới</label>
            <input type="password" id="edit-pass" placeholder="Bỏ trống nếu không đổi">
        </div>

        <div class="input-box">
            <label>Tiểu sử</label>
            <textarea id="edit-bio" rows="4">❤️❤️❤️
Profile me: https://profile.dungmc.xyz/
Server discord me: https://sd.dungmc.xyz/</textarea>
        </div>

        <div class="info-card" style="margin:0; background:#ebedef;">
            <div class="card-label">Trang Trí Ảnh Đại Diện</div>
            <div style="display:flex; align-items:center; justify-content:space-between;">
                <span>Hồ Ly Kitsune</span>
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.openEdit = () => document.getElementById('editModal').classList.add('open');
        window.closeEdit = () => document.getElementById('editModal').classList.remove('open');

        // Các logic Firebase cũ của bạn (Lưu tên, mật khẩu, avatar) vẫn giữ nguyên ở đây...
        // Tôi chỉ cập nhật giao diện hiển thị cho giống ảnh mẫu nhất.
    </script>
</body>
</html>
