<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ Yeamiko</title>
    <style>
        :root { --main: #00d4ff; --bg: #ffffff; --text: #222; --sidebar: #111; --card: #f9f9f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; }
        
        .sidebar { width: 250px; background: var(--sidebar); height: 100vh; position: fixed; padding: 20px; color: white; }
        .sidebar .logo { font-size: 24px; font-weight: bold; color: var(--main); margin-bottom: 30px; text-align: center; }
        .sidebar a { display: block; color: #ccc; padding: 12px; text-decoration: none; border-radius: 8px; margin-bottom: 5px; }
        .sidebar a.active, .sidebar a:hover { background: rgba(0,212,255,0.1); color: var(--main); }

        .main-content { margin-left: 250px; flex: 1; padding: 40px; display: flex; justify-content: center; }
        .profile-card { background: var(--card); border: 1px solid #eee; padding: 30px; border-radius: 15px; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        #user-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--main); margin-bottom: 15px; }
        .upload-btn { display: inline-block; padding: 8px 15px; background: white; border: 1px solid var(--main); color: var(--main); border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-save { display: none; width: 100%; background: var(--main); color: white; border: none; padding: 12px; border-radius: 8px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        .info-box { text-align: left; margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
        .logout-btn { margin-top: 20px; color: #ff4757; cursor: pointer; background: none; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="/index.html">Trang chủ</a>
        <a href="/forum.html">Diễn đàn</a>
        <a href="/profile.html" class="active">Hồ sơ</a>
    </div>

    <div class="main-content">
        <div class="profile-card">
            <h1>Hồ sơ của tôi</h1>
            <img id="user-avatar" src="https://ui-avatars.com/api/?name=User">
            <br>
            <label class="upload-btn">Đổi ảnh đại diện<input type="file" id="file-input" hidden accept="image/*"></label>
            <button id="save-btn" class="btn-save">LƯU THAY ĐỔI</button>
            <p id="status" style="margin-top:10px; font-size:13px;"></p>

            <div class="info-box">
                <p><strong>Tên:</strong> <span id="u-name">...</span></p>
                <p><strong>Email:</strong> <span id="u-email">...</span></p>
            </div>
            <button id="logout-btn" class="logout-btn">Đăng xuất</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('u-name').innerText = user.displayName || user.email.split('@')[0];
                document.getElementById('u-email').innerText = user.email;
                if (user.photoURL) document.getElementById('user-avatar').src = user.photoURL;
            } else { window.location.href = '/login.html'; }
        });

        document.getElementById('file-input').onchange = e => {
            if (e.target.files[0]) {
                document.getElementById('user-avatar').src = URL.createObjectURL(e.target.files[0]);
                document.getElementById('save-btn').style.display = 'block';
            }
        };

        document.getElementById('save-btn').onclick = async () => {
            const file = document.getElementById('file-input').files[0];
            const status = document.getElementById('status');
            status.innerText = "⏳ Đang tải...";
            
            try {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1];
                    const fd = new FormData();
                    fd.append('key', '6d207e02198a847aa98d0a2a901485a5');
                    fd.append('action', 'upload');
                    fd.append('source', base64);

                    const res = await fetch('https://freeimage.host/api/1/upload', { method: 'POST', body: fd });
                    const data = await res.json();
                    if (data.status_code === 200) {
                        await updateProfile(auth.currentUser, { photoURL: data.image.url });
                        status.innerText = "✅ Thành công!";
                        document.getElementById('save-btn').style.display = 'none';
                    }
                };
            } catch (err) { status.innerText = "❌ Lỗi kết nối"; }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
