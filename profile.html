<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ Yeamiko Network</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container { text-align: center; padding: 20px; }
        .avatar-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .avatar-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #00d4ff; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; opacity: 0; transition: 0.3s; }
        .avatar-wrapper:hover .overlay { opacity: 1; }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="card profile-container">
            <h2>CHỈNH SỬA HỒ SƠ</h2>
            
            <div class="avatar-wrapper" id="change-avatar">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=User" class="avatar-img">
                <div class="overlay">Đổi ảnh</div>
                <input type="file" id="file-input" hidden accept="image/*">
            </div>

            <div style="text-align: left; margin-top: 20px;">
                <label>Tên người chơi:</label>
                <input type="text" id="display-name" placeholder="Nhập tên mới...">
                <button id="btn-save" class="btn-auth">LƯU THÔNG TIN</button>
                <p id="status" style="text-align: center; margin-top: 10px;"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0", //
            authDomain: "yeamiko-web.firebaseapp.com",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('display-name').value = user.displayName || "";
                if (user.photoURL) document.getElementById('user-avatar').src = user.photoURL;
            } else { window.location.href = '/login.html'; }
        });

        // Xử lý khi ấn vào ảnh
        document.getElementById('change-avatar').onclick = () => document.getElementById('file-input').click();

        // Tự động tải ảnh lên Imgur khi chọn file
        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const status = document.getElementById('status');
            status.innerText = "Đang xử lý ảnh...";

            // Upload lên Imgur (Dùng Client ID công khai)
            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('https://api.imgur.com/3/image', {
                    method: 'POST',
                    headers: { Authorization: 'Client-ID 546c25a59c58ad7' }, // Client ID mẫu
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    const link = data.data.link;
                    await updateProfile(auth.currentUser, { photoURL: link });
                    document.getElementById('user-avatar').src = link;
                    status.innerText = "Đã cập nhật ảnh đại diện!";
                    status.style.color = "#2ecc71";
                }
            } catch (err) {
                status.innerText = "Lỗi khi tải ảnh. Thử lại sau nhé!";
                status.style.color = "#e74c3c";
            }
        };

        document.getElementById('btn-save').onclick = async () => {
            const name = document.getElementById('display-name').value;
            try {
                await updateProfile(auth.currentUser, { displayName: name });
                alert("Đã đổi tên thành công!");
                location.reload();
            } catch (err) { alert("Lỗi: " + err.message); }
        };
    </script>
</body>
</html>
