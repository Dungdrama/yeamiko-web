<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ Yeamiko</title>
    <style>
        :root { --main: #00d4ff; --bg: #ffffff; --text: #222; --sidebar: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; }
        .sidebar { width: 250px; background: var(--sidebar); height: 100vh; position: fixed; padding: 20px; color: white; }
        .sidebar .logo { font-size: 24px; font-weight: bold; color: var(--main); margin-bottom: 30px; text-align: center; }
        .sidebar a { display: block; color: #ccc; padding: 12px; text-decoration: none; border-radius: 8px; margin-bottom: 5px; }
        .sidebar a.active { background: rgba(0,212,255,0.1); color: var(--main); }
        .main-content { margin-left: 250px; flex: 1; padding: 40px; display: flex; justify-content: center; }
        .profile-card { background: #f9f9f9; border: 1px solid #eee; padding: 30px; border-radius: 15px; width: 100%; max-width: 450px; text-align: center; }
        #user-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--main); margin-bottom: 15px; background: #eee; }
        .upload-btn { display: inline-block; padding: 10px 20px; background: white; border: 1px solid var(--main); color: var(--main); border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-save { display: none; width: 100%; background: var(--main); color: white; border: none; padding: 12px; border-radius: 8px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        .info-box { text-align: left; margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; line-height: 2; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="/index.html">Trang chủ</a>
        <a href="/forum.html">Diễn đàn</a>
        <a href="/profile.html" class="active">Hồ sơ</a>
    </div>
    <div class="main-content">
        <div class="profile-card">
            <h2 style="margin-bottom:20px">Thiết lập hồ sơ</h2>
            <img id="user-avatar" src="https://ui-avatars.com/api/?name=User">
            <br>
            <label class="upload-btn">Chọn ảnh mới<input type="file" id="file-input" hidden accept="image/*"></label>
            <button id="save-btn" class="btn-save">LƯU THAY ĐỔI</button>
            <p id="status" style="margin-top:10px; font-weight: bold;"></p>
            <div class="info-box">
                <p><strong>Tên:</strong> <span id="u-name">...</span></p>
                <p><strong>Email:</strong> <span id="u-email">...</span></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('u-name').innerText = user.displayName || user.email.split('@')[0];
                document.getElementById('u-email').innerText = user.email;
                if (user.photoURL) document.getElementById('user-avatar').src = user.photoURL;
            } else { window.location.href = '/login.html'; }
        });

        document.getElementById('file-input').onchange = e => {
            if (e.target.files[0]) {
                document.getElementById('user-avatar').src = URL.createObjectURL(e.target.files[0]);
                document.getElementById('save-btn').style.display = 'block';
            }
        };

        const getBase64 = (file) => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result.split(',')[1]);
            reader.onerror = e => rej(e);
        });

        document.getElementById('save-btn').onclick = async () => {
            const file = document.getElementById('file-input').files[0];
            const status = document.getElementById('status');
            if(!file) return;
            
            status.style.color = "orange";
            status.innerText = "⏳ Đang tải ảnh lên...";
            
            try {
                const b64 = await getBase64(file);
                const fd = new FormData();
                fd.append('key', '6d207e02198a847aa98d0a2a901485a5');
                fd.append('action', 'upload');
                fd.append('source', b64);

                const res = await fetch('https://freeimage.host/api/1/upload', { method: 'POST', body: fd });
                const data = await res.json();
                
                if (data.status_code === 200) {
                    await updateProfile(auth.currentUser, { photoURL: data.image.url });
                    status.style.color = "green";
                    status.innerText = "✅ Đã cập nhật ảnh đại diện!";
                    document.getElementById('save-btn').style.display = 'none';
                } else {
                    status.innerText = "❌ Lỗi: " + data.error.message;
                }
            } catch (err) {
                status.innerText = "❌ Lỗi kết nối API";
            }
        };
    </script>
</body>
</html>
