<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân | Yeamiko</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #00d4ff; --bg: #f0f2f5; --sidebar-dark: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- MENU 3 GẠCH & SIDEBAR (BỔ SUNG) --- */
        .menu-toggle { 
            position: fixed; top: 20px; left: 20px; z-index: 1500; 
            background: var(--main); color: #000; width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .sidebar { 
            width: 260px; background: var(--sidebar-dark); height: 100vh; 
            position: fixed; padding: 30px 20px; color: white; z-index: 2000; 
            left: -260px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; flex-direction: column; 
        }
        .sidebar.open { left: 0; }
        .sidebar .logo { font-size: 24px; font-weight: 900; color: var(--main); margin-bottom: 40px; text-align: center; letter-spacing: 2px; }
        .sidebar a { 
            display: flex; align-items: center; color: #bbb; padding: 14px 18px; 
            text-decoration: none; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; 
        }
        .sidebar a i { margin-right: 15px; width: 20px; text-align: center; }
        .sidebar a:hover, .sidebar a.active { background: rgba(0, 212, 255, 0.1); color: var(--main); font-weight: bold; }

        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1800; display: none; backdrop-filter: blur(3px);
        }
        .sidebar-overlay.show { display: block; }

        /* --- NỘI DUNG CHÍNH (GIỮ NGUYÊN STYLE) --- */
        .main-content { flex: 1; padding: 40px 20px; max-width: 1000px; margin: 0 auto; width: 100%; transition: 0.4s; }
        
        .profile-container { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 30px; }
        .cover-photo { height: 200px; background: linear-gradient(45deg, #00d4ff, #0055ff); position: relative; }
        .profile-info { padding: 0 30px 30px; position: relative; text-align: center; }
        .avatar-wrapper { position: relative; width: 150px; height: 150px; margin: -75px auto 15px; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; border: 5px solid white; object-fit: cover; background: #eee; }
        
        #txt-name { font-size: 28px; font-weight: 800; color: #1c1e21; margin-bottom: 5px; }
        #txt-email { color: #65676b; font-size: 15px; margin-bottom: 20px; }

        .stats-bar { display: flex; justify-content: center; gap: 40px; border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; }
        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 20px; font-weight: 700; color: #1c1e21; }
        .stat-label { font-size: 13px; color: #65676b; text-transform: uppercase; }

        .btn-logout { background: #fee2e2; color: #ef4444; border: none; padding: 10px 25px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-logout:hover { background: #fecaca; }

        /* Posts Section */
        .posts-section { max-width: 700px; margin: 0 auto; }
        .section-title { font-size: 20px; font-weight: 700; color: #1c1e21; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .post-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
        .post-meta { font-size: 13px; color: #65676b; margin-bottom: 12px; }
        .post-text { font-size: 16px; color: #1c1e21; line-height: 1.5; margin-bottom: 15px; }
        .post-img { width: 100%; border-radius: 10px; margin-bottom: 15px; max-height: 400px; object-fit: cover; }
        .post-stats { border-top: 1px solid #eee; padding-top: 12px; color: #ef4444; font-size: 14px; font-weight: 600; }

        @media (max-width: 768px) {
            .main-content { padding-top: 80px; }
            .stats-bar { gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="forum.html"><i class="fas fa-comments"></i> Diễn đàn</a>
        <a href="checkin.html"><i class="fas fa-calendar-check"></i> Điểm danh</a>
        <a href="shop.html"><i class="fas fa-shopping-cart"></i> Cửa hàng</a>
        <a href="profile.html" class="active"><i class="fas fa-user"></i> Hồ sơ</a>
    </div>

    <div class="main-content">
        <div class="profile-container">
            <div class="cover-photo"></div>
            <div class="profile-info">
                <div class="avatar-wrapper">
                    <img src="https://via.placeholder.com/150" id="img-avatar" class="avatar-img">
                </div>
                <h1 id="txt-name">Đang tải...</h1>
                <p id="txt-email">...</p>
                
                <div class="stats-bar">
                    <div class="stat-item">
                        <span class="stat-value" id="count-posts">0</span>
                        <span class="stat-label">Bài viết</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="count-points">0</span>
                        <span class="stat-label">Points</span>
                    </div>
                </div>

                <button class="btn-logout" id="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Đăng xuất
                </button>
            </div>
        </div>

        <div class="posts-section">
            <h2 class="section-title"><i class="fas fa-history"></i> Hoạt động gần đây</h2>
            <div id="my-posts">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // HÀM TOGGLE MENU (BỔ SUNG)
        window.toggleMenu = function() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }

        onAuthStateChanged(auth, user => {
            if (user) {
                loadProfile(user);
                loadMyPosts(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        function loadProfile(user) {
            onValue(ref(db, `web_users/${user.uid}`), s => {
                const data = s.val() || {};
                const mcName = data.linked_mc || "Chưa liên kết";
                document.getElementById('txt-name').innerText = mcName;
                document.getElementById('txt-email').innerText = user.email;
                document.getElementById('count-points').innerText = data.points || 0;
                document.getElementById('img-avatar').src = mcName !== "Chưa liên kết" 
                    ? `https://mc-heads.net/avatar/${mcName}` 
                    : "https://mc-heads.net/avatar/steve";
            });
        }

        function loadMyPosts(uid) {
            onValue(ref(db, 'posts'), s => {
                const list = document.getElementById('my-posts');
                const data = s.val();
                if(!data) { list.innerHTML = "Chưa có bài đăng nào."; return; }
                
                const myPosts = Object.keys(data)
                    .filter(k => data[k].uid === uid)
                    .sort((a,b) => data[b].time - data[a].time);

                document.getElementById('count-posts').innerText = myPosts.length;

                if(myPosts.length === 0) {
                    list.innerHTML = "Bạn chưa đăng bài nào.";
                    return;
                }

                list.innerHTML = myPosts.map(k => {
                    const p = data[k];
                    const postDate = new Date(p.time).toLocaleString('vi-VN', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });

                    return `
                        <div class="post-card">
                            <div class="post-meta">
                                <i class="far fa-clock"></i> ${postDate}
                            </div>
                            <div class="post-text">${p.text || ""}</div>
                            ${p.img ? `<img src="${p.img}" class="post-img">` : ""}
                            <div class="post-stats">
                                <i class="fas fa-heart"></i>&nbsp;${p.likes || 0} lượt thích
                            </div>
                        </div>`;
                }).join('');
            });
        }

        document.getElementById('btn-logout').onclick = () => signOut(auth);
    </script>
</body>
</html>
