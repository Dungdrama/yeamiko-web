<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ Yeamiko</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #00d4ff; --bg: #f4f7f6; --sidebar-dark: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- SỬA MENU: NÚT 3 GẠCH --- */
        .menu-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 1500;
            background: var(--main); color: #000; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
        }

        /* --- SỬA MENU: SIDEBAR TRƯỢT --- */
        .sidebar { 
            width: 250px; background: var(--sidebar-dark); height: 100vh; 
            position: fixed; padding: 25px; color: white; z-index: 2000;
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05);
            left: -250px; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.open { left: 0; }

        .sidebar .logo { font-size: 26px; font-weight: 900; color: var(--main); margin-bottom: 40px; text-align: center; text-transform: uppercase; }
        .sidebar a { display: flex; align-items: center; color: #bbb; padding: 15px; text-decoration: none; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar a i { margin-right: 12px; width: 20px; text-align: center; }
        .sidebar a.active, .sidebar a:hover { background: rgba(0, 212, 255, 0.1); color: var(--main); font-weight: bold; }
        
        .logout-item { color: #ff4d4d !important; border: 1px solid rgba(255, 77, 77, 0.2) !important; margin-top: auto; }

        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1800; display: none; backdrop-filter: blur(3px);
        }
        .sidebar-overlay.show { display: block; }

        /* --- GIỮ NGUYÊN GIAO DIỆN HỒ SƠ CŨ --- */
        .main-content { 
            flex: 1; padding: 80px 20px; 
            display: flex; justify-content: center; align-items: flex-start; width: 100%;
        }
        .profile-card { 
            background: #fff; padding: 30px; border-radius: 20px; 
            width: 100%; max-width: 500px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); 
        }
        
        .avatar-box { text-align: center; margin-bottom: 30px; }
        #user-avatar { 
            width: 120px; height: 120px; border-radius: 50%; 
            object-fit: cover; border: 3px solid var(--main); 
            margin-bottom: 10px; background: #eee; 
        }
        .btn-upload { font-size: 13px; color: var(--main); cursor: pointer; font-weight: bold; display: inline-block; }

        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #555; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; outline: none; transition: 0.3s; 
        }
        input:focus { border-color: var(--main); }

        .btn-save { 
            width: 100%; background: var(--main); color: white; border: none; 
            padding: 14px; border-radius: 10px; cursor: pointer; 
            font-weight: bold; margin-top: 15px; font-size: 16px; 
        }
        
        #status { text-align: center; margin-top: 15px; font-weight: bold; font-size: 13px; }
        .section-title { border-bottom: 2px solid #f8f9fa; padding-bottom: 10px; margin-bottom: 20px; color: #333; font-size: 18px; font-weight: bold; }

        @media (max-width: 768px) {
            .main-content { padding-top: 100px; }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>

    <div class="sidebar-overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="forum.html"><i class="fas fa-comments"></i><span>Diễn đàn</span></a>
        <a href="profile.html" class="active"><i class="fas fa-user"></i><span>Hồ sơ</span></a>
        <a href="#" id="btn-logout" class="logout-item"><i class="fas fa-sign-out-alt"></i><span>Đăng xuất</span></a>
    </div>

    <div class="main-content">
        <div class="profile-card">
            <h2 class="section-title">Hồ sơ của bạn</h2>
            
            <div class="avatar-box">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=User">
                <br>
                <label class="btn-upload">Đổi ảnh đại diện <input type="file" id="f-input" hidden accept="image/*"></label>
            </div>

            <div class="form-group">
                <label>Tên của bạn</label>
                <input type="text" id="display-name" placeholder="Nhập tên mới...">
            </div>

            <h2 class="section-title" style="margin-top: 30px;">Đổi mật khẩu</h2>
            
            <div class="form-group">
                <label>Mật khẩu mới</label>
                <input type="password" id="new-password" placeholder="Bỏ trống nếu không đổi">
            </div>

            <div class="form-group">
                <label>Xác nhận lại</label>
                <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu mới">
            </div>

            <button id="btn-update" class="btn-save">LƯU CẬP NHẬT</button>
            <p id="status"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updatePassword, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // Firebase Config giữ nguyên
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentAvatarB64 = "";

        // Điều khiển Menu
        window.toggleMenu = function() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        };

        // Giữ nguyên logic xử lý Profile
        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('display-name').value = user.displayName || "";
                onValue(ref(db, 'users/' + user.uid), s => {
                    if (s.exists() && s.val().avatar) {
                        document.getElementById('user-avatar').src = s.val().avatar;
                        currentAvatarB64 = s.val().avatar;
                    }
                });
            } else { window.location.href = 'login.html'; }
        });

        document.getElementById('f-input').onchange = e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const img = new Image();
                    img.src = reader.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 150; canvas.height = 150;
                        canvas.getContext('2d').drawImage(img, 0, 0, 150, 150);
                        currentAvatarB64 = canvas.toDataURL('image/jpeg', 0.6);
                        document.getElementById('user-avatar').src = currentAvatarB64;
                    };
                };
            }
        };

        document.getElementById('btn-logout').onclick = (e) => {
            e.preventDefault();
            if(confirm("Bạn muốn đăng xuất à?")) {
                signOut(auth).then(() => { window.location.href = 'login.html'; });
            }
        };

        document.getElementById('btn-update').onclick = async () => {
            const user = auth.currentUser;
            const newName = document.getElementById('display-name').value;
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;
            const stt = document.getElementById('status');
            stt.style.color = "var(--main)";
            stt.innerText = "⏳ Đang lưu...";
            try {
                await set(ref(db, 'users/' + user.uid), { name: newName, avatar: currentAvatarB64 });
                await updateProfile(user, { displayName: newName });
                if (newPass) {
                    if (newPass !== confirmPass) throw new Error("Mật khẩu không khớp!");
                    await updatePassword(user, newPass);
                }
                stt.style.color = "#2ecc71";
                stt.innerText = "✅ Đã cập nhật xong!";
            } catch (err) {
                stt.style.color = "#e74c3c";
                stt.innerText = "❌ Lỗi: " + err.message;
            }
        };
    </script>
</body>
</html>
