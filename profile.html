<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ Yeamiko</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #00d4ff; --bg: #ffffff; --text: #222; --sidebar: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
        
        /* Sidebar Đen */
        .sidebar { width: 250px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; }
        .sidebar .logo { font-size: 26px; font-weight: bold; color: var(--main); margin-bottom: 40px; text-align: center; }
        .sidebar a { display: block; color: #bbb; padding: 15px; text-decoration: none; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar a.active { background: rgba(0,212,255,0.1); color: var(--main); }
        
        /* Content Trắng */
        .main-content { margin-left: 250px; flex: 1; padding: 40px; display: flex; justify-content: center; }
        .profile-card { background: #fdfdfd; border: 1px solid #eee; padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        #user-avatar { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid var(--main); margin-bottom: 20px; background: #f0f0f0; }
        .btn-upload { display: inline-block; padding: 10px 25px; background: white; border: 2px solid var(--main); color: var(--main); border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-upload:hover { background: var(--main); color: white; }
        .btn-save { display: none; width: 100%; background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 10px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        .info { text-align: left; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .info p { margin-bottom: 10px; font-size: 16px; color: #444; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="/index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="/forum.html"><i class="fas fa-comments"></i> Diễn đàn</a>
        <a href="/profile.html" class="active"><i class="fas fa-user"></i> Hồ sơ</a>
    </div>

    <div class="main-content">
        <div class="profile-card">
            <h2 style="margin-bottom: 25px;">Hồ sơ của tôi</h2>
            <img id="user-avatar" src="https://ui-avatars.com/api/?name=User">
            <br>
            <label class="btn-upload">Chọn ảnh mới <input type="file" id="f-input" hidden accept="image/*"></label>
            <button id="s-btn" class="btn-save">XÁC NHẬN LƯU ẢNH</button>
            <p id="stt" style="margin-top:15px; font-weight: bold; font-size: 14px;"></p>
            <div class="info">
                <p><strong>👤 Tên:</strong> <span id="u-name">Đang tải...</span></p>
                <p><strong>📧 Email:</strong> <span id="u-email">Đang tải...</span></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('u-name').innerText = user.displayName || user.email.split('@')[0];
                document.getElementById('u-email').innerText = user.email;
                if (user.photoURL && user.photoURL.startsWith('http')) {
                    document.getElementById('user-avatar').src = user.photoURL;
                }
            } else { window.location.href = '/login.html'; }
        });

        document.getElementById('f-input').onchange = e => {
            if (e.target.files[0]) {
                document.getElementById('user-avatar').src = URL.createObjectURL(e.target.files[0]);
                document.getElementById('s-btn').style.display = 'block';
            }
        };

        // Hàm nén ảnh để upload nhanh hơn
        const compressForUpload = file => new Promise(res => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = e => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 300; // Avatar chỉ cần 300px
                    canvas.height = 300;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 300, 300);
                    res(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                }
            }
        });

        document.getElementById('s-btn').onclick = async () => {
            const file = document.getElementById('f-input').files[0];
            const stt = document.getElementById('stt');
            if(!file) return;

            stt.style.color = "orange";
            stt.innerText = "⏳ Đang tải ảnh lên hệ thống...";

            try {
                const base64Data = await compressForUpload(file);
                
                const formData = new FormData();
                formData.append('key', '6d207e02198a847aa98d0a2a901485a5');
                formData.append('action', 'upload');
                formData.append('source', base64Data);
                formData.append('format', 'json');

                const response = await fetch('https://freeimage.host/api/1/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.status_code === 200) {
                    const newPhotoURL = result.image.url;
                    await updateProfile(auth.currentUser, { photoURL: newPhotoURL });
                    stt.style.color = "green";
                    stt.innerText = "✅ Đổi avatar thành công!";
                    document.getElementById('s-btn').style.display = 'none';
                } else {
                    stt.style.color = "red";
                    stt.innerText = "❌ Lỗi: " + result.error.message;
                }
            } catch (err) {
                stt.style.color = "red";
                stt.innerText = "❌ Lỗi mạng hoặc API. Thử lại sau!";
                console.error(err);
            }
        };
    </script>
</body>
</html>
