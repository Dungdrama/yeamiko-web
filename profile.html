<script type="module">
    // ... (Phần config Firebase giữ nguyên) ...

    const FREEIMAGE_KEY = "6d207e02198a847aa98d0a2a901485a5";

    // Hàm nén ảnh (Giúp tránh lỗi mạng do ảnh quá nặng)
    const compressImg = file => new Promise(res => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 300; canvas.height = 300; // Avatar chỉ cần nhỏ
                canvas.getContext('2d').drawImage(img, 0, 0, 300, 300);
                res(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
            }
        }
    });

    document.getElementById('s-btn').onclick = async () => {
        const file = document.getElementById('f-input').files[0];
        const stt = document.getElementById('stt');
        if(!file) return;

        stt.innerText = "⏳ Đang đồng bộ ảnh...";

        try {
            const b64 = await compressImg(file);
            const fd = new FormData();
            fd.append('key', FREEIMAGE_KEY);
            fd.append('action', 'upload');
            fd.append('source', b64);

            const res = await fetch('https://freeimage.host/api/1/upload', { method: 'POST', body: fd });
            const data = await res.json();

            if (data.status_code === 200) {
                await updateProfile(auth.currentUser, { photoURL: data.image.url });
                stt.innerText = "✅ Đã xong!";
                document.getElementById('s-btn').style.display = 'none';
            }
        } catch (e) { stt.innerText = "❌ Lỗi kết nối đồng bộ"; }
    };
</script>
