<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ Yeamiko</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #00d4ff; --bg: #f8f9fa; --sidebar: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); display: flex; min-height: 100vh; }
        
        /* Sidebar giống ảnh của Dũng */
        .sidebar { 
            width: 250px; 
            background: var(--sidebar); 
            height: 100vh; 
            position: fixed; 
            padding: 25px; 
            color: white; 
            display: flex; 
            flex-direction: column; 
        }
        .sidebar .logo { 
            font-size: 24px; 
            font-weight: bold; 
            color: var(--main); 
            margin-bottom: 40px; 
            text-align: center; 
            text-transform: uppercase;
        }
        .sidebar a { 
            display: flex; 
            align-items: center; 
            color: #bbb; 
            padding: 15px; 
            text-decoration: none; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            transition: 0.3s; 
        }
        .sidebar a i { margin-right: 12px; width: 20px; text-align: center; }
        
        /* Mục đang chọn */
        .sidebar a.active { 
            background: rgba(0, 212, 255, 0.1); 
            color: var(--main); 
        }
        .sidebar a:hover:not(.logout-item) { background: rgba(255, 255, 255, 0.05); }

        /* Nút Đăng xuất nằm ngay dưới Hồ sơ */
        .logout-item { 
            margin-top: 10px; 
            color: #ff4d4d !important; 
            border: 1px solid rgba(255, 77, 77, 0.2); 
        }
        .logout-item:hover { 
            background: rgba(255, 77, 77, 0.15) !important; 
            border-color: #ff4d4d; 
        }

        /* Nội dung chính */
        .main-content { margin-left: 250px; flex: 1; padding: 40px; display: flex; justify-content: center; }
        .profile-card { background: #fff; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); height: fit-content; }
        
        .avatar-box { text-align: center; margin-bottom: 30px; }
        #user-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--main); margin-bottom: 10px; background: #eee; }
        .btn-upload { font-size: 13px; color: var(--main); cursor: pointer; font-weight: bold; display: inline-block; }

        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; transition: 0.3s; padding-right: 45px; }
        input:focus { border-color: var(--main); box-shadow: 0 0 5px rgba(0, 212, 255, 0.1); }

        .toggle-password { position: absolute; right: 15px; top: 40px; cursor: pointer; color: #999; transition: 0.3s; font-size: 18px; }
        .toggle-password:hover { color: var(--main); }

        .btn-save { width: 100%; background: var(--main); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        .btn-save:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3); }
        
        #status { text-align: center; margin-top: 15px; font-weight: bold; font-size: 14px; }
        .section-title { border-bottom: 2px solid #f8f9fa; padding-bottom: 10px; margin-bottom: 20px; color: #333; font-size: 18px; }

        /* Responsive cho điện thoại */
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; padding: 15px; }
            .main-content { margin-left: 0; padding: 20px; }
            body { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="forum.html"><i class="fas fa-comments"></i> Diễn đàn</a>
        <a href="profile.html" class="active"><i class="fas fa-user"></i> Hồ sơ</a>
        
        <a href="#" id="btn-logout" class="logout-item">
            <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </a>
    </div>

    <div class="main-content">
        <div class="profile-card">
            <h2 class="section-title">Hồ sơ cá nhân</h2>
            
            <div class="avatar-box">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=User">
                <br>
                <label class="btn-upload">Đổi ảnh đại diện <input type="file" id="f-input" hidden accept="image/*"></label>
            </div>

            <div class="form-group">
                <label>Tên hiển thị</label>
                <input type="text" id="display-name" placeholder="Nhập tên mới">
            </div>

            <h2 class="section-title" style="margin-top: 40px;">Bảo mật</h2>
            
            <div class="form-group">
                <label>Mật khẩu mới</label>
                <input type="password" id="new-password" placeholder="Để trống nếu không đổi">
                <i class="fas fa-eye toggle-password" onclick="togglePass('new-password', this)"></i>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu mới">
                <i class="fas fa-eye toggle-password" onclick="togglePass('confirm-password', this)"></i>
            </div>

            <button id="btn-update" class="btn-save">LƯU THAY ĐỔI</button>
            <p id="status"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updatePassword, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentAvatarB64 = "";

        // Hiện/Ẩn mật khẩu
        window.togglePass = (id, icon) => {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        };

        // Theo dõi trạng thái đăng nhập
        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('display-name').value = user.displayName || "";
                onValue(ref(db, 'users/' + user.uid), s => {
                    if (s.exists() && s.val().avatar) {
                        document.getElementById('user-avatar').src = s.val().avatar;
                        currentAvatarB64 = s.val().avatar;
                    }
                });
            } else { window.location.href = 'login.html'; }
        });

        // Xử lý nén ảnh Base64
        document.getElementById('f-input').onchange = e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const img = new Image();
                    img.src = reader.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 150; canvas.height = 150;
                        canvas.getContext('2d').drawImage(img, 0, 0, 150, 150);
                        currentAvatarB64 = canvas.toDataURL('image/jpeg', 0.6);
                        document.getElementById('user-avatar').src = currentAvatarB64;
                    };
                };
            }
        };

        // Xử lý Đăng xuất
        document.getElementById('btn-logout').onclick = (e) => {
            e.preventDefault();
            if(confirm("Bạn muốn đăng xuất khỏi Yeamiko?")) {
                signOut(auth).then(() => { window.location.href = 'login.html'; });
            }
        };

        // Cập nhật thông tin
        document.getElementById('btn-update').onclick = async () => {
            const user = auth.currentUser;
            const newName = document.getElementById('display-name').value;
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;
            const stt = document.getElementById('status');

            stt.style.color = "#00d4ff";
            stt.innerText = "⏳ Đang cập nhật hồ sơ...";

            try {
                // 1. Lưu DB
                await set(ref(db, 'users/' + user.uid), {
                    name: newName,
                    avatar: currentAvatarB64
                });

                // 2. Cập nhật Display Name
                await updateProfile(user, { displayName: newName });

                // 3. Đổi mật khẩu
                if (newPass) {
                    if (newPass.length < 6) throw new Error("Mật khẩu ít nhất 6 ký tự!");
                    if (newPass !== confirmPass) throw new Error("Xác nhận mật khẩu sai!");
                    await updatePassword(user, newPass);
                }

                stt.style.color = "#2ecc71";
                stt.innerText = "✅ Cập nhật thành công!";
                document.getElementById('new-password').value = "";
                document.getElementById('confirm-password').value = "";
            } catch (err) {
                stt.style.color = "#e74c3c";
                stt.innerText = "❌ Lỗi: " + err.message;
            }
        };
    </script>
</body>
</html>
