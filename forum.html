<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Diễn đàn cộng đồng | Yeamiko</title>
    <style>
        :root { --bg-color: #ffffff; --card-color: #f8fafd; --text-color: #333; --main-color: #00d4ff; --border-color: #e6ecf0; --sidebar-color: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; min-height: 100vh; }
        
        /* Sidebar Màu Đen */
        .sidebar { width: 260px; background-color: var(--sidebar-color); padding: 30px; display: flex; flex-direction: column; color: white; position: fixed; height: 100vh; }
        .logo { font-size: 2em; font-weight: bold; color: var(--main-color); margin-bottom: 40px; text-align: center; }
        .sidebar a { text-decoration: none; color: #bbb; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background-color: rgba(255,255,255,0.1); color: var(--main-color); }
        .sidebar a.active { background-color: rgba(0,212,255,0.1); }
        
        /* Main Content Màu Trắng */
        .main-content { margin-left: 260px; flex: 1; padding: 50px; }
        h1 { margin-bottom: 30px; }
        .card { background: var(--card-color); border: 1px solid var(--border-color); padding: 25px; border-radius: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.03); margin-bottom: 30px; }
        textarea { width: 100%; background: white; border: 1px solid var(--border-color); color: var(--text-color); padding: 15px; border-radius: 10px; resize: none; font-size: 1em; }
        .file-label { cursor: pointer; color: var(--main-color); background: white; padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-color); display: inline-flex; align-items: center; gap: 8px; font-weight: bold; }
        .file-label:hover { border-color: var(--main-color); }
        #img-preview { max-width: 150px; display: none; margin: 10px 0; border-radius: 5px; border: 1px solid var(--border-color); }
        .btn-auth { background: var(--main-color); color: white; padding: 12px 25px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        /* Bài viết */
        .post-card { background: white; border: 1px solid var(--border-color); padding: 20px; border-radius: 15px; margin-bottom: 20px; transition: 0.3s; }
        .post-card:hover { border-color: #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .post-user { font-weight: bold; color: #111; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .post-user img { width: 35px; height: 35px; border-radius: 50%; }
        .post-content { line-height: 1.6; color: #444; margin-bottom: 15px; font-size: 1em; }
        .post-img { max-width: 100%; border-radius: 8px; margin-bottom: 15px; display: block; border: 1px solid #eaeaea; }
        .like-btn { background: var(--card-color); border: 1px solid var(--border-color); color: #777; padding: 8px 18px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .like-btn:hover { background: #f0f0f0; border-color: #ccc; color: var(--main-color); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="/index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="/forum.html" class="active"><i class="fas fa-comments"></i> Diễn đàn</a>
        <a href="/profile.html"><i class="fas fa-user"></i> Hồ sơ</a>
    </div>

    <div class="main-content">
        <h1>DIỄN ĐÀN YEAMIKO</h1>
        <div class="card">
            <textarea id="post-text" rows="3" placeholder="Chia sẻ tin tức сервер..."></textarea>
            <img id="img-preview">
            <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center;">
                <label class="file-label"><i class="fas fa-image"></i> Thêm ảnh<input type="file" id="post-file" hidden accept="image/*"></label>
                <button id="btn-post" class="btn-auth">ĐĂNG BÀI</button>
            </div>
            <p id="status-msg" style="text-align:center; margin-top:10px; font-weight: 500;"></p>
        </div>
        <div id="forum-list">Đang tải bản tin server...</div>
    </div>
    </body>
</html>
