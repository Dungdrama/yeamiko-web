<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Diễn đàn Yeamiko</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .post-card { background: #222; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .post-user { font-weight: bold; color: #00d4ff; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-content { line-height: 1.6; color: #eee; margin-bottom: 15px; white-space: pre-wrap; }
        .post-img { max-width: 100%; border-radius: 8px; border: 1px solid #444; margin-bottom: 15px; display: block; }
        .like-btn { background: #333; border: none; color: #00d4ff; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .like-btn:hover { background: #444; }
        textarea { width: 100%; background: #111; border: 1px solid #444; color: white; padding: 15px; border-radius: 10px; resize: none; font-family: inherit; }
        .file-label { cursor: pointer; color: #aaa; background: #333; padding: 10px 15px; border-radius: 8px; display: inline-flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div class="navbar"><div id="user-display">Đang kết nối...</div></div>
    
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="/index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="/forum.html" class="active"><i class="fas fa-comments"></i> Diễn đàn</a>
        <a href="/profile.html"><i class="fas fa-user"></i> Hồ sơ</a>
        <div id="auth-section" style="padding:10px;"></div>
    </div>

    <div class="main-content">
        <h1 style="margin-bottom: 20px;">DIỄN ĐÀN CỘNG ĐỒNG</h1>
        
        <div class="card" style="margin-bottom: 30px;">
            <textarea id="post-text" rows="3" placeholder="Chia sẻ nội dung hoặc ảnh lên đây..."></textarea>
            <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center;">
                <label class="file-label">
                    <i class="fas fa-camera"></i> Thêm ảnh
                    <input type="file" id="post-file" hidden accept="image/*">
                </label>
                <button id="btn-post" class="btn-auth" style="width:130px;">ĐĂNG BÀI</button>
            </div>
            <p id="status-msg" style="text-align:center; margin-top:10px; font-size:0.9em;"></p>
        </div>

        <div id="forum-list">Đang tải bản tin...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.firebaseio.com",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Quản lý trạng thái đăng nhập và menu
        onAuthStateChanged(auth, (user) => {
            const display = document.getElementById('user-display');
            const authSection = document.getElementById('auth-section');
            if (user) {
                display.innerText = "Chào, " + (user.displayName || user.email.split('@')[0]);
                authSection.innerHTML = `<button id="logout-btn" class="btn-auth" style="background:#e74c3c; width:100%;">Đăng xuất</button>`;
                document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
            } else {
                display.innerText = "Khách";
                authSection.innerHTML = `<button onclick="window.location.href='/login.html'" class="btn-auth" style="width:100%;">Đăng nhập</button>`;
            }
        });

        // Hiển thị danh sách bài viết thời gian thực
        onValue(ref(db, 'posts'), (snapshot) => {
            const container = document.getElementById('forum-list');
            container.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const post = data[id];
                    container.innerHTML += `
                        <div class="post-card">
                            <div class="post-user">
                                <img src="https://ui-avatars.com/api/?name=${post.userName}&background=random" style="width:30px; border-radius:50%;">
                                ${post.userName}
                            </div>
                            <div class="post-content">${post.text}</div>
                            ${post.img ? `<img src="${post.img}" class="post-img">` : ""}
                            <button class="like-btn" onclick="window.handleLike('${id}')">
                                <i class="fas fa-heart"></i> ${post.likes || 0} Like
                            </button>
                        </div>`;
                });
            } else {
                container.innerHTML = "<p style='text-align:center; color:#666;'>Chưa có bài viết nào.</p>";
            }
        });

        // Xử lý nút Like
        window.handleLike = (id) => {
            if (!auth.currentUser) return alert("Bạn cần đăng nhập!");
            runTransaction(ref(db, `posts/${id}/likes`), (c) => (c || 0) + 1);
        };

        // Đăng bài mới - Sửa lỗi treo
        document.getElementById('btn-post').onclick = async () => {
            const user = auth.currentUser;
            if (!user) return alert("Vui lòng đăng nhập!");

            const text = document.getElementById('post-text').value;
            const file = document.getElementById('post-file').files[0];
            const status = document.getElementById('status-msg');

            if (!text.trim() && !file) return;

            status.innerText = "⏳ Đang xử lý...";
            let imgUrl = "";

            try {
                // Tải ảnh lên Imgur
                if (file) {
                    const formData = new FormData();
                    formData.append('image', file);
                    const res = await fetch('https://api.imgur.com/3/image', {
                        method: 'POST',
                        headers: { Authorization: 'Client-ID 546c25a59c58ad7' },
                        body: formData
                    });
                    const resData = await res.json();
                    if (resData.success) imgUrl = resData.data.link;
                }

                // Lưu vào Firebase Database
                await push(ref(db, 'posts'), {
                    userName: user.displayName || user.email.split('@')[0],
                    text: text || "",
                    img: imgUrl || "", // Tránh lỗi undefined
                    likes: 0,
                    timestamp: Date.now()
                });

                document.getElementById('post-text').value = "";
                document.getElementById('post-file').value = "";
                status.innerText = "✅ Đã đăng!";
                setTimeout(() => status.innerText = "", 2000);
            } catch (err) {
                status.innerText = "❌ Lỗi: Kiểm tra tab Rules trong Firebase!";
                console.error(err);
            }
        };
    </script>
</body>
</html>
