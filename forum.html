<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Diễn đàn Yeamiko | Community</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .post-card { background: #222; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .post-user { font-weight: bold; color: #00d4ff; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-user img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #00d4ff; }
        .post-content { line-height: 1.6; color: #eee; margin-bottom: 15px; white-space: pre-wrap; }
        .post-img { max-width: 100%; border-radius: 8px; margin-bottom: 15px; display: block; border: 1px solid #444; }
        .like-btn { background: #333; border: none; color: #00d4ff; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        textarea { width: 100%; background: #111; border: 1px solid #444; color: white; padding: 15px; border-radius: 10px; resize: none; font-family: inherit; }
        .file-label { cursor: pointer; color: #aaa; background: #333; padding: 10px 15px; border-radius: 8px; display: inline-flex; align-items: center; gap: 8px; }
        #img-preview { max-width: 180px; border-radius: 5px; margin: 10px 0; display: none; border: 1px solid #555; }
    </style>
</head>
<body>
    <div class="navbar"><div id="user-display">Đang tải...</div></div>
    
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="/index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="/forum.html" class="active"><i class="fas fa-comments"></i> Diễn đàn</a>
        <a href="/profile.html"><i class="fas fa-user"></i> Hồ sơ</a>
        <div id="auth-section" style="padding:10px;"></div>
    </div>

    <div class="main-content">
        <h1 style="color: #00d4ff; margin-bottom: 25px;">DIỄN ĐÀN CỘNG ĐỒNG</h1>
        
        <div class="card" style="margin-bottom: 30px; background: #1a1a1a; border: 1px solid #333;">
            <textarea id="post-text" rows="3" placeholder="Chia sẻ tin tức server..."></textarea>
            <img id="img-preview" src="">
            <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center;">
                <label class="file-label">
                    <i class="fas fa-image"></i> Đính kèm ảnh
                    <input type="file" id="post-file" hidden accept="image/*">
                </label>
                <button id="btn-post" class="btn-auth" style="width:140px;">ĐĂNG BÀI</button>
            </div>
            <p id="status-msg" style="text-align:center; margin-top:10px; font-size:0.9em;"></p>
        </div>

        <div id="forum-list">Đang tải bài viết...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            const display = document.getElementById('user-display');
            if (user) display.innerText = "Chào, " + (user.displayName || user.email.split('@')[0]);
            else display.innerText = "Khách";
        });

        document.getElementById('post-file').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('img-preview').src = URL.createObjectURL(file);
                document.getElementById('img-preview').style.display = "block";
            }
        };

        onValue(ref(db, 'posts'), (snap) => {
            const container = document.getElementById('forum-list');
            container.innerHTML = "";
            const data = snap.val();
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const post = data[id];
                    container.innerHTML += `
                        <div class="post-card">
                            <div class="post-user">
                                <img src="https://ui-avatars.com/api/?name=${post.userName}&background=random">
                                ${post.userName}
                            </div>
                            <div class="post-content">${post.text}</div>
                            ${post.img ? `<img src="${post.img}" class="post-img">` : ""}
                            <button class="like-btn" onclick="window.handleLike('${id}')"><i class="fas fa-heart"></i> ${post.likes || 0}</button>
                        </div>`;
                });
            }
        });

        window.handleLike = (id) => runTransaction(ref(db, `posts/${id}/likes`), (c) => (c || 0) + 1);

        // Chuyển ảnh sang Base64 để gửi API an toàn
        const toBase64 = file => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result.split(',')[1]);
            reader.onerror = error => rej(error);
        });

        document.getElementById('btn-post').onclick = async () => {
            const user = auth.currentUser;
            if (!user) return alert("Vui lòng đăng nhập!");
            const text = document.getElementById('post-text').value;
            const file = document.getElementById('post-file').files[0];
            const status = document.getElementById('status-msg');

            if (!text.trim() && !file) return;
            status.innerText = "⏳ Đang tải lên...";

            let imgUrl = "";
            try {
                if (file) {
                    const base64Data = await toBase64(file);
                    const formData = new FormData();
                    formData.append('key', '6d207e02198a847aa98d0a2a901485a5');
                    formData.append('action', 'upload');
                    formData.append('source', base64Data);
                    formData.append('format', 'json');

                    // Sử dụng Proxy để tránh lỗi "Failed to fetch" (CORS)
                    const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://freeimage.host/api/1/upload'), {
                        method: 'POST',
                        body: formData
                    });

                    // Nếu fetch trực tiếp vẫn lỗi, bản này dùng tham chiếu trực tiếp từ phản hồi JSON
                    const response = await fetch('https://freeimage.host/api/1/upload', {
                        method: 'POST',
                        body: formData
                    });

                    const resData = await response.json();
                    if (resData.status_code === 200) {
                        imgUrl = resData.image.url; // Lấy đúng trường url như mẫu JSON bạn gửi
                    }
                }

                await push(ref(db, 'posts'), {
                    userName: user.displayName || user.email.split('@')[0],
                    text: text || "",
                    img: imgUrl,
                    likes: 0,
                    timestamp: Date.now()
                });

                status.innerText = "✅ Thành công!";
                document.getElementById('post-text').value = "";
                document.getElementById('post-file').value = "";
                document.getElementById('img-preview').style.display = "none";
                setTimeout(() => status.innerText = "", 3000);
            } catch (err) {
                status.innerText = "❌ Lỗi kết nối máy chủ ảnh";
                console.error(err);
            }
        };
    </script>
</body>
</html>
