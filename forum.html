<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diễn đàn Yeamiko</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #00d4ff; --bg: #f4f7f6; --text: #333; --sidebar: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; }

        /* Sidebar Đen Chuyên Nghiệp */
        .sidebar { width: 250px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; }
        .sidebar .logo { font-size: 24px; font-weight: bold; color: var(--main); margin-bottom: 40px; text-align: center; letter-spacing: 2px; }
        .sidebar a { display: block; color: #bbb; padding: 12px 15px; text-decoration: none; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(0, 212, 255, 0.1); color: var(--main); }
        .sidebar i { margin-right: 10px; width: 20px; }

        /* Vùng Nội Dung Chính */
        .main-content { margin-left: 250px; flex: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 700px; }

        /* Khu Vực Đăng Bài */
        .post-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        textarea { width: 100%; height: 100px; border: 1px solid #eee; border-radius: 10px; padding: 15px; resize: none; outline: none; font-size: 15px; }
        .post-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .btn-post { background: var(--main); color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-post:hover { opacity: 0.8; transform: translateY(-2px); }
        .upload-label { color: #666; cursor: pointer; font-size: 14px; }

        /* Danh Sách Bài Viết */
        .post-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .post-header { display: flex; align-items: center; margin-bottom: 15px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 12px; border: 2px solid #eee; }
        .user-info b { font-size: 16px; color: #222; }
        .post-content { font-size: 16px; line-height: 1.6; margin-bottom: 15px; color: #444; }
        .post-img { width: 100%; border-radius: 10px; margin-bottom: 15px; display: block; }
        .post-footer { border-top: 1px solid #eee; padding-top: 10px; display: flex; gap: 20px; }
        .like-btn { background: none; border: none; color: #666; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .like-btn:hover { color: #e74c3c; }

        #status-msg { font-size: 13px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="forum.html" class="active"><i class="fas fa-comments"></i> Diễn đàn</a>
        <a href="profile.html"><i class="fas fa-user"></i> Hồ sơ</a>
    </div>

    <div class="main-content">
        <div class="container">
            <h2 style="margin-bottom: 20px;">Cộng đồng Yeamiko</h2>
            
            <div class="post-box">
                <textarea id="post-text" placeholder="Dũng đang nghĩ gì thế?"></textarea>
                <div class="post-controls">
                    <label class="upload-label">
                        <i class="fas fa-image"></i> Thêm ảnh
                        <input type="file" id="post-file" hidden accept="image/*">
                    </label>
                    <div>
                        <span id="status-msg"></span>
                        <button id="btn-post" class="btn-post">Đăng bài</button>
                    </div>
                </div>
            </div>

            <div id="forum-list">
                <p style="text-align: center; color: #999;">Đang tải bài viết...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, runTransaction, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // 1. Tải bài viết và hiển thị kèm ảnh đại diện từ Profile
        onValue(ref(db, 'posts'), async (snap) => {
            const container = document.getElementById('forum-list');
            const data = snap.val();
            
            // Lấy toàn bộ danh sách users để tra cứu ảnh đại diện
            const userSnap = await get(ref(db, 'users'));
            const allUsers = userSnap.val() || {};

            container.innerHTML = "";
            if (!data) {
                container.innerHTML = "<p style='text-align:center;color:#999;'>Chưa có bài viết nào.</p>";
                return;
            }

            Object.keys(data).reverse().forEach(id => {
                const post = data[id];
                const uid = post.uid;
                
                // Lấy ảnh từ database users, nếu không có thì dùng ảnh mặc định
                const avatar = (allUsers[uid] && allUsers[uid].avatar) 
                                ? allUsers[uid].avatar 
                                : `https://ui-avatars.com/api/?name=${post.userName}&background=random`;

                container.innerHTML += `
                    <div class="post-card">
                        <div class="post-header">
                            <img src="${avatar}" class="user-avatar">
                            <div class="user-info">
                                <b>${post.userName}</b>
                            </div>
                        </div>
                        <div class="post-content">${post.text}</div>
                        ${post.img ? `<img src="${post.img}" class="post-img">` : ""}
                        <div class="post-footer">
                            <button class="like-btn" onclick="window.handleLike('${id}')">
                                <i class="fas fa-heart"></i> ${post.likes || 0}
                            </button>
                        </div>
                    </div>`;
            });
        });

        // 2. Xử lý Like
        window.handleLike = (id) => {
            runTransaction(ref(db, `posts/${id}/likes`), (current) => (current || 0) + 1);
        };

        // 3. Xử lý nén ảnh bài viết (để diễn đàn load nhanh)
        const compressImg = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_W = 700;
                    const scale = MAX_W / img.width;
                    canvas.width = MAX_W;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });

        // 4. Đăng bài mới
        document.getElementById('btn-post').onclick = async () => {
            const user = auth.currentUser;
            if (!user) return alert("Bạn cần đăng nhập!");

            const text = document.getElementById('post-text').value;
            const file = document.getElementById('post-file').files[0];
            const status = document.getElementById('status-msg');

            if (!text.trim() && !file) return;

            status.style.color = "orange";
            status.innerText = "⏳ Đang đăng...";

            try {
                let finalImg = "";
                if (file) finalImg = await compressImg(file);

                await push(ref(db, 'posts'), {
                    uid: user.uid, // Quan trọng: lưu UID để tra cứu ảnh đại diện
                    userName: user.displayName || user.email.split('@')[0],
                    text: text,
                    img: finalImg,
                    likes: 0,
                    time: Date.now()
                });

                status.style.color = "green";
                status.innerText = "✅ Thành công!";
                document.getElementById('post-text').value = "";
                document.getElementById('post-file').value = "";
                setTimeout(() => status.innerText = "", 2000);
            } catch (e) {
                status.innerText = "❌ Lỗi: " + e.message;
            }
        };
    </script>
</body>
</html>
