<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Diễn đàn cộng đồng | Yeamiko</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .post-card { background: #222; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .post-user { font-weight: bold; color: #00d4ff; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-user img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid #00d4ff; }
        .post-content { line-height: 1.6; color: #eee; margin-bottom: 15px; white-space: pre-wrap; font-size: 1.05em; }
        .post-img { max-width: 100%; border-radius: 8px; border: 1px solid #444; margin-bottom: 15px; display: block; cursor: pointer; }
        .like-btn { background: #333; border: none; color: #00d4ff; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .like-btn:hover { background: #444; transform: scale(1.05); }
        textarea { width: 100%; background: #111; border: 1px solid #444; color: white; padding: 15px; border-radius: 10px; resize: none; font-family: inherit; font-size: 1em; }
        .file-label { cursor: pointer; color: #aaa; background: #333; padding: 10px 15px; border-radius: 8px; display: inline-flex; align-items: center; gap: 8px; border: 1px solid transparent; }
        .file-label:hover { border-color: #00d4ff; color: #fff; }
        #preview-container img { max-width: 150px; border-radius: 5px; margin-top: 10px; display: none; border: 1px solid #555; }
    </style>
</head>
<body>
    <div class="navbar"><div id="user-display">Đang kết nối hệ thống...</div></div>
    
    <div class="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="/index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="/forum.html" class="active"><i class="fas fa-comments"></i> Diễn đàn</a>
        <a href="/profile.html"><i class="fas fa-user"></i> Hồ sơ</a>
        <div id="auth-section" style="padding:10px;"></div>
    </div>

    <div class="main-content">
        <h1 style="margin-bottom: 25px; color: #00d4ff;">DIỄN ĐÀN CỘNG ĐỒNG</h1>
        
        <div class="card" style="margin-bottom: 30px; background: #1a1a1a; border: 1px solid #333;">
            <textarea id="post-text" rows="3" placeholder="Hôm nay bạn có gì mới để chia sẻ không?"></textarea>
            <div id="preview-container"><img id="img-preview" src=""></div>
            
            <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center;">
                <label class="file-label">
                    <i class="fas fa-image"></i> Chọn ảnh
                    <input type="file" id="post-file" hidden accept="image/*">
                </label>
                <button id="btn-post" class="btn-auth" style="width:140px; font-weight: bold;">ĐĂNG BÀI</button>
            </div>
            <p id="status-msg" style="text-align:center; margin-top:12px; font-size:0.95em; font-weight: 500;"></p>
        </div>

        <div id="forum-list">Đang tải các bài viết mới nhất...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // Cấu hình chuẩn cho dự án Yeamiko
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Hiển thị trạng thái người dùng
        onAuthStateChanged(auth, (user) => {
            const display = document.getElementById('user-display');
            const authSection = document.getElementById('auth-section');
            if (user) {
                display.innerText = "Chào mừng, " + (user.displayName || user.email.split('@')[0]);
                authSection.innerHTML = `<button id="logout-btn" class="btn-auth" style="background:#ff4757; width:100%;">Đăng xuất</button>`;
                document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
            } else {
                display.innerText = "Chế độ Khách";
                authSection.innerHTML = `<button onclick="window.location.href='/login.html'" class="btn-auth" style="width:100%;">Đăng nhập ngay</button>`;
            }
        });

        // Xem trước ảnh khi chọn file
        document.getElementById('post-file').onchange = (e) => {
            const preview = document.getElementById('img-preview');
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        };

        // Tải danh sách bài viết thời gian thực
        onValue(ref(db, 'posts'), (snapshot) => {
            const container = document.getElementById('forum-list');
            container.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const post = data[id];
                    container.innerHTML += `
                        <div class="post-card">
                            <div class="post-user">
                                <img src="https://ui-avatars.com/api/?name=${post.userName}&background=random">
                                ${post.userName}
                            </div>
                            <div class="post-content">${post.text}</div>
                            ${post.img ? `<img src="${post.img}" class="post-img" onclick="window.open('${post.img}', '_blank')">` : ""}
                            <button class="like-btn" onclick="window.handleLike('${id}')">
                                <i class="fas fa-heart"></i> ${post.likes || 0} lượt thích
                            </button>
                        </div>`;
                });
            } else {
                container.innerHTML = "<p style='text-align:center; color:#888;'>Chưa có bài viết nào trên diễn đàn.</p>";
            }
        });

        // Xử lý nút Like
        window.handleLike = (id) => {
            if (!auth.currentUser) return alert("Bạn phải đăng nhập để thích bài viết!");
            runTransaction(ref(db, `posts/${id}/likes`), (count) => (count || 0) + 1);
        };

        // Xử lý đăng bài (Sửa lỗi tải ảnh và lỗi treo)
        document.getElementById('btn-post').onclick = async () => {
            const user = auth.currentUser;
            if (!user) return alert("Vui lòng đăng nhập để đăng bài!");

            const text = document.getElementById('post-text').value;
            const file = document.getElementById('post-file').files[0];
            const status = document.getElementById('status-msg');

            if (!text.trim() && !file) return;

            status.style.color = "#00d4ff";
            status.innerText = "⏳ Đang tải lên hệ thống...";
            let imgUrl = "";

            try {
                // 1. Tải ảnh lên Imgur
                if (file) {
                    status.innerText = "⏳ Đang xử lý hình ảnh...";
                    const formData = new FormData();
                    formData.append('image', file);
                    const res = await fetch('https://api.imgur.com/3/image', {
                        method: 'POST',
                        headers: { Authorization: 'Client-ID 546c25a59c58ad7' },
                        body: formData
                    });
                    const resData = await res.json();
                    if (resData.success) imgUrl = resData.data.link;
                    else throw new Error("Lỗi máy chủ ảnh Imgur.");
                }

                // 2. Lưu vào Firebase Realtime Database
                await push(ref(db, 'posts'), {
                    userName: user.displayName || user.email.split('@')[0],
                    text: text || "",
                    img: imgUrl || "", // Chống lỗi undefined
                    likes: 0,
                    timestamp: Date.now()
                });

                // Reset form
                document.getElementById('post-text').value = "";
                document.getElementById('post-file').value = "";
                document.getElementById('img-preview').style.display = "none";
                status.style.color = "#2ecc71";
                status.innerText = "✅ Bài viết đã được đăng!";
                setTimeout(() => status.innerText = "", 3000);
            } catch (err) {
                status.style.color = "#ff4757";
                status.innerText = "❌ Lỗi: " + err.message;
            }
        };
    </script>
</body>
</html>
