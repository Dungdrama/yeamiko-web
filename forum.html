<style>
    /* Thêm style cho nút Xem thêm */
    .load-more-container { width: 100%; display: flex; justify-content: center; margin: 20px 0; }
    .btn-load-more { 
        background: white; border: 2px solid var(--main); color: var(--main);
        padding: 10px 30px; border-radius: 25px; cursor: pointer; font-weight: bold;
        transition: 0.3s;
    }
    .btn-load-more:hover { background: var(--main); color: white; }
    .btn-load-more:disabled { border-color: #ccc; color: #ccc; cursor: not-allowed; }
</style>

<body>
    <div class="sidebar">...</div>

    <div class="main-content">
        <div class="container" id="forum-list"></div>
        <div class="load-more-container">
            <button id="btn-load-more" class="btn-load-more">XEM THÊM BÀI VIẾT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getDatabase, ref, push, get, query, limitToLast, orderByChild, endBefore } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // Firebase Config của Dũng
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let lastPostTime = null; // Biến lưu mốc thời gian của bài cuối cùng để tải tiếp
        const pageSize = 5;      // Số lượng bài viết mỗi lần tải

        // Hàm hiển thị bài viết lên giao diện
        const renderPost = (id, post, allUsers) => {
            const avatar = (post.uid && allUsers[post.uid]?.avatar) || `https://ui-avatars.com/api/?name=${post.userName}`;
            return `
                <div class="post-card">
                    <div class="post-header">
                        <img src="${avatar}" class="user-avatar" onerror="this.src='https://ui-avatars.com/api/?name=User'">
                        <b>${post.userName}</b>
                    </div>
                    <div style="margin-bottom:10px; word-wrap: break-word;">${post.text}</div>
                    ${post.img ? `<img src="${post.img}" class="post-img" loading="lazy">` : ""}
                    <div style="margin-top:10px; color:#666; font-size:13px;">❤️ ${post.likes || 0} lượt thích</div>
                </div>`;
        };

        // Hàm tải bài viết
        const loadPosts = async () => {
            const btn = document.getElementById('btn-load-more');
            const list = document.getElementById('forum-list');
            btn.disabled = true;
            btn.innerText = "Đang tải...";

            try {
                let postsQuery;
                if (!lastPostTime) {
                    // Lần đầu tiên: Lấy 5 bài mới nhất
                    postsQuery = query(ref(db, 'posts'), orderByChild('time'), limitToLast(pageSize));
                } else {
                    // Các lần sau: Lấy 5 bài tiếp theo trước bài cuối cùng đã tải
                    postsQuery = query(ref(db, 'posts'), orderByChild('time'), endBefore(lastPostTime), limitToLast(pageSize));
                }

                const snap = await get(postsQuery);
                const userSnap = await get(ref(db, 'users'));
                const allUsers = userSnap.val() || {};
                const data = snap.val();

                if (!data) {
                    btn.innerText = "HẾT BÀI VIẾT";
                    btn.disabled = true;
                    return;
                }

                const keys = Object.keys(data).sort((a, b) => data[b].time - data[a].time);
                
                keys.forEach(id => {
                    list.innerHTML += renderPost(id, data[id], allUsers);
                });

                // Lưu lại thời gian của bài cũ nhất trong lượt tải này
                lastPostTime = data[keys[keys.length - 1]].time;

                btn.disabled = false;
                btn.innerText = "XEM THÊM BÀI VIẾT";
                
                // Nếu tải về ít hơn pageSize tức là đã hết bài
                if (keys.length < pageSize) {
                    btn.innerText = "HẾT BÀI VIẾT";
                    btn.disabled = true;
                }

            } catch (err) {
                console.error(err);
                btn.innerText = "LỖI TẢI BÀI";
                btn.disabled = false;
            }
        };

        // Khởi tạo lần đầu
        loadPosts();

        // Gán sự kiện cho nút xem thêm
        document.getElementById('btn-load-more').onclick = loadPosts;

        // Giữ nguyên logic Đăng bài và nén ảnh từ bản trước...
    </script>
</body>
