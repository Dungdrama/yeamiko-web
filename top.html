<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Xếp Hạng - Yeamiko</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); color: white; min-height: 100vh; }

        /* --- SIDEBAR --- */
        .menu-toggle { position: fixed; top: 20px; left: 20px; z-index: 1500; background: var(--main); color: #000; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; }
        .sidebar { width: 260px; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); height: 100vh; position: fixed; padding: 30px 20px; z-index: 2000; left: -260px; transition: 0.4s; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.1); }
        .sidebar.open { left: 0; }
        .sidebar .logo { font-size: 24px; font-weight: 900; color: var(--main); margin-bottom: 40px; text-align: center; }
        .sidebar a { display: flex; align-items: center; color: #94a3b8; padding: 14px 18px; text-decoration: none; border-radius: 12px; margin-bottom: 8px; }
        .sidebar a:hover, .sidebar a.active { background: var(--main); color: #000; font-weight: bold; }

        /* --- NỘI DUNG --- */
        .main-content { width: 100%; max-width: 800px; margin: 0 auto; padding: 80px 20px; }
        .top-header { text-align: center; margin-bottom: 40px; }
        .top-header h1 { font-size: 2.5rem; color: var(--main); text-transform: uppercase; letter-spacing: 2px; }
        .top-header p { color: #94a3b8; margin-top: 10px; }

        .leaderboard-card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; overflow: hidden; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.02); padding: 20px; text-align: left; color: var(--main); font-size: 14px; text-transform: uppercase; }
        td { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .rank { font-weight: 900; font-size: 18px; width: 50px; }
        .rank-1 { color: #fbbf24; } /* Vàng */
        .rank-2 { color: #cbd5e1; } /* Bạc */
        .rank-3 { color: #b45309; } /* Đồng */

        .player-info { display: flex; align-items: center; gap: 15px; }
        .player-head { width: 35px; height: 35px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); }
        .player-name { font-weight: 600; }

        .player-points { text-align: right; font-weight: 800; color: #fbbf24; }
        .player-points i { font-size: 12px; margin-left: 5px; }

        #loading { text-align: center; padding: 40px; color: var(--main); font-weight: bold; }

        @media (max-width: 600px) {
            th:nth-child(2), td:nth-child(2) { display: none; } /* Ẩn bớt cột trên mobile cho gọn */
            .top-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="sidebar" id="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="shop.html"><i class="fas fa-shopping-cart"></i><span>Cửa hàng</span></a>
        <a href="top.html" class="active"><i class="fas fa-trophy"></i><span>Xếp hạng</span></a>
        <a href="profile.html"><i class="fas fa-user"></i><span>Hồ sơ</span></a>
    </div>

    <div class="main-content">
        <div class="top-header">
            <h1><i class="fas fa-crown"></i> Đại Gia Yeamiko</h1>
            <p>Top 10 người chơi có số dư Xu cao nhất hệ thống</p>
        </div>

        <div class="leaderboard-card">
            <div id="loading"><i class="fas fa-spinner fa-spin"></i> Đang tính toán bảng xếp hạng...</div>
            <table id="leaderboard-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Hạng</th>
                        <th>Người chơi</th>
                        <th style="text-align: right;">Số dư Xu</th>
                    </tr>
                </thead>
                <tbody id="top-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        async function loadTop10() {
            try {
                const snapshot = await db.ref('web_users').once('value');
                const usersData = snapshot.val();
                
                if (!usersData) return;

                // Chuyển Object thành Array để sắp xếp
                let userArray = [];
                for (let key in usersData) {
                    if (usersData[key].linked_mc) { // Chỉ tính những người đã liên kết game
                        userArray.push({
                            name: usersData[key].linked_mc,
                            points: usersData[key].points || 0
                        });
                    }
                }

                // Sắp xếp giảm dần theo Points
                userArray.sort((a, b) => b.points - a.points);

                // Lấy 10 người đầu tiên
                const top10 = userArray.slice(0, 10);
                const listBody = document.getElementById('top-list');
                listBody.innerHTML = '';

                top10.forEach((user, index) => {
                    const rank = index + 1;
                    const rankClass = rank <= 3 ? `rank-${rank}` : '';
                    
                    const row = `
                        <tr>
                            <td class="rank ${rankClass}">#${rank}</td>
                            <td>
                                <div class="player-info">
                                    <img src="https://mc-heads.net/avatar/${user.name}" class="player-head">
                                    <span class="player-name">${user.name}</span>
                                </div>
                            </td>
                            <td class="player-points">${user.points.toLocaleString()} <i class="fas fa-coins text-warning"></i></td>
                        </tr>
                    `;
                    listBody.innerHTML += row;
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('leaderboard-table').style.display = 'table';

            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerText = "Không thể tải bảng xếp hạng.";
            }
        }

        loadTop10();
    </script>
</body>
</html>
