<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tài khoản | Yeamiko</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="display:flex; justify-content:center; align-items:center; height:100vh;">
        <div class="card" style="width:350px;">
            <h2 style="text-align:center;">HỆ THỐNG YEAMIKO</h2>
            <input type="email" id="email" placeholder="Email của bạn">
            <input type="password" id="password" placeholder="Mật khẩu (>6 ký tự)">
            <button id="btn-signup" class="btn-auth" style="background:#2ecc71;">Đăng ký</button>
            <button id="btn-login" class="btn-auth">Đăng nhập</button>
            <p id="msg" style="color:red; margin-top:10px; text-align:center;"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            projectId: "yeamiko-web",
            storageBucket: "yeamiko-web.firebasestorage.app",
            messagingSenderId: "380442978172",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();

        document.getElementById('btn-signup').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            createUserWithEmailAndPassword(auth, email, pass)
                .then(() => window.location.href = '/')
                .catch(err => document.getElementById('msg').innerText = "Lỗi: " + err.message);
        };

        document.getElementById('btn-login').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => window.location.href = '/')
                .catch(err => document.getElementById('msg').innerText = "Sai tài khoản!");
        };
    </script>
</body>
</html>
