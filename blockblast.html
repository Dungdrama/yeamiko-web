<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko | Block Blast</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0b0f19; --card: #1e293b; --wood: #795548; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* Navbar đồng bộ */
        .navbar { width: 100%; height: 60px; background: rgba(15, 23, 42, 0.9); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--main); }
        
        .game-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        /* Lưới 8x8 */
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 40px);
            grid-template-rows: repeat(8, 40px);
            gap: 4px;
            background: #0f172a;
            padding: 10px;
            border-radius: 12px;
            border: 4px solid #334155;
        }
        .cell { width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 4px; transition: 0.2s; }
        .cell.filled { background: var(--wood); border: 2px solid #5d4037; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        /* Khu vực chứa các khối kéo đi */
        .pieces-container { display: flex; gap: 20px; margin-top: 30px; min-height: 120px; }
        .piece { display: grid; gap: 2px; cursor: grab; transition: transform 0.2s; }
        .piece:active { cursor: grabbing; transform: scale(1.1); }
        .p-cell { width: 25px; height: 25px; background: var(--main); border-radius: 3px; border: 1px solid rgba(0,0,0,0.2); }

        .score-board { font-size: 24px; font-weight: 800; color: var(--main); }
        .stats { color: #94a3b8; font-size: 14px; }

        .game-over-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div onclick="location.href='minigame-hub.html'" style="cursor:pointer"><i class="fas fa-arrow-left"></i> THOÁT</div>
        <div id="score" class="score-board">Điểm: 0</div>
        <div id="user-xu" style="color: #ffd700; font-weight: bold;">0 Xu</div>
    </nav>

    <div class="game-container">
        <div class="stats">Mục tiêu: 500 điểm = +3 Xu</div>
        <div class="grid" id="grid"></div>
        <div class="pieces-container" id="pieces-container"></div>
    </div>

    <div id="game-over" class="game-over-overlay">
        <h1 style="color: #ff4757; font-size: 40px; margin-bottom: 20px;">GAME OVER!</h1>
        <p id="final-result" style="margin-bottom: 30px; font-size: 18px;"></p>
        <button onclick="location.reload()" style="padding: 15px 40px; background: var(--main); border: none; border-radius: 10px; font-weight: 800; cursor: pointer;">CHƠI LẠI</button>
    </div>

<script>
    // Cấu hình Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let userUID = null, currentPoints = 0, totalScore = 0;

    const gridElement = document.getElementById('grid');
    const piecesContainer = document.getElementById('pieces-container');
    let board = Array(8).fill().map(() => Array(8).fill(0));

    // Khởi tạo Firebase Auth
    firebase.auth().onAuthStateChanged(user => {
        if(user) { 
            userUID = user.uid;
            db.ref('web_users/'+userUID+'/points').on('value', s => {
                document.getElementById('user-xu').innerText = (s.val() || 0) + " Xu";
            });
        } else { location.href = 'login.html'; }
    });

    // Tạo lưới hiển thị
    function createGrid() {
        gridElement.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell' + (board[r][c] ? ' filled' : '');
                cell.dataset.r = r; cell.dataset.c = c;
                gridElement.appendChild(cell);
            }
        }
    }

    // Các hình khối (Shapes)
    const shapes = [
        [[1,1], [1,1]], // Khối vuông 2x2
        [[1,1,1,1]],    // Thanh ngang 4
        [[1],[1],[1],[1]], // Thanh dọc 4
        [[1,1,1]],      // Thanh ngang 3
        [[1,0], [1,0], [1,1]], // Chữ L
        [[1]]           // Khối đơn
    ];

    function spawnPieces() {
        piecesContainer.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const shape = shapes[Math.floor(Math.random() * shapes.length)];
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.style.gridTemplateColumns = `repeat(${shape[0].length}, 25px)`;
            piece.draggable = true;
            
            shape.forEach((row, r) => {
                row.forEach((v, c) => {
                    const pc = document.createElement('div');
                    pc.className = v ? 'p-cell' : '';
                    piece.appendChild(pc);
                });
            });

            piece.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('shape', JSON.stringify(shape));
                piece.classList.add('dragging');
            });
            piecesContainer.appendChild(piece);
        }
    }

    // Xử lý kéo thả
    gridElement.addEventListener('dragover', e => e.preventDefault());
    gridElement.addEventListener('drop', e => {
        const shape = JSON.parse(e.dataTransfer.getData('shape'));
        const rect = gridElement.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const col = Math.floor(x / 44);
        const row = Math.floor(y / 44);

        if (canPlace(shape, row, col)) {
            placeShape(shape, row, col);
            checkLines();
            document.querySelector('.dragging').remove();
            if (piecesContainer.children.length === 0) spawnPieces();
            createGrid();
            checkGameOver();
        }
    });

    function canPlace(shape, row, col) {
        for (let r = 0; r < shape.length; r++) {
            for (let c = 0; c < shape[r].length; c++) {
                if (shape[r][c]) {
                    if (row + r >= 8 || col + c >= 8 || board[row + r][col + c]) return false;
                }
            }
        }
        return true;
    }

    function placeShape(shape, row, col) {
        for (let r = 0; r < shape.length; r++) {
            for (let c = 0; c < shape[r].length; c++) {
                if (shape[r][c]) board[row + r][col + c] = 1;
            }
        }
        totalScore += 20;
        updateScore();
    }

    function checkLines() {
        let linesCleared = 0;
        // Check hàng
        for (let r = 0; r < 8; r++) {
            if (board[r].every(v => v === 1)) {
                board[r] = Array(8).fill(0);
                linesCleared++;
            }
        }
        // Check cột
        for (let c = 0; c < 8; c++) {
            if (board.every(r => r[c] === 1)) {
                for (let r = 0; r < 8; r++) board[r][c] = 0;
                linesCleared++;
            }
        }
        if (linesCleared > 0) {
            totalScore += linesCleared * 100;
            updateScore();
        }
    }

    function updateScore() {
        document.getElementById('score').innerText = `Điểm: ${totalScore}`;
        if (totalScore >= 500 && !window.rewarded) {
            window.rewarded = true;
            giveReward();
        }
    }

    async function giveReward() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        await db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + 3);
        alert("CHÚC MỪNG! Bạn đạt 500 điểm và nhận được 3 Xu.");
    }

    function checkGameOver() {
        // Logíc đơn giản: nếu không còn chỗ trống nào thì game over (Dũng có thể nâng cấp thêm check từng khối)
        const isFull = board.every(row => row.every(cell => cell === 1));
        if (isFull) {
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-result').innerText = `Bạn ghi được ${totalScore} điểm!`;
        }
    }

    createGrid();
    spawnPieces();
</script>
</body>
</html>
