<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko | Block Blast Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0b0f19; --card: #1e293b; --text: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; user-select: none; -webkit-user-drag: none; }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }

        /* Navbar đồng bộ */
        .navbar { width: 100%; height: 65px; background: rgba(15, 23, 42, 0.95); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .score-box { font-size: 26px; font-weight: 900; color: var(--main); text-shadow: 0 0 10px rgba(0,212,255,0.5); }
        
        .game-area { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 400px; padding: 10px; }
        
        /* Lưới 8x8 có viền đẹp */
        .grid {
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px;
            background: #0f172a; padding: 12px; border-radius: 15px;
            border: 3px solid #334155; width: 100%; aspect-ratio: 1/1;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .cell { background: rgba(255,255,255,0.03); border-radius: 4px; transition: background 0.1s, transform 0.2s; }
        .cell.highlight { background: rgba(0, 212, 255, 0.2) !important; } /* Màu khi khối bay qua */
        
        /* CSS cho các ô nổ co nhỏ clearEffect */
        .cell.clearing { animation: clearCell 0.4s ease-out; }
        @keyframes clearCell { 0% { transform: scale(1); } 50% { transform: scale(0); } 100% { transform: scale(1); background: rgba(255,255,255,0.03); } }

        /* CSS cho ô được đặt placeEffect */
        .cell.placed { animation: placeCell 0.3s ease-out; }
        @keyframes placeCell { 0% { transform: scale(1.3); } 100% { transform: scale(1); } }

        /* Container chứa 3 khối */
        .pieces-container { display: flex; justify-content: space-around; gap: 15px; width: 100%; min-height: 120px; margin-top: 30px; }
        
        /* Thẻ bao ngoài khối để nhận diện kéo */
        .piece-box { display: flex; align-items: center; justify-content: center; touch-action: none; cursor: grab; transition: transform 0.2s; }
        .piece-box.dragging { opacity: 0.7; transform: scale(1.1) !important; cursor: grabbing; z-index: 100; }

        .piece-grid { display: grid; gap: 2px; pointer-events: none; } /* Vô hiệu hóa event trên ô nhỏ */
        .p-cell { width: 20px; height: 20px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2); box-shadow: inset 0 0 5px rgba(0,0,0,0.3); }

        .game-over-screen {
            position: fixed; inset: 0; background: rgba(11, 15, 25, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div onclick="location.href='minigame-hub.html'" style="cursor:pointer; color: var(--text);"><i class="fas fa-chevron-left"></i> Hub</div>
        <div id="score" class="score-box">0</div>
        <div id="user-xu" style="color: #ffd700; font-weight: bold; font-size: 14px;"><i class="fas fa-coins"></i> ... Xu</div>
    </nav>

    <div class="game-area">
        <p style="font-size: 12px; color: var(--text);">Kéo thả khối gỗ vào lưới để ghi điểm và tích Xu!</p>
        <div class="grid" id="grid"></div>
        <div class="pieces-container" id="pieces-container"></div>
    </div>

    <div id="game-over" class="game-over-screen">
        <h1 style="color: #ff4757; font-size: 40px; margin-bottom: 20px;">HẾT CHỖ ĐẶT!</h1>
        <p id="final-result" style="margin-bottom: 30px; font-size: 18px; color: var(--text);"></p>
        <button onclick="location.reload()" style="padding: 15px 40px; background: var(--main); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase;">Chơi lại</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
        authDomain: "yeamiko-web.firebaseapp.com",
        databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yeamiko-web",
        appId: "1:380442978172:web:52eeb187628ed3518266f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let userUID = null, totalScore = 0;
    let board = Array(8).fill().map(() => Array(8).fill(null)); // null = trống, string = màu
    const cellSize = 44; // 40px + 4px gap

    // Bảng màu Minecraft Pro colorPalette
    const colorPalette = [
        '#00d4ff', // Diamond
        '#ffd700', // Gold
        '#00ff88', // Emerald
        '#ff4757', // Redstone
        '#a55eea', // Amethyst
        '#ff9f43', // Copper
        '#795548'  // Wood
    ];

    // Âm thanh Minecraft sounds
    const sounds = {
        place: new Audio('https://cdn.jsdelivr.net/gh/yeamiko/assets/place.mp3'),
        clear: new Audio('https://cdn.jsdelivr.net/gh/yeamiko/assets/clear.mp3')
    };
    function playSound(name) { sounds[name].currentTime = 0; sounds[name].play(); }

    firebase.auth().onAuthStateChanged(user => {
        if(user) { userUID = user.uid;
            db.ref('web_users/'+userUID+'/points').on('value', s => document.getElementById('user-xu').innerText = (s.val() || 0) + " Xu");
        } else { location.href = 'login.html'; }
    });

    function createGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if(board[r][c]) { cell.style.background = board[r][c]; cell.style.borderColor = '#000'; cell.style.borderStyle = 'solid'; cell.style.borderWidth='1px'; }
                cell.id = `cell-${r}-${c}`;
                grid.appendChild(cell);
            }
        }
    }

    const shapes = [
        [[1,1], [1,1]], // Khối vuông 2x2 square
        [[1,1,1,1]],    // Thanh ngang 4 h-line
        [[1],[1],[1],[1]], // Thanh dọc 4 v-line
        [[1,1,1]],      // Thanh ngang 3 h-3
        [[1],[1],[1]],  // Thanh dọc 3 v-3
        [[1,1,0], [0,1,1]], // Khối Z z-shape
        [[1]]           // Khối đơn single
    ];

    function spawnPieces() {
        const container = document.getElementById('pieces-container');
        container.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const shapeData = shapes[Math.floor(Math.random() * shapes.length)];
            const color = colorPalette[Math.floor(Math.random() * colorPalette.length)]; // Lấy màu ngẫu nhiên spawnPieces

            const box = document.createElement('div');
            box.className = 'piece-box';
            box.dataset.index = i;
            box.dataset.shape = JSON.stringify(shapeData);
            box.dataset.color = color;
            
            const pgrid = document.createElement('div');
            pgrid.className = 'piece-grid';
            pgrid.style.gridTemplateColumns = `repeat(${shapeData[0].length}, 20px)`;
            
            shapeData.forEach(row => {
                row.forEach(v => {
                    const c = document.createElement('div');
                    if(v) { c.className = 'p-cell'; c.style.background = color; }
                    pgrid.appendChild(c);
                });
            });
            box.appendChild(pgrid);
            container.appendChild(box);
            
            // Khởi tạo kéo thả cho khối này dragInit
            initDrag(box);
        }
    }

    // LOGIC KÉO THẢ VỚI INTERACT.JS dragLogic
    function initDrag(element) {
        let x=0, y=0;
        interact(element).draggable({
            listeners: {
                start (event) { event.target.classList.add('dragging'); },
                move (event) {
                    x += event.dx; y += event.dy;
                    event.target.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;
                    // Highlight ô dự kiến placedPreview
                    highlightPotentialDrop(event);
                },
                end (event) {
                    event.target.classList.remove('dragging');
                    // Xử lý khi thả dropLogic
                    handleDrop(event);
                    x=0; y=0; event.target.style.transform = `translate(0px, 0px)`;
                    clearHighlights();
                }
            }
        });
    }

    function getDropCoords(event) {
        const gridRect = document.getElementById('grid').getBoundingClientRect();
        // Lấy tọa độ tâm của khối đang kéo (để chính xác hơn lấy góc trên trái)
        const pieceRect = event.target.getBoundingClientRect();
        const dropX = pieceRect.left + 5; // offset nhỏ
        const dropY = pieceRect.top + 5;

        if (dropX < gridRect.left || dropX > gridRect.right || dropY < gridRect.top || dropY > gridRect.bottom) return null;

        const c = Math.floor((dropX - gridRect.left) / cellSize);
        const r = Math.floor((dropY - gridRect.top) / cellSize);
        return {r, c};
    }

    function highlightPotentialDrop(event) {
        clearHighlights();
        const coords = getDropCoords(event);
        if(!coords) return;
        const shape = JSON.parse(event.target.dataset.shape);
        if(canPlace(shape, coords.r, coords.c)) {
            for(let r=0; r<shape.length; r++) {
                for(let c=0; c<shape[r].length; c++) {
                    if(shape[r][c]) document.getElementById(`cell-${coords.r+r}-${coords.c+c}`).classList.add('highlight');
                }
            }
        }
    }

    function clearHighlights() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));
    }

    function handleDrop(event) {
        const coords = getDropCoords(event);
        if(!coords) return;
        const shape = JSON.parse(event.target.dataset.shape);
        const color = event.target.dataset.color;

        if(canPlace(shape, coords.r, coords.c)) {
            placePiece(shape, coords.r, coords.c, color);
            event.target.remove(); // Xóa khối đã dùng
            totalScore += shape.flat().filter(v => v).length * 10;
            updateScore();
            clearLines();
            
            if(document.getElementById('pieces-container').children.length === 0) spawnPieces();
            checkGameOver();
        }
    }

    function canPlace(shape, row, col) {
        for (let r = 0; r < shape.length; r++) {
            for (let c = 0; c < shape[r].length; c++) {
                if (shape[r][c]) {
                    if (row + r >= 8 || col + c >= 8 || board[row + r][col + c]) return false;
                }
            }
        }
        return true;
    }

    function placePiece(shape, row, col, color) {
        // playSound('place'); // Kích hoạt âm thanh sounds
        for (let r = 0; r < shape.length; r++) {
            for (let c = 0; c < shape[r].length; c++) {
                if (shape[r][c]) {
                    board[row + r][col + c] = color;
                    // Hiệu ứng nhún khi đặt placedEffect
                    document.getElementById(`cell-${row+r}-${col+c}`).classList.add('placed');
                    setTimeout(() => document.getElementById(`cell-${row+r}-${col+c}`).classList.remove('placed'), 300);
                }
            }
        }
        createGrid();
    }

    function clearLines() {
        let rowsToClear = [], colsToClear = [];
        for(let i=0; i<8; i++) {
            if(board[i].every(v => v !== null)) rowsToClear.push(i);
            let colFull = true;
            for(let j=0; j<8; j++) if(board[j][i] === null) colFull = false;
            if(colFull) colsToClear.push(i);
        }
        
        if(rowsToClear.length > 0 || colsToClear.length > 0) {
            // playSound('clear'); // Kích hoạt âm thanh nổ clearLinesSound
            // Hiệu ứng nổ nhỏ confetti nổ
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 }, colors: ['#ffffff', '#00d4ff'] });

            // Hiệu ứng co nhỏ clearEffect
            rowsToClear.forEach(r => {
                for(let c=0; c<8; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    cell.classList.add('clearing');
                    board[r][c] = null;
                }
            });
            colsToClear.forEach(c => {
                for(let r=0; r<8; r++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    if(!cell.classList.contains('clearing')) { // Tránh trùng animation
                        cell.classList.add('clearing');
                        board[r][c] = null;
                    }
                }
            });

            totalScore += (rowsToClear.length + colsToClear.length) * 100 + (rowsToClear.length * colsToClear.length * 50); // Điểm combo clearScore
            setTimeout(() => {
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('clearing'));
                createGrid();
                updateScore();
            }, 400); // Đợi animation xong mới vẽ lại
        }
    }

    function updateScore() {
        document.getElementById('score').innerText = totalScore;
        // Logic tích Xu không đổi (500 điểm = +3 Xu)
        if (totalScore >= 500 && !window.rewarded) {
            window.rewarded = true;
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#00d4ff', '#ffd700'] });
            db.ref('web_users/' + userUID + '/points').transaction(p => (p || 0) + 3);
            alert("🔥 QUÁ ĐỈNH! Đạt 500 điểm, nhận ngay +3 Xu.");
        }
    }

    function checkGameOver() {
        const pcBoxes = document.getElementById('pieces-container').children;
        let canPlaceAny = false;
        
        for(let box of pcBoxes) {
            const shape = JSON.parse(box.dataset.shape);
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if(canPlace(shape, r, c)) { canPlaceAny = true; break; }
                }
                if(canPlaceAny) break;
            }
            if(canPlaceAny) break;
        }

        if(!canPlaceAny) {
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-result').innerText = `Thành tích của bạn: ${totalScore} điểm`;
        }
    }

    createGrid();
    spawnPieces();
</script>
</body>
</html>
