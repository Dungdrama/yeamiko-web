<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng VNĐ - Yeamiko</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #1a2236; --card-bg: #242c42; --main-blue: #00d4ff; --accent-yellow: #ffc107; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg); color: white; padding: 15px; }

        /* Tabs điều hướng giống ảnh */
        .header-nav { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .btn-menu { background: var(--main-blue); border: none; border-radius: 8px; width: 50px; height: 50px; color: black; font-size: 20px; }
        .nav-tab { 
            flex: 1; height: 50px; display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px;
            border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; text-transform: uppercase;
        }
        .nav-tab.active { background: rgba(0, 212, 255, 0.1); border: 2px solid var(--main-blue); color: var(--main-blue); }
        .nav-tab i { margin-right: 8px; }

        /* Card tổng quát */
        .card { 
            background: var(--card-bg); border-radius: 25px; padding: 30px; 
            margin-bottom: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }

        /* Phần hiển thị số dư VNĐ */
        .user-info img { width: 80px; height: 80px; border-radius: 15px; border: 3px solid var(--main-blue); margin-bottom: 15px; }
        .user-info h2 { font-size: 24px; letter-spacing: 1px; margin-bottom: 5px; }
        .user-info p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        
        .balance-label { color: #94a3b8; font-size: 14px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .balance-value { color: var(--accent-yellow); font-size: 38px; font-weight: 900; }

        /* Grid nạp tiền */
        .shop-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .item-card { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .item-card i { font-size: 40px; color: var(--main-blue); margin-bottom: 10px; }
        .item-title { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .item-price { color: var(--accent-yellow); font-weight: bold; margin-bottom: 15px; }

        .btn-buy { 
            width: 100%; background: var(--accent-yellow); color: black; border: none; 
            padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* Sidebar ẩn (giữ logic cũ) */
        #sidebar { position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: #111; z-index: 1000; transition: 0.3s; }
        #sidebar.open { left: 0; }
    </style>
</head>
<body>

    <div class="header-nav">
        <button class="btn-menu" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <a href="shop.html" class="nav-tab"><i class="fas fa-coins"></i> Cửa hàng Xu</a>
        <a href="shopvnd.html" class="nav-tab active"><i class="fas fa-wallet"></i> Cửa hàng VNĐ</a>
    </div>

    <div class="card">
        <div class="user-info">
            <img id="player-head" src="https://mc-heads.net/avatar/steve">
            <h2 id="display-mc">ĐANG TẢI...</h2>
            <p id="display-email">---</p>
            
            <div class="balance-section">
                <div class="balance-label">SỐ DƯ VNĐ</div>
                <div class="balance-value" id="display-balance">0</div>
            </div>
        </div>
    </div>

    <div class="shop-grid">
        <div class="item-card">
            <i class="fas fa-coins"></i>
            <div class="item-title">GÓI 10 XU</div>
            <div class="item-price">10.000 VNĐ</div>
            <button class="btn-buy" onclick="exchange(10000, 10)">XÁC NHẬN ĐỔI</button>
        </div>

        <div class="item-card">
            <i class="fas fa-coins"></i>
            <div class="item-title">GÓI 20 XU</div>
            <div class="item-price">20.000 VNĐ</div>
            <button class="btn-buy" onclick="exchange(20000, 20)">XÁC NHẬN ĐỔI</button>
        </div>

        <div class="item-card">
            <i class="fas fa-coins" style="color: #00d4ff;"></i>
            <div class="item-title">GÓI 60 XU (BONUS)</div>
            <div class="item-price">50.000 VNĐ</div>
            <button class="btn-buy" onclick="exchange(50000, 60)">XÁC NHẬN ĐỔI</button>
        </div>

        <div class="item-card">
            <i class="fas fa-coins" style="color: #ffc107;"></i>
            <div class="item-title">GÓI 130 XU (VIP)</div>
            <div class="item-price">100.000 VNĐ</div>
            <button class="btn-buy" onclick="exchange(100000, 130)">XÁC NHẬN ĐỔI</button>
        </div>
    </div>

    <script>
        // Copy config từ file cũ của bạn qua đây nhé
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentBalance = 0, currentXu = 0;

        firebase.auth().onAuthStateChanged(u => { 
            if(u) {
                document.getElementById('display-email').innerText = u.email;
                loadData(u.uid); 
            } else { window.location.href='login.html'; }
        });

        async function loadData(uid) {
            const s = await db.ref('web_users/' + uid).once('value');
            const d = s.val() || {balance: 0, points: 0};
            currentBalance = d.balance || 0;
            currentXu = d.points || 0;
            
            document.getElementById('display-balance').innerText = currentBalance.toLocaleString();
            
            if(d.linked_mc) {
                document.getElementById('display-mc').innerText = d.linked_mc.toUpperCase();
                document.getElementById('player-head').src = `https://mc-heads.net/avatar/${d.linked_mc}`;
            } else {
                document.getElementById('display-mc').innerText = "CHƯA LIÊN KẾT";
            }
        }

        async function exchange(cost, gain) {
            if(currentBalance < cost) return alert("Bạn không đủ tiền VNĐ!");
            if(confirm(`Đổi ${cost.toLocaleString()} VNĐ lấy ${gain} Xu?`)) {
                const user = firebase.auth().currentUser;
                try {
                    await db.ref('web_users/' + user.uid).update({
                        balance: currentBalance - cost,
                        points: currentXu + gain
                    });
                    alert("Đổi thành công!");
                    location.reload();
                } catch(e) { alert("Lỗi kết nối!"); }
            }
        }

        function toggleMenu() { /* Thêm logic mở sidebar nếu cần */ }
    </script>
</body>
</html>
