<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nạp Xu - Yeamiko Premium Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #2ecc71; --bg: #0f172a; --sidebar-dark: #111; --card: rgba(255, 255, 255, 0.05); --gold: #fbbf24; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #111827, #0f172a); 
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        /* HEADER & TABS (Giống hệt shop.html) */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);
            z-index: 1000; display: flex; align-items: center;
            padding: 0 20px 0 80px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .menu-toggle {
            position: fixed; top: 12px; left: 20px; z-index: 1500;
            background: var(--main); color: #000; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer; font-size: 20px;
        }

        .shop-tabs { display: flex; gap: 12px; height: 46px; }
        .shop-tab {
            padding: 0 20px; height: 100%; border-radius: 12px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8; display: flex; align-items: center; gap: 8px;
            text-decoration: none; font-weight: 700; transition: 0.3s; font-size: 14px; text-transform: uppercase;
        }

        .shop-tab.active-vnd { background: rgba(46, 204, 113, 0.15); border-color: var(--main); color: var(--main); }

        /* SIDEBAR */
        .sidebar { 
            width: 260px; background: var(--sidebar-dark); height: 100vh; position: fixed; 
            padding: 30px 20px; z-index: 2000; left: -260px; transition: 0.4s;
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar.open { left: 0; }
        .sidebar .logo { font-size: 26px; font-weight: 900; color: var(--main); margin-bottom: 40px; text-align: center; }
        .sidebar a { 
            display: flex; align-items: center; color: #94a3b8; padding: 14px 18px; 
            text-decoration: none; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; 
        }
        .sidebar a:hover, .sidebar a.active { background: rgba(46, 204, 113, 0.1); color: var(--main); }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1800; display: none; backdrop-filter: blur(3px); }
        .sidebar-overlay.show { display: block; }

        /* CONTENT */
        .main-content { width: 100%; max-width: 1000px; margin: 0 auto; padding: 110px 20px 40px 20px; }

        .shop-header { 
            width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 25px; display: flex; align-items: center; gap: 20px; margin-bottom: 40px; 
        }
        .mc-head { width: 64px; height: 64px; border-radius: 12px; border: 2px solid var(--main); }
        .points-display { margin-left: auto; text-align: right; }
        .points-display span { font-size: 32px; font-weight: 900; color: var(--gold); }

        /* GRID & CARDS */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; width: 100%; }
        .item-card { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 25px; text-align: center; transition: 0.4s; 
        }
        .item-card:hover { transform: translateY(-5px); border-color: var(--main); }
        .item-icon { font-size: 35px; margin-bottom: 15px; color: var(--gold); }
        .item-cost { color: #fff; font-weight: 800; font-size: 18px; margin-bottom: 15px; }
        .bonus-tag { background: #e74c3c; color: white; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 10px; display: inline-block; }

        .btn-buy { 
            width: 100%; padding: 12px; border: none; border-radius: 12px; 
            font-weight: bold; cursor: pointer; background: var(--main); color: #000; 
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-buy:hover { filter: brightness(1.2); }

        @media (max-width: 768px) {
            .shop-header { flex-direction: column; text-align: center; }
            .points-display { margin: 15px auto 0 auto; }
            .top-nav { padding-left: 75px; }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>

    <div class="top-nav">
        <div class="shop-tabs">
            <a href="shop.html" class="shop-tab">
                <i class="fas fa-coins"></i> <span>Cửa hàng Xu</span>
            </a>
            <a href="shopvnd.html" class="shop-tab active-vnd">
                <i class="fas fa-wallet"></i> <span>Cửa hàng VNĐ</span>
            </a>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="shop.html" class="active"><i class="fas fa-shopping-cart"></i><span>Cửa hàng</span></a>
        <a href="profile.html"><i class="fas fa-user"></i><span>Hồ sơ</span></a>
    </div>

    <div class="main-content">
        <div class="shop-header">
            <img id="player-head" src="https://mc-heads.net/avatar/steve" class="mc-head">
            <div class="user-meta">
                <h2 id="display-mc">Đang tải...</h2>
                <p id="display-email" style="color: #94a3b8; font-size: 13px;"></p>
            </div>
            <div class="points-display">
                <p style="font-size: 12px; color: #94a3b8; font-weight: bold;">SỐ DƯ XU</p>
                <span id="display-pts">0</span>
            </div>
        </div>

        <h3 style="margin-bottom: 25px; color: var(--main);"><i class="fas fa-bolt"></i> CHỌN GÓI NẠP XU</h3>
        
        <div class="shop-grid">
            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight:bold; margin-bottom:5px;">GÓI CƠ BẢN</div>
                <div class="item-cost">10.000 VNĐ</div>
                <div style="color: var(--main); font-weight: bold; margin-bottom: 15px;">+ 10 XU</div>
                <button class="btn-buy" onclick="recharge(10000, 10)">NẠP NGAY</button>
            </div>

            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight:bold; margin-bottom:5px;">GÓI PHỔ BIẾN</div>
                <div class="item-cost">20.000 VNĐ</div>
                <div style="color: var(--main); font-weight: bold; margin-bottom: 15px;">+ 20 XU</div>
                <button class="btn-buy" onclick="recharge(20000, 20)">NẠP NGAY</button>
            </div>

            <div class="item-card">
                <div class="bonus-tag">Khuyên dùng</div><br>
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight:bold; margin-bottom:5px;">GÓI ƯU ĐÃI</div>
                <div class="item-cost">50.000 VNĐ</div>
                <div style="color: var(--main); font-weight: bold; margin-bottom: 15px;">+ 60 XU (Thêm 10)</div>
                <button class="btn-buy" onclick="recharge(50000, 60)">NẠP NGAY</button>
            </div>

            <div class="item-card">
                <div class="bonus-tag">Siêu hời</div><br>
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight:bold; margin-bottom:5px;">GÓI ĐẠI GIA</div>
                <div class="item-cost">100.000 VNĐ</div>
                <div style="color: var(--main); font-weight: bold; margin-bottom: 15px;">+ 130 XU (Thêm 30)</div>
                <button class="btn-buy" onclick="recharge(100000, 130)">NẠP NGAY</button>
            </div>
        </div>
    </div>

    <script>
        // Cấu hình Firebase (Giữ nguyên từ code cũ của bạn)
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPoints = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }

        firebase.auth().onAuthStateChanged(u => { 
            if(u) {
                document.getElementById('display-email').innerText = u.email;
                loadData(u.uid); 
            } else { window.location.href='login.html'; }
        });

        async function loadData(uid) {
            const s = await db.ref('web_users/' + uid).once('value');
            const d = s.val() || {points: 0};
            currentPoints = d.points;
            document.getElementById('display-pts').innerText = currentPoints;
            if(d.linked_mc) {
                document.getElementById('display-mc').innerText = d.linked_mc.toUpperCase();
                document.getElementById('player-head').src = `https://mc-heads.net/avatar/${d.linked_mc}`;
            } else {
                document.getElementById('display-mc').innerText = "CHƯA LIÊN KẾT";
            }
        }

        async function recharge(amount, xuReward) {
            const user = firebase.auth().currentUser;
            if(!user) return;

            // Chỗ này bạn có thể tích hợp API Thanh Toán. 
            // Hiện tại tôi làm logic cộng tiền trực tiếp khi ấn (như bạn yêu cầu).
            if(confirm(`Xác nhận thanh toán ${amount.toLocaleString()}đ để nhận ${xuReward} Xu?`)) {
                try {
                    const newPoints = currentPoints + xuReward;
                    await db.ref('web_users/' + user.uid).update({
                        points: newPoints 
                        // Nếu bạn muốn lưu là 'balance', hãy đổi tên field ở đây và hàm loadData
                    });
                    
                    // Lưu lịch sử nạp
                    await db.ref('recharge_history').push({
                        uid: user.uid,
                        amount: amount,
                        xu: xuReward,
                        time: Date.now()
                    });

                    alert(`Nạp thành công! Bạn nhận được ${xuReward} Xu.`);
                    location.reload();
                } catch(e) {
                    alert("Lỗi hệ thống: " + e.message);
                }
            }
        }
    </script>
</body>
</html>
