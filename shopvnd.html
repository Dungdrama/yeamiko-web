<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko - Đổi Xu Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; min-height: 100vh;
        }

        /* Header & Tabs */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);
            z-index: 1000; display: flex; align-items: center; padding: 0 20px 0 80px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .menu-toggle {
            position: fixed; top: 12px; left: 20px; z-index: 1500;
            background: var(--main); color: #000; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer;
        }

        .shop-tabs { display: flex; gap: 12px; }
        .shop-tab {
            padding: 10px 20px; border-radius: 12px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); color: #94a3b8;
            text-decoration: none; font-weight: 700; font-size: 14px; transition: 0.3s;
        }
        .shop-tab.active-vnd { border-color: #2ecc71; color: #2ecc71; background: rgba(46, 204, 113, 0.1); }

        /* Sidebar (Cơ bản) */
        .sidebar { 
            width: 260px; background: #111; height: 100vh; position: fixed; 
            left: -260px; transition: 0.4s; z-index: 2000; padding: 30px 20px;
        }
        .sidebar.open { left: 0; }
        .sidebar a { display: block; color: #94a3b8; padding: 12px; text-decoration: none; margin-bottom: 5px; }
        .sidebar a:hover { color: var(--main); }

        /* Content */
        .main-content { width: 100%; max-width: 1000px; margin: 0 auto; padding: 110px 20px 40px; }

        .shop-header { 
            width: 100%; background: var(--card); border-radius: 24px; padding: 25px; 
            display: flex; align-items: center; gap: 20px; margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.1);
        }
        .mc-head { width: 64px; height: 64px; border-radius: 12px; border: 2px solid var(--main); }
        
        .points-display { margin-left: auto; text-align: right; }
        .points-display .val-xu { font-size: 28px; font-weight: 900; color: #fbbf24; }
        .points-display .val-vnd { font-size: 18px; color: #2ecc71; font-weight: bold; }

        /* Shop Grid */
        .shop-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; width: 100%; 
        }
        .item-card { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 30px; text-align: center; transition: 0.3s;
        }
        .item-card:hover { transform: translateY(-5px); border-color: #2ecc71; }
        .item-icon { font-size: 45px; margin-bottom: 15px; color: #fbbf24; }
        .item-cost { color: #fff; font-weight: 800; font-size: 22px; margin-bottom: 20px; }
        .btn-exchange { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            background: #2ecc71; color: white; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-exchange:hover { filter: brightness(1.1); transform: scale(1.02); }

        @media (max-width: 768px) {
            .shop-header { flex-direction: column; text-align: center; }
            .points-display { margin: 15px auto 0; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>

    <div class="top-nav">
        <div class="shop-tabs">
            <a href="shop.html" class="shop-tab"><i class="fas fa-coins"></i> Cửa hàng Xu</a>
            <a href="shopvnd.html" class="shop-tab active-vnd"><i class="fas fa-wallet"></i> Cửa hàng VNĐ</a>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="font-size: 24px; color: var(--main); font-weight: 900; margin-bottom: 30px; text-align: center;">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="shop.html"><i class="fas fa-shopping-cart"></i> Cửa hàng Xu</a>
        <a href="profile.html"><i class="fas fa-user"></i> Hồ sơ</a>
    </div>

    <div class="main-content">
        <div class="shop-header">
            <img id="player-head" src="https://mc-heads.net/avatar/steve" class="mc-head">
            <div class="user-meta">
                <h2 id="display-mc">Đang tải...</h2>
                <p id="display-email" style="color: #94a3b8; font-size: 13px;"></p>
            </div>
            <div class="points-display">
                <div><span class="val-vnd" id="display-balance">0</span> <small>VNĐ</small></div>
                <div class="val-xu" id="display-pts">0</div>
                <p style="font-size: 10px; color: #94a3b8; letter-spacing: 1px;">SỐ DƯ XU HIỆN TẠI</p>
            </div>
        </div>
        
        <div class="shop-grid">
            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight:bold; margin-bottom:5px;">GÓI 10 XU</div>
                <div class="item-cost">10,000 VNĐ</div>
                <button class="btn-exchange" onclick="exchange(10000, 10)">ĐỔI NGAY</button>
            </div>

            <div class="item-card">
                <i class="fas fa-gem item-icon" style="color: #00d4ff;"></i>
                <div style="font-weight:bold; margin-bottom:5px;">GÓI 55 XU</div>
                <div class="item-cost">50,000 VNĐ</div>
                <p style="color: #2ecc71; font-size: 12px; margin-bottom: 10px;">Khuyến mãi +5 Xu</p>
                <button class="btn-exchange" onclick="exchange(50000, 55)">ĐỔI NGAY</button>
            </div>

            <div class="item-card">
                <i class="fas fa-crown item-icon" style="color: #f1c40f;"></i>
                <div style="font-weight:bold; margin-bottom:5px;">GÓI 115 XU</div>
                <div class="item-cost">100,000 VNĐ</div>
                <p style="color: #2ecc71; font-size: 12px; margin-bottom: 10px;">Khuyến mãi +15 Xu</p>
                <button class="btn-exchange" onclick="exchange(100000, 115)">ĐỔI NGAY</button>
            </div>
        </div>
    </div>

    <script>
        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentPoints = 0, currentBalance = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Theo dõi trạng thái đăng nhập
        firebase.auth().onAuthStateChanged(user => { 
            if(user) {
                document.getElementById('display-email').innerText = user.email;
                loadData(user.uid); 
            } else { window.location.href='login.html'; }
        });

        // 2. Hàm tải dữ liệu (Cập nhật lấy Balance)
        async function loadData(uid) {
            const snapshot = await db.ref('web_users/' + uid).once('value');
            const data = snapshot.val() || { points: 0, balance: 0 };

            currentPoints = data.points || 0;
            currentBalance = data.balance || 0;

            // Hiển thị số dư
            document.getElementById('display-pts').innerText = currentPoints.toLocaleString();
            document.getElementById('display-balance').innerText = currentBalance.toLocaleString();
            
            // Hiển thị info nhân vật
            if(data.linked_mc) {
                document.getElementById('display-mc').innerText = data.linked_mc.toUpperCase();
                document.getElementById('player-head').src = `https://mc-heads.net/avatar/${data.linked_mc}`;
            } else {
                document.getElementById('display-mc').innerText = "CHƯA LIÊN KẾT";
            }
        }

        // 3. Hàm xử lý đổi tiền (Exchange)
        async function exchange(price, xuGain) {
            const user = firebase.auth().currentUser;
            if(!user) return;

            // Kiểm tra số dư VNĐ
            if(currentBalance < price) {
                return alert("Bạn không đủ tiền VNĐ. Vui lòng nạp thêm!");
            }

            // Xác nhận giao dịch
            if(confirm(`Xác nhận dùng ${price.toLocaleString()} VNĐ để đổi ${xuGain} Xu?`)) {
                try {
                    const newBalance = currentBalance - price;
                    const newPoints = currentPoints + xuGain;

                    // Cập nhật Database
                    await db.ref('web_users/' + user.uid).update({
                        balance: newBalance,
                        points: newPoints
                    });

                    alert("Giao dịch thành công!");
                    loadData(user.uid); // Cập nhật lại UI mà không cần reload trang
                } catch(e) {
                    alert("Lỗi giao dịch, vui lòng liên hệ Admin!");
                }
            }
        }
    </script>
</body>
</html>
