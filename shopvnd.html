<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko | Mua Xu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #2ecc71; --bg: #0f172a; --sidebar-dark: #111; --card: rgba(255, 255, 255, 0.05); --gold: #fbbf24; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        /* Top Nav & Tabs */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);
            z-index: 1000; display: flex; align-items: center; padding: 0 20px 0 80px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .menu-toggle {
            position: fixed; top: 12px; left: 20px; z-index: 1500;
            background: var(--main); color: #000; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer; font-size: 20px;
        }

        .shop-tabs { display: flex; gap: 12px; height: 46px; }
        .shop-tab {
            padding: 0 20px; height: 100%; border-radius: 12px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8; display: flex; align-items: center; gap: 8px;
            text-decoration: none; font-weight: 700; font-size: 14px; text-transform: uppercase;
        }
        .shop-tab.active-vnd { background: rgba(46, 204, 113, 0.15); border-color: var(--main); color: var(--main); }

        /* Sidebar */
        .sidebar { 
            width: 260px; background: var(--sidebar-dark); height: 100vh; position: fixed; 
            padding: 30px 20px; z-index: 2000; left: -260px; transition: 0.4s;
        }
        .sidebar.open { left: 0; }
        .sidebar a { display: flex; align-items: center; color: #94a3b8; padding: 14px 18px; text-decoration: none; border-radius: 12px; margin-bottom: 8px; }
        .sidebar a.active { background: rgba(46, 204, 113, 0.1); color: var(--main); }

        /* Main Content */
        .main-content { width: 100%; max-width: 1000px; margin: 0 auto; padding: 110px 20px 40px 20px; }

        .shop-header { 
            width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 25px; display: flex; align-items: center; gap: 20px; margin-bottom: 40px; 
        }
        .balance-group { margin-left: auto; display: flex; gap: 30px; text-align: right; }
        .balance-item p { font-size: 11px; color: #94a3b8; font-weight: bold; }
        .balance-item span { font-size: 24px; font-weight: 900; }

        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; width: 100%; }

        .item-card { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 30px; text-align: center; transition: 0.3s;
        }
        .item-card:hover { border-color: var(--main); transform: translateY(-5px); }
        .item-icon { font-size: 45px; color: var(--gold); margin-bottom: 15px; }
        .bonus-tag { background: #e74c3c; color: white; font-size: 10px; padding: 2px 8px; border-radius: 20px; vertical-align: middle; margin-left: 5px; }
        
        .btn-buy { 
            width: 100%; padding: 12px; background: var(--main); border: none; border-radius: 12px; 
            color: black; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 15px;
        }
        .btn-buy:hover { filter: brightness(1.1); }

        @media (max-width: 768px) {
            .top-nav { padding-left: 75px; }
            .balance-group { gap: 15px; }
            .balance-item span { font-size: 18px; }
            .shop-tab span { display: inline-block !important; font-size: 11px; }
            .shop-tab { flex: 1; padding: 0 10px; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>

    <div class="top-nav">
        <div class="shop-tabs">
            <a href="shop.html" class="shop-tab">
                <i class="fas fa-coins"></i> <span>Cửa hàng Xu</span>
            </a>
            <a href="shopvnd.html" class="shop-tab active-vnd">
                <i class="fas fa-wallet"></i> <span>Nạp Xu (VNĐ)</span>
            </a>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="font-size: 26px; font-weight: 900; color: var(--main); margin-bottom: 40px; text-align: center;">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="shop.html" class="active"><i class="fas fa-shopping-cart"></i><span>Cửa hàng</span></a>
        <a href="profile.html"><i class="fas fa-user"></i><span>Hồ sơ</span></a>
    </div>

    <div class="main-content">
        <div class="shop-header">
            <img id="player-head" src="https://mc-heads.net/avatar/steve" style="width:50px; border-radius:10px;">
            <div>
                <h3 id="display-mc">Đang tải...</h3>
                <p id="display-email" style="font-size:12px; color:#94a3b8"></p>
            </div>
            <div class="balance-group">
                <div class="balance-item">
                    <p>SỐ DƯ VNĐ</p>
                    <span id="display-vnd" style="color: #2ecc71;">0</span>
                </div>
                <div class="balance-item">
                    <p>SỐ DƯ XU</p>
                    <span id="display-xu" style="color: #fbbf24;">0</span>
                </div>
            </div>
        </div>

        <div class="shop-grid">
            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <h3>10 XU</h3>
                <p style="color:#94a3b8; margin: 10px 0;">Giá: 10 VNĐ</p>
                <button class="btn-buy" onclick="exchangeXu(10, 10)">MUA NGAY</button>
            </div>

            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <h3>20 XU</h3>
                <p style="color:#94a3b8; margin: 10px 0;">Giá: 20 VNĐ</p>
                <button class="btn-buy" onclick="exchangeXu(20, 20)">MUA NGAY</button>
            </div>

            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <h3>60 XU <span class="bonus-tag">+10 XU</span></h3>
                <p style="color:#94a3b8; margin: 10px 0;">Giá: 50 VNĐ</p>
                <button class="btn-buy" onclick="exchangeXu(50, 60)">MUA NGAY</button>
            </div>

            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <h3>130 XU <span class="bonus-tag">+30 XU</span></h3>
                <p style="color:#94a3b8; margin: 10px 0;">Giá: 100 VNĐ</p>
                <button class="btn-buy" onclick="exchangeXu(100, 130)">MUA NGAY</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentVnd = 0, currentXu = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        firebase.auth().onAuthStateChanged(u => {
            if(u) {
                document.getElementById('display-email').innerText = u.email;
                loadUserBalance(u.uid);
            } else { window.location.href='login.html'; }
        });

        async function loadUserBalance(uid) {
            const s = await db.ref('web_users/' + uid).once('value');
            const d = s.val() || { points: 0, vnd: 0 };
            currentXu = d.points || 0;
            currentVnd = d.vnd || 0; // Giả định bạn dùng field 'vnd' trong database
            
            document.getElementById('display-xu').innerText = currentXu.toLocaleString();
            document.getElementById('display-vnd').innerText = currentVnd.toLocaleString();
            document.getElementById('display-mc').innerText = (d.linked_mc || "Chưa liên kết").toUpperCase();
            if(d.linked_mc) document.getElementById('player-head').src = `https://mc-heads.net/avatar/${d.linked_mc}`;
        }

        async function exchangeXu(costVnd, receiveXu) {
            const user = firebase.auth().currentUser;
            if (currentVnd < costVnd) return alert("Số dư VNĐ của bạn không đủ! Hãy nạp thêm.");

            if (confirm(`Bạn muốn dùng ${costVnd} VNĐ để đổi lấy ${receiveXu} Xu?`)) {
                try {
                    await db.ref('web_users/' + user.uid).update({
                        vnd: currentVnd - costVnd,
                        points: currentXu + receiveXu
                    });
                    alert("Đổi Xu thành công!");
                    loadUserBalance(user.uid);
                } catch (e) {
                    alert("Lỗi hệ thống, vui lòng thử lại sau.");
                }
            }
        }
    </script>
</body>
</html>
