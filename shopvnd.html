<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Xu - Yeamiko Premium Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #2ecc71; --bg: #0f172a; --sidebar-dark: #111; --card: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        /* --- Header & Nav --- */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); z-index: 1000;
            display: flex; align-items: center; padding: 0 20px 0 80px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .menu-toggle {
            position: fixed; top: 12px; left: 20px; z-index: 1500;
            background: var(--main); color: #000; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2);
        }

        .shop-tabs { display: flex; gap: 12px; height: 46px; }
        .shop-tab {
            padding: 0 20px; height: 100%; border-radius: 12px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8; display: flex; align-items: center; gap: 8px;
            text-decoration: none; font-weight: 700; transition: 0.3s;
            font-size: 14px; text-transform: uppercase;
        }

        .shop-tab.active-vnd { background: rgba(46, 204, 113, 0.15); border-color: var(--main); color: var(--main); }

        /* --- Sidebar --- */
        .sidebar { 
            width: 260px; background: var(--sidebar-dark); height: 100vh; position: fixed; 
            padding: 30px 20px; z-index: 2000; left: -260px; transition: 0.4s;
            border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }
        .sidebar a { display: flex; align-items: center; color: #94a3b8; padding: 14px 18px; text-decoration: none; border-radius: 12px; margin-bottom: 8px; }
        .sidebar a:hover, .sidebar a.active { background: rgba(46, 204, 113, 0.1); color: var(--main); }

        /* --- Content --- */
        .main-content { 
            width: 100%; max-width: 1000px; margin: 0 auto; 
            padding: 110px 20px 40px 20px; display: flex; flex-direction: column; align-items: center;
        }

        .shop-header { 
            width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 25px; display: flex; align-items: center; gap: 20px; margin-bottom: 40px; 
        }

        .balance-display { margin-left: auto; text-align: right; }
        .balance-display span { font-size: 30px; font-weight: 900; color: #2ecc71; }
        .xu-display { margin-right: 20px; padding-right: 20px; border-right: 1px solid rgba(255,255,255,0.1); }

        .shop-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; width: 100%;
        }

        .item-card { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 30px; text-align: center; transition: 0.4s; 
        }
        .item-card:hover { transform: translateY(-10px); border-color: var(--main); }
        .item-icon { font-size: 40px; margin-bottom: 15px; color: #fbbf24; }
        .item-cost { color: #2ecc71; font-weight: 800; font-size: 18px; margin-bottom: 20px; }
        
        .btn-buy { 
            width: 100%; padding: 12px; border: none; border-radius: 12px; 
            font-weight: bold; cursor: pointer; color: #000; background: var(--main); 
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-buy:hover { filter: brightness(1.1); transform: scale(1.05); }

        @media (max-width: 768px) {
            .shop-header { flex-direction: column; text-align: center; }
            .balance-display { margin: 15px 0; text-align: center; }
            .xu-display { border-right: none; margin-right: 0; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>

    <div class="top-nav">
        <div class="shop-tabs">
            <a href="shop.html" class="shop-tab"><i class="fas fa-coins"></i> <span>Cửa hàng Xu</span></a>
            <a href="shopvnd.html" class="shop-tab active-vnd"><i class="fas fa-wallet"></i> <span>Cửa hàng VNĐ</span></a>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="shop.html" class="active"><i class="fas fa-shopping-cart"></i><span>Cửa hàng</span></a>
        <a href="profile.html"><i class="fas fa-user"></i><span>Hồ sơ</span></a>
    </div>

    <div class="main-content">
        <div class="shop-header">
            <div class="user-meta">
                <h2 id="display-email">Đang tải...</h2>
                <p style="color: #94a3b8; font-size: 13px;">Dùng VNĐ để đổi lấy Xu Premium</p>
            </div>
            <div class="balance-display">
                <div class="xu-display" style="display: inline-block;">
                    <p style="font-size: 11px; color: #94a3b8;">XU HIỆN CÓ</p>
                    <span id="display-pts" style="color: #fbbf24; font-size: 24px;">0</span>
                </div>
                <div style="display: inline-block;">
                    <p style="font-size: 11px; color: #94a3b8;">SỐ DƯ VNĐ</p>
                    <span id="display-balance">0đ</span>
                </div>
            </div>
        </div>
        
        <div class="shop-grid">
            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight:bold; margin-bottom:5px; font-size: 20px;">10 XU</div>
                <div class="item-cost">10.000 VNĐ</div>
                <button class="btn-buy" onclick="buyXu(10000, 10)">ĐỔI NGAY</button>
            </div>

            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight:bold; margin-bottom:5px; font-size: 20px;">20 XU</div>
                <div class="item-cost">20.000 VNĐ</div>
                <button class="btn-buy" onclick="buyXu(20000, 20)">ĐỔI NGAY</button>
            </div>

            <div class="item-card">
                <i class="fas fa-sack-dollar item-icon"></i>
                <div style="font-weight:bold; margin-bottom:5px; font-size: 20px;">60 XU</div>
                <div class="item-cost">50.000 VNĐ</div>
                <button class="btn-buy" onclick="buyXu(50000, 60)">ĐỔI NGAY</button>
            </div>

            <div class="item-card">
                <i class="fas fa-gem item-icon"></i>
                <div style="font-weight:bold; margin-bottom:5px; font-size: 20px;">130 XU</div>
                <div class="item-cost">100.000 VNĐ</div>
                <button class="btn-buy" onclick="buyXu(100000, 130)">ĐỔI NGAY</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentBalance = 0, currentPoints = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        firebase.auth().onAuthStateChanged(u => { 
            if(u) {
                document.getElementById('display-email').innerText = u.email;
                loadData(u.uid); 
            } else { window.location.href='login.html'; }
        });

        async function loadData(uid) {
            const s = await db.ref('web_users/' + uid).once('value');
            const d = s.val() || {points: 0, balance: 0};
            currentPoints = d.points || 0;
            currentBalance = d.balance || 0; // Sử dụng balance: của bạn
            
            document.getElementById('display-pts').innerText = currentPoints.toLocaleString();
            document.getElementById('display-balance').innerText = currentBalance.toLocaleString() + "đ";
        }

        async function buyXu(costVND, rewardXu) {
            if(currentBalance < costVND) return alert("Số dư VNĐ không đủ! Vui lòng nạp thêm.");
            
            if(confirm(`Xác nhận dùng ${costVND.toLocaleString()}đ để đổi lấy ${rewardXu} Xu?`)) {
                try {
                    const user = firebase.auth().currentUser;
                    // Trừ balance và cộng points
                    await db.ref('web_users/' + user.uid).update({
                        balance: currentBalance - costVND,
                        points: currentPoints + rewardXu
                    });
                    
                    alert("Đổi Xu thành công!");
                    loadData(user.uid);
                } catch(e) { 
                    alert("Lỗi kết nối hệ thống!"); 
                }
            }
        }
    </script>
</body>
</html>
