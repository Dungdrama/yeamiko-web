<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeamiko Premium Shop - Đổi Xu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00d4ff; --bg: #0f172a; --sidebar-dark: #111; --card: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        /* --- HEADER & TABS --- */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); z-index: 1000;
            display: flex; align-items: center; padding: 0 20px 0 80px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .menu-toggle {
            position: fixed; top: 12px; left: 20px; z-index: 1500;
            background: var(--main); color: #000; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
        }

        .shop-tabs { display: flex; gap: 12px; height: 46px; }
        .shop-tab {
            padding: 0 20px; height: 100%; border-radius: 12px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8; display: flex; align-items: center; gap: 8px;
            text-decoration: none; font-weight: 700; transition: all 0.3s ease;
            font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .shop-tab.active-vnd {
            background: rgba(46, 204, 113, 0.15); border-color: #2ecc71;
            color: #2ecc71; box-shadow: 0 0 15px rgba(46, 204, 113, 0.1);
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 260px; background: var(--sidebar-dark);
            height: 100vh; position: fixed; padding: 30px 20px; z-index: 2000;
            left: -260px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar.open { left: 0; }
        .sidebar .logo { font-size: 26px; font-weight: 900; color: var(--main); margin-bottom: 40px; text-align: center; letter-spacing: 2px; }
        .sidebar a { 
            display: flex; align-items: center; color: #94a3b8; padding: 14px 18px; 
            text-decoration: none; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; 
        }
        .sidebar a i { margin-right: 12px; width: 20px; text-align: center; font-size: 1.1rem; }
        .sidebar a:hover, .sidebar a.active { background: rgba(0, 212, 255, 0.1); color: var(--main); font-weight: bold; }

        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1800; display: none; backdrop-filter: blur(3px);
        }
        .sidebar-overlay.show { display: block; }

        /* --- MAIN CONTENT --- */
        .main-content { 
            width: 100%; max-width: 1000px; margin: 0 auto; 
            padding: 110px 20px 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .link-section {
            width: 100%; background: rgba(251, 191, 36, 0.1);
            border: 1px solid #fbbf24; border-radius: 20px; padding: 25px;
            margin-bottom: 25px; text-align: center; display: none;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        .link-section input {
            padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); 
            margin: 5px; width: 200px; outline: none; background: rgba(0,0,0,0.3); color: white;
        }
        .btn-link {
            padding: 12px 25px; background: #fbbf24; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; color: #000; transition: 0.2s;
        }

        .shop-header { 
            width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 25px; display: flex; align-items: center; gap: 20px; margin-bottom: 40px; 
            backdrop-filter: blur(10px);
        }
        .mc-head { width: 64px; height: 64px; border-radius: 12px; border: 2px solid var(--main); box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        
        .points-display { margin-left: auto; text-align: right; }
        .points-display .balance-vnd { font-size: 14px; color: #2ecc71; font-weight: bold; margin-bottom: 5px; }
        .points-display span.xu-val { font-size: 32px; font-weight: 900; color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }

        /* --- SHOP GRID --- */
        .shop-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; width: 100%;
        }

        .item-card { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 30px; text-align: center; transition: 0.4s; 
            position: relative; overflow: hidden;
        }
        .item-card:hover { transform: translateY(-10px); border-color: #2ecc71; background: rgba(46, 204, 113, 0.05); }
        .item-icon { font-size: 40px; margin-bottom: 15px; color: #fbbf24; display: block; }
        .item-cost { color: #fff; font-weight: 800; font-size: 22px; margin-bottom: 20px; }
        
        .btn-exchange { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            background: #2ecc71; color: white; font-weight: bold; cursor: pointer; 
            transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-exchange:hover { filter: brightness(1.2); transform: scale(1.02); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }

        .promo-tag { color: #2ecc71; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: block; }

        @media (max-width: 768px) {
            .shop-header { flex-direction: column; text-align: center; }
            .points-display { margin: 15px auto 0 auto; text-align: center; }
            .shop-grid { grid-template-columns: 1fr; }
            .top-nav { padding: 0 10px 0 75px; }
            .shop-tab { flex: 1; justify-content: center; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>

    <div class="top-nav">
        <div class="shop-tabs">
            <a href="shop.html" class="shop-tab">
                <i class="fas fa-coins"></i><span>Cửa hàng Xu</span>
            </a>
            <a href="shopvnd.html" class="shop-tab active-vnd">
                <i class="fas fa-wallet"></i><span>Cửa hàng VNĐ</span>
            </a>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="logo">YEAMIKO</div>
        <a href="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="forum.html"><i class="fas fa-comments"></i><span>Diễn đàn</span></a>
        <a href="checkin.html"><i class="fas fa-calendar-check"></i><span>Điểm danh</span></a>
        <a href="shop.html" class="active"><i class="fas fa-shopping-cart"></i><span>Cửa hàng</span></a>
        <a href="minigame-hub.html"><i class="fas fa-gamepad"></i><span>Giải trí</span></a>
        <a href="profile.html"><i class="fas fa-user"></i><span>Hồ sơ</span></a>
    </div>

    <div class="main-content">
        <div id="link-section" class="link-section">
            <h3 style="margin-bottom: 15px; color: #fbbf24;"><i class="fas fa-link"></i> LIÊN KẾT TÀI KHOẢT GAME</h3>
            <input type="text" id="mc-name" placeholder="Tên Minecraft">
            <input type="text" id="link-code" placeholder="Mã /link">
            <button class="btn-link" onclick="linkGame()">XÁC NHẬN</button>
        </div>

        <div class="shop-header">
            <img id="player-head" src="https://mc-heads.net/avatar/steve" class="mc-head">
            <div class="user-meta">
                <h2 id="display-mc">Đang tải...</h2>
                <p id="display-email" style="color: #94a3b8; font-size: 13px;"></p>
            </div>
            <div class="points-display">
                <p class="balance-vnd">Ví VNĐ: <span id="display-balance">0</span>đ</p>
                <p style="font-size: 10px; color: #94a3b8; font-weight: bold;">SỐ DƯ XU</p>
                <span id="display-pts" class="xu-val">0</span>
            </div>
        </div>
        
        <div class="shop-grid">
            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight:bold; margin-bottom:5px; font-size: 18px;">GÓI 10 XU</div>
                <div class="item-cost">10,000 VNĐ</div>
                <button class="btn-exchange" onclick="exchange(10000, 10)">Đổi ngay</button>
            </div>

            <div class="item-card">
                <i class="fas fa-coins item-icon"></i>
                <div style="font-weight:bold; margin-bottom:5px; font-size: 18px;">GÓI 20 XU</div>
                <div class="item-cost">20,000 VNĐ</div>
                <button class="btn-exchange" onclick="exchange(20000, 20)">Đổi ngay</button>
            </div>

            <div class="item-card">
                <i class="fas fa-gem item-icon" style="color:#00d4ff"></i>
                <div style="font-weight:bold; margin-bottom:5px; font-size: 18px;">GÓI 60 XU</div>
                <div class="item-cost">50,000 VNĐ</div>
                <span class="promo-tag">Khuyến mãi +10 Xu</span>
                <button class="btn-exchange" onclick="exchange(50000, 60)">Đổi ngay</button>
            </div>

            <div class="item-card">
                <i class="fas fa-crown item-icon" style="color:#f1c40f"></i>
                <div style="font-weight:bold; margin-bottom:5px; font-size: 18px;">GÓI 130 XU</div>
                <div class="item-cost">100,000 VNĐ</div>
                <span class="promo-tag">Khuyến mãi +30 Xu</span>
                <button class="btn-exchange" onclick="exchange(100000, 130)">Đổi ngay</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiWYhNzVVAJ5ZLCFsv8ZgjQlbJBM4b9c0",
            authDomain: "yeamiko-web.firebaseapp.com",
            databaseURL: "https://yeamiko-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yeamiko-web",
            appId: "1:380442978172:web:52eeb187628ed3518266f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPoints = 0, currentBalance = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }

        firebase.auth().onAuthStateChanged(u => { 
            if(u) {
                document.getElementById('display-email').innerText = u.email;
                loadData(u.uid); 
            } else { window.location.href='login.html'; }
        });

        async function loadData(uid) {
            const s = await db.ref('web_users/' + uid).once('value');
            const d = s.val() || {points: 0, balance: 0};
            currentPoints = d.points || 0;
            currentBalance = d.balance || 0;
            document.getElementById('display-pts').innerText = currentPoints.toLocaleString();
            document.getElementById('display-balance').innerText = currentBalance.toLocaleString();
            if(d.linked_mc) {
                document.getElementById('display-mc').innerText = d.linked_mc.toUpperCase();
                document.getElementById('player-head').src = `https://mc-heads.net/avatar/${d.linked_mc}`;
                document.getElementById('link-section').style.display = 'none'; 
            } else {
                document.getElementById('display-mc').innerText = "CHƯA LIÊN KẾT";
                document.getElementById('link-section').style.display = 'block'; 
            }
        }

        async function exchange(price, xuGain) {
            const user = firebase.auth().currentUser;
            if(!user) return;
            if (currentBalance < price) return alert("Ví VNĐ của bạn không đủ!");
            if (confirm(`Dùng ${price.toLocaleString()} VNĐ đổi ${xuGain} Xu?`)) {
                try {
                    await db.ref('web_users/' + user.uid).update({
                        balance: currentBalance - price,
                        points: currentPoints + xuGain
                    });
                    alert("Đổi Xu thành công!");
                    loadData(user.uid);
                } catch (e) { alert("Lỗi!"); }
            }
        }

        async function linkGame() {
            const name = document.getElementById('mc-name').value.trim();
            const code = document.getElementById('link-code').value.trim();
            const user = firebase.auth().currentUser;
            if(!name || !code) return alert("Nhập đủ thông tin!");
            const s = await db.ref('linking/' + name).once('value');
            if(s.exists() && s.val().code == code) {
                await db.ref('web_users/' + user.uid).update({linked_mc: name});
                alert("Thành công!"); location.reload();
            } else { alert("Sai mã!"); }
        }
    </script>
</body>
</html>
